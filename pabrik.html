<!DOCTYPE html>
<html lang="id">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Tim Pabrik — Oma Opa Cakery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --kuning:#FACC1A; --kuning-d:#E0B100; --coklat:#613925; --cream:#FFF8EC; }
  *{box-sizing:border-box}
  body{ margin:0; font-family:'Nunito',system-ui,sans-serif; color:var(--coklat);
    background:radial-gradient(circle at 12% 8%, #FFE7B8 0%, transparent 42%), var(--cream);
    min-height:100vh; padding:18px 14px 40px; }
  .wrap{ max-width:460px; margin:0 auto; }
  .head{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .head h1{ font-family:'Fredoka'; font-size:1.2rem; margin:0; color:var(--coklat); }
  .head .badge{ font-size:.66rem; font-weight:900; background:var(--kuning); color:#5A3A05; padding:2px 9px; border-radius:999px; }
  .card{ background:#fff; border:2px solid #EFE2C4; border-radius:18px; padding:16px; margin-bottom:14px; }
  .card .nm{ font-weight:800; color:var(--coklat); margin-bottom:4px; }
  .muted{ color:#9a7a5e; font-weight:700; font-size:.85rem; }
  .info-row{ display:flex; justify-content:space-between; align-items:center; font-size:.85rem; padding:6px 0; border-bottom:1px solid #F2E4C6; }
  .info-row:last-child{ border-bottom:none; }
  .info-row b{ color:var(--coklat); }
  label{ font-size:.78rem; font-weight:800; color:#8a6a3a; display:block; margin:10px 0 5px; }
  label:first-child{ margin-top:0; }
  input, select{ width:100%; border:2px solid #E7D8BE; border-radius:12px; padding:13px; font-size:1rem; font-family:inherit; font-weight:700; color:var(--coklat); background:#fff; }
  input:focus, select:focus{ outline:none; border-color:var(--kuning); }
  input[data-pin]{ font-family:monospace; letter-spacing:2px; font-weight:800; }
  .btn{ width:100%; border:none; background:var(--kuning); color:#5A3A05; font-weight:900; font-size:1rem; border-radius:13px; padding:13px; cursor:pointer; box-shadow:0 3px 0 var(--kuning-d); font-family:inherit; margin-top:14px; }
  .btn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--kuning-d); }
  .btn[disabled]{ opacity:.55; }
  .btn.sec{ background:#fff; color:var(--coklat); border:2px solid #E7D8BE; box-shadow:none; }
  .btn.sm{ width:auto; padding:9px 12px; font-size:.85rem; margin-top:8px; }
  .btn.red{ background:#C0392B; color:#fff; box-shadow:0 3px 0 #922B21; }
  .row{ display:flex; align-items:center; gap:9px; padding:9px 0; border-top:1px solid #F2E4C6; }
  .row:first-child{ border-top:none; }
  .grow{ flex:1; min-width:0; }
  .nm{ font-weight:900; } .sub{ font-size:.78rem; color:#9a7a5e; font-weight:700; }
  .res{ border-radius:14px; padding:14px; margin-top:14px; }
  .ok{ background:#E7F6E7; border:2px solid #B7E0B7; }
  .warn{ background:#FFF3D6; border:2px solid #F2D98A; }
  .bad{ background:#FDECEC; border:2px solid #F3C2C2; color:#C0392B; }
  a.link{ color:#C98A1B; font-weight:800; text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><h1>Tim Pabrik</h1><span class="badge" id="roleBadge">…</span></div>
  <div id="panel"><div class="card"><div class="muted">Menyiapkan…</div></div></div>
  <div style="text-align:center;margin-top:6px;display:flex;gap:10px;justify-content:center;align-items:center"><a class="link" href="karyawan.html">‹ Profil Saya</a><span class="muted">·</span><a class="link" href="index.html">Beranda</a></div>
</div>

<script type="module" src="core-omaopa.js?v=144"></script>
<script>
(function(){
  var panel=document.getElementById('panel'), busy=false;
  function esc(s){ return String(s==null?'':s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  var DIVISI_HALAMAN = 'Pabrik';
  async function refresh(){
    if(!window.OmaOpa){ panel.innerHTML='<div class="card"><div class="muted">Menyiapkan…</div></div>'; return; }
    var u=window.OmaOpa.getUser();
    if(!u){ renderLogin(); return; }
    panel.innerHTML='<div class="card"><div class="muted">Memeriksa akses…</div></div>';
    var scope=null; try{ scope=await window.OmaOpa.getMyOrgScope(); }catch(e){}
    if(!scope || scope.strukturalLevel==='staff'){
      panel.innerHTML='<div class="card"><div class="res warn">👁️ Halaman ini khusus SPV/Manajer/GM. Akun kamu belum punya wewenang ini — hubungi HRD kalau ini keliru.</div>'
        + '<button class="btn sec" id="outBtn">Keluar</button></div>';
      document.getElementById('outBtn').onclick=async function(){ try{ await window.OmaOpa.signOut(); }catch(e){} refresh(); };
      return;
    }
    if(scope.strukturalLevel!=='gm' && scope.divisi!==DIVISI_HALAMAN){
      panel.innerHTML='<div class="card"><div class="res warn">👁️ Halaman ini khusus divisi '+DIVISI_HALAMAN+'. Akun kamu ada di divisi '+esc(scope.divisi||'lain')+' — hubungi HRD buat halaman tim divisimu.</div>'
        + '<button class="btn sec" id="outBtn">Keluar</button></div>';
      document.getElementById('outBtn').onclick=async function(){ try{ await window.OmaOpa.signOut(); }catch(e){} refresh(); };
      return;
    }
    var rbg=document.getElementById('roleBadge'); if(rbg) rbg.textContent=scope.strukturalLevel.toUpperCase();
    renderApp(scope);
  }

  async function renderApp(scope){
    panel.innerHTML =
      '<div class="card"><div class="nm">🗓️ Buat Jadwal</div><div class="muted" style="font-size:.78rem;margin-bottom:8px">Pilih siapa aja, rentang tanggal, isi jam masuk sekali — langsung ke-apply ke semua yang dipilih.</div>'
      +'<div id="jdTeamBox" class="muted">Memuat tim…</div>'
      +'<label>Dari Tanggal</label><input type="date" id="jdFrom">'
      +'<label>Sampai Tanggal</label><input type="date" id="jdTo">'
      +'<label>Jam Masuk</label><input type="time" id="jdJamMulai">'
      +'<div id="jdShiftLabel" class="muted" style="margin-top:4px"></div>'
      +'<label>Jam Pulang <span style="font-weight:400">(otomatis +8 jam, bisa diedit)</span></label><input type="time" id="jdJamSelesai">'
      +'<button class="btn" id="jdSaveBulk" style="margin-top:10px">💾 Simpan Jadwal buat yang Dipilih</button>'
      +'<div id="jdBulkMsg"></div></div>'
      +'<div class="card"><div class="row" style="border:none;padding:0 0 8px"><div class="grow nm">📊 Ringkasan Shift</div></div>'
      +'<div style="display:flex;gap:6px;margin-bottom:8px"><button class="btn sm sec" id="ringkasP1" style="flex:1">1 Minggu</button><button class="btn sm sec" id="ringkasP2" style="flex:1">2 Minggu</button><button class="btn sm sec" id="ringkasP3" style="flex:1">1 Bulan</button></div>'
      +'<div style="display:flex;gap:6px;align-items:center;margin-bottom:10px"><button class="btn sm sec" id="ringkasPrev" style="width:auto">‹</button><div id="ringkasPeriodLabel" class="muted" style="flex:1;text-align:center;font-weight:800"></div><button class="btn sm sec" id="ringkasNext" style="width:auto">›</button></div>'
      +'<div id="ringkasCalendar"></div>'
      +'<div id="ringkasTable" class="muted" style="margin-top:10px">Memuat…</div></div>'
      +'<div class="card"><div class="nm">📋 Daftar Karyawan</div>'
      +'<select id="timSubDivFilter" style="margin-bottom:8px"><option value="">— semua sub-divisi —</option></select>'
      +'<div id="timList" class="muted">Memuat…</div><button class="btn sec" id="timMore" style="display:none">Muat 10 lagi</button></div>'
      +'<div class="card"><div class="nm">⏰ Approval Lembur</div><div id="lemburApprovalList" class="muted">Memuat…</div></div>'
      +'<div class="card"><div class="nm">🌴 Approval Cuti</div><div id="cutiApprovalList" class="muted">Memuat…</div></div>'
      +'<button class="btn sec" id="outBtn">Keluar</button>';
    document.getElementById('outBtn').onclick=async function(){ try{ await window.OmaOpa.signOut(); }catch(e){} refresh(); };
    await initJadwalForm();
    populateSubDivFilter();
    document.getElementById('timMore').onclick=function(){ loadTim(true); };
    initRingkasan();
    loadTim(false);
    loadLemburApproval();
    loadCutiApproval();
  }

  // shift Pabrik: Pagi mulai ~06-08, Middle mulai ~13-15, Malam mulai ~19-21.
  // klasifikasi dipakai buat label otomatis & deteksi transisi shift.
  function classifyShift(jamMulai){
    if(!jamMulai) return '';
    var h = parseInt(jamMulai.split(':')[0], 10);
    if(isNaN(h)) return '';
    if(h>=0 && h<12) return 'Pagi';
    if(h>=12 && h<18) return 'Middle';
    return 'Malam';
  }
  function addHoursToTime(jamStr, hrs){
    var p = jamStr.split(':').map(Number);
    var total = p[0]*60 + p[1] + hrs*60;
    total = ((total % (24*60)) + 24*60) % (24*60);
    var h = Math.floor(total/60), m = total%60;
    return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  }
  function dateRangeList(fromStr, toStr){
    var out=[]; var d=new Date(fromStr+'T00:00:00'); var end=new Date(toStr+'T00:00:00');
    if(isNaN(d)||isNaN(end)||end<d) return out;
    while(d<=end){ out.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
    return out;
  }
  var HARI_ID=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  var BULAN_ID=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];
  var SHIFT_COLOR = { Pagi:'#4CAF50', Middle:'#FFC21A', Malam:'#2E3A6E', Libur:'#FFFFFF' };

  var _ringkasPeriod='week', _ringkasOffset=0, _ringkasSelectedDate=null, _ringkasRawCache=[];
  function ringkasRange(){
    var now=new Date(); var day=now.getDay(); var mondayOffset=(day===0?-6:1-day);
    if(_ringkasPeriod==='week'){
      var monday=new Date(now); monday.setDate(now.getDate()+mondayOffset+(_ringkasOffset*7));
      var end=new Date(monday); end.setDate(monday.getDate()+6);
      return { from:monday.toISOString().slice(0,10), to:end.toISOString().slice(0,10), label:monday.getDate()+' '+BULAN_ID[monday.getMonth()]+' – '+end.getDate()+' '+BULAN_ID[end.getMonth()] };
    } else if(_ringkasPeriod==='2week'){
      var monday=new Date(now); monday.setDate(now.getDate()+mondayOffset+(_ringkasOffset*14));
      var end=new Date(monday); end.setDate(monday.getDate()+13);
      return { from:monday.toISOString().slice(0,10), to:end.toISOString().slice(0,10), label:monday.getDate()+' '+BULAN_ID[monday.getMonth()]+' – '+end.getDate()+' '+BULAN_ID[end.getMonth()] };
    } else {
      var target=new Date(now.getFullYear(), now.getMonth()+_ringkasOffset, 1);
      var firstDay=new Date(target.getFullYear(), target.getMonth(), 1);
      var lastDay=new Date(target.getFullYear(), target.getMonth()+1, 0);
      return { from:firstDay.toISOString().slice(0,10), to:lastDay.toISOString().slice(0,10), label:BULAN_ID[target.getMonth()]+' '+target.getFullYear() };
    }
  }
  function initRingkasan(){
    document.getElementById('ringkasP1').onclick=function(){ _ringkasPeriod='week'; _ringkasOffset=0; loadRingkasan(); };
    document.getElementById('ringkasP2').onclick=function(){ _ringkasPeriod='2week'; _ringkasOffset=0; loadRingkasan(); };
    document.getElementById('ringkasP3').onclick=function(){ _ringkasPeriod='month'; _ringkasOffset=0; loadRingkasan(); };
    document.getElementById('ringkasPrev').onclick=function(){ _ringkasOffset--; loadRingkasan(); };
    document.getElementById('ringkasNext').onclick=function(){ _ringkasOffset++; loadRingkasan(); };
    loadRingkasan();
  }
  async function loadRingkasan(){
    var calBox=document.getElementById('ringkasCalendar'), tblBox=document.getElementById('ringkasTable'), lblBox=document.getElementById('ringkasPeriodLabel');
    if(!calBox||!tblBox) return;
    document.getElementById('ringkasP1').style.borderColor = _ringkasPeriod==='week' ? 'var(--kuning)' : '#E7D8BE';
    document.getElementById('ringkasP2').style.borderColor = _ringkasPeriod==='2week' ? 'var(--kuning)' : '#E7D8BE';
    document.getElementById('ringkasP3').style.borderColor = _ringkasPeriod==='month' ? 'var(--kuning)' : '#E7D8BE';
    var r=ringkasRange(); lblBox.textContent=r.label;
    calBox.innerHTML='<div class="muted">Memuat…</div>';
    _ringkasRawCache=[]; try{ _ringkasRawCache=await window.OmaOpa.listJadwalSummary(r.from, r.to); }catch(e){}
    var byDate={}; _ringkasRawCache.forEach(function(j){ byDate[j.tanggal]=(byDate[j.tanggal]||0)+1; });
    var dates=dateRangeList(r.from, r.to);
    var firstDate=new Date(r.from+'T00:00:00');
    var leadBlank = _ringkasPeriod==='month' ? firstDate.getDay() : 0; // week/2week selalu mulai Senin, gak perlu blank
    var cells=[]; for(var i=0;i<leadBlank;i++) cells.push('<div></div>');
    var todayStr=new Date().toISOString().slice(0,10);
    dates.forEach(function(t){
      var n=byDate[t]||0; var dObj=new Date(t+'T00:00:00');
      var isSel = t===_ringkasSelectedDate;
      cells.push('<div data-ringkascell="'+t+'" style="cursor:pointer;aspect-ratio:1;border-radius:6px;background:'+(isSel?'var(--kuning)':(t===todayStr?'#FFF3D6':'#F7F0DF'))+';border:1.5px solid '+(isSel?'var(--kuning-d)':'#E7D8BE')+';display:flex;flex-direction:column;align-items:center;justify-content:center">'
        + '<div style="font-size:.68rem;font-weight:800">'+dObj.getDate()+'</div>'+(n?'<div style="font-size:.6rem;color:#8a6a3a;font-weight:800">'+n+'</div>':'')+'</div>');
    });
    calBox.innerHTML = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;font-size:.6rem;text-align:center;font-weight:800;color:#9a7a5e">'
      + ['Sen','Sel','Rab','Kam','Jum','Sab','Min'].map(function(h){return '<div>'+h+'</div>';}).join('')
      + '</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">'+cells.join('')+'</div>';
    calBox.querySelectorAll('[data-ringkascell]').forEach(function(el){ el.onclick=function(){ _ringkasSelectedDate=el.getAttribute('data-ringkascell'); loadRingkasan(); }; });
    if(!_ringkasSelectedDate || _ringkasSelectedDate<r.from || _ringkasSelectedDate>r.to){ _ringkasSelectedDate = (dates.indexOf(todayStr)>=0) ? todayStr : dates[0]; }
    renderBreakdown();
  }
  function renderBreakdown(){
    var tblBox=document.getElementById('ringkasTable'); if(!tblBox) return;
    var raw=_ringkasRawCache.filter(function(j){ return j.tanggal===_ringkasSelectedDate; });
    var byShift={ Pagi:{}, Middle:{}, Malam:{} };
    raw.forEach(function(j){
      var sh=classifyShift(j.jamMulai); if(!sh) return;
      var t=_jdTeamCache.find(function(x){ return x.uid===j.karyawanUid; });
      var pos=(t && t.posisi) ? t.posisi : (t && t.strukturalLevel==='spv' ? 'SPV' : 'Lainnya');
      byShift[sh][pos]=(byShift[sh][pos]||0)+1;
    });
    tblBox.innerHTML = '<div style="font-weight:800;margin-bottom:8px">📅 '+_ringkasSelectedDate+'</div>'
      + ['Pagi','Middle','Malam'].map(function(sh){
      var posMap=byShift[sh]; var total=Object.keys(posMap).reduce(function(s,k){return s+posMap[k];},0);
      var posRows=Object.keys(posMap).sort().map(function(p){ return '<div class="info-row" style="padding:3px 0 3px 14px"><span style="display:flex;align-items:center;gap:6px"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:'+SHIFT_COLOR[sh]+';border:1px solid #0002;flex-shrink:0"></span>'+esc(p)+'</span><b>'+posMap[p]+' orang</b></div>'; }).join('') || '<div class="muted" style="padding:3px 0 3px 14px;font-size:.76rem">Belum ada yang dijadwalkan</div>';
      return '<div style="margin-bottom:10px"><div style="display:flex;align-items:center;gap:8px"><div style="width:14px;height:14px;border-radius:4px;background:'+SHIFT_COLOR[sh]+';border:1px solid #0002"></div><b>'+sh+'</b><span class="muted">('+total+' orang)</span></div>'+posRows+'</div>';
    }).join('');
  }

  var _jdTeamCache = [];
  async function initJadwalForm(){
    var box=document.getElementById('jdTeamBox'); if(!box) return; box.innerHTML='<div class="muted">Memuat tim…</div>';
    _jdTeamCache=[]; try{ _jdTeamCache=await window.OmaOpa.listTeamKaryawan(); }catch(e){}
    if(!_jdTeamCache.length){ box.innerHTML='<div class="muted">Belum ada anggota tim.</div>'; }
    else{
      box.innerHTML = '<div style="max-height:220px;overflow:auto;border:2px solid #E7D8BE;border-radius:10px;padding:8px">'
        + '<label style="display:flex;align-items:center;gap:8px;margin:0 0 6px"><input type="checkbox" id="jdSelAll" style="width:auto"> <b>Pilih semua</b></label>'
        + _jdTeamCache.map(function(t){
            return '<label style="display:flex;align-items:center;gap:8px;margin:4px 0;font-weight:700"><input type="checkbox" class="jdMember" value="'+esc(t.uid)+'" style="width:auto"> '+esc(t.namaLengkap)+' <span class="muted" style="font-size:.72rem">('+esc(t.strukturalLevel==='spv'?'SPV':'Staff')+')</span></label>';
          }).join('')
        + '</div>';
      document.getElementById('jdSelAll').onchange=function(){ var chk=this.checked; box.querySelectorAll('.jdMember').forEach(function(c){ c.checked=chk; }); };
    }
    var jmInput=document.getElementById('jdJamMulai'), jsInput=document.getElementById('jdJamSelesai'), lbl=document.getElementById('jdShiftLabel');
    jmInput.onchange=function(){
      var sh=classifyShift(jmInput.value);
      lbl.textContent = sh ? ('Terdeteksi shift: '+sh) : '';
      if(jmInput.value) jsInput.value = addHoursToTime(jmInput.value, 8);
    };
    document.getElementById('jdSaveBulk').onclick=doBulkSaveJadwal;
  }

  async function doBulkSaveJadwal(){
    if(busy) return;
    var msg=document.getElementById('jdBulkMsg'); msg.innerHTML='';
    var uids=Array.prototype.slice.call(document.querySelectorAll('.jdMember:checked')).map(function(c){ return c.value; });
    var from=document.getElementById('jdFrom').value, to=document.getElementById('jdTo').value;
    var jm=document.getElementById('jdJamMulai').value, js=document.getElementById('jdJamSelesai').value;
    if(!uids.length){ msg.innerHTML='<div class="res bad">Pilih minimal 1 orang dulu.</div>'; return; }
    if(!from||!to){ msg.innerHTML='<div class="res bad">Isi rentang tanggal dulu.</div>'; return; }
    if(!jm||!js){ msg.innerHTML='<div class="res bad">Isi jam masuk & jam pulang dulu.</div>'; return; }
    var dates = dateRangeList(from, to);
    if(!dates.length){ msg.innerHTML='<div class="res bad">Rentang tanggal gak valid (sampai harus setelah dari).</div>'; return; }

    busy=true; document.getElementById('jdSaveBulk').disabled=true; document.getElementById('jdSaveBulk').textContent='Memeriksa…';
    var newShift = classifyShift(jm);
    var warnNames=[];
    for(var i=0;i<uids.length;i++){
      var t=_jdTeamCache.find(function(x){return x.uid===uids[i];});
      try{
        var prior = await window.OmaOpa.getPriorDayJadwal(uids[i], from);
        if(prior && prior.jamMulai){
          var priorShift = classifyShift(prior.jamMulai);
          if(priorShift && priorShift!==newShift) warnNames.push((t?t.namaLengkap:uids[i])+' ('+priorShift+' → '+newShift+')');
        }
      }catch(e){}
    }
    if(warnNames.length){
      var ok=confirm('⚠️ '+warnNames.length+' orang keliatan ganti shift TANPA hari libur di antaranya:\n\n'+warnNames.join('\n')+'\n\nLanjut simpan jadwal ini? (Kalau ini kasus khusus/emang disengaja, klik OK)');
      if(!ok){ busy=false; document.getElementById('jdSaveBulk').disabled=false; document.getElementById('jdSaveBulk').textContent='💾 Simpan Jadwal buat yang Dipilih'; return; }
    }

    document.getElementById('jdSaveBulk').textContent='Menyimpan…';
    var okCount=0, failCount=0;
    for(var u=0;u<uids.length;u++){
      for(var d=0;d<dates.length;d++){
        try{ await window.OmaOpa.saveJadwal(uids[u], dates[d], jm, js); okCount++; }
        catch(e){ failCount++; }
      }
    }
    msg.innerHTML='<div class="res ok">✓ '+okCount+' jadwal tersimpan'+(failCount?(' ('+failCount+' gagal)'):'')+'.</div>';
    document.getElementById('jdSaveBulk').disabled=false; document.getElementById('jdSaveBulk').textContent='💾 Simpan Jadwal buat yang Dipilih';
    busy=false;
    loadTim(false);
    loadRingkasan();
  }

  var _timCursor=null, _timAccum=[];
  function populateSubDivFilter(){
    var sel=document.getElementById('timSubDivFilter'); if(!sel) return;
    var subs=[]; _jdTeamCache.forEach(function(t){ if(t.subDivisi && subs.indexOf(t.subDivisi)<0) subs.push(t.subDivisi); });
    var cur=sel.value;
    sel.innerHTML='<option value="">— semua sub-divisi —</option>'+subs.map(function(s){ return '<option>'+esc(s)+'</option>'; }).join('');
    sel.value=cur;
    sel.onchange=function(){ loadTim(false); };
  }
  async function loadTim(loadMore){
    var box=document.getElementById('timList'); var moreBtn=document.getElementById('timMore'); if(!box) return;
    if(!loadMore){ _timCursor=null; _timAccum=[]; box.innerHTML='<div class="muted">Memuat…</div>'; }
    var subDiv=(document.getElementById('timSubDivFilter')||{}).value||'';
    var res={items:[],hasMore:false,cursor:null}; try{ res=await window.OmaOpa.listTeamKaryawanPaged({ subDivisi:subDiv||undefined, cursor:_timCursor }); }catch(e){}
    _timAccum=_timAccum.concat(res.items||[]); _timCursor=res.cursor;
    moreBtn.style.display = res.hasMore ? 'block' : 'none';
    if(!_timAccum.length){ box.innerHTML='<div class="muted">Belum ada anggota tim'+(subDiv?' di sub-divisi ini':'')+'.</div>'; return; }
    var tgl=new Date().toISOString().slice(0,10); // selalu hari ini, gak ikut tanggal kalender Ringkasan Shift
    var raw=[]; try{ raw=await window.OmaOpa.listJadwalSummary(tgl, tgl); }catch(e){}
    var shiftByUid={}; raw.forEach(function(j){ shiftByUid[j.karyawanUid]=classifyShift(j.jamMulai); });
    box.innerHTML = _timAccum.map(function(t){
      var sh=shiftByUid[t.uid] || 'Libur';
      var color=SHIFT_COLOR[sh];
      return '<div class="row" data-karyawanrow="'+esc(t.uid)+'" style="cursor:pointer">'
        + '<div style="width:16px;height:16px;border-radius:50%;background:'+color+';border:1.5px solid #0002;flex-shrink:0"></div>'
        + '<div class="grow"><div class="nm">'+esc(t.namaLengkap)+'</div><div class="sub">'+esc(t.posisi||(t.strukturalLevel==='spv'?'SPV':'-'))+' · '+esc(t.subDivisi||'-')+' · '+esc(sh)+'</div></div>'
        + '<span class="muted">›</span></div>';
    }).join('');
    box.querySelectorAll('[data-karyawanrow]').forEach(function(el){ el.onclick=function(){ var t=_timAccum.find(function(x){return x.uid===el.getAttribute('data-karyawanrow');}); if(t) openKaryawanJadwalDetail(t); }; });
  }

  async function openKaryawanJadwalDetail(t){
    var bk=document.createElement('div');
    bk.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px';
    var now=new Date();
    var state={ year:now.getFullYear(), month:now.getMonth() };
    bk.innerHTML='<div style="background:#fff;border-radius:16px;padding:18px;max-width:360px;width:100%;max-height:88vh;overflow:auto">'
      +'<div style="font-weight:800;color:var(--coklat);margin-bottom:4px">'+esc(t.namaLengkap)+'</div>'
      +'<div class="muted" style="font-size:.76rem;margin-bottom:10px">'+esc(t.posisi||(t.strukturalLevel==='spv'?'SPV':'-'))+'</div>'
      +'<div style="display:flex;align-items:center;gap:6px;margin-bottom:10px"><button class="btn sm sec" id="dtPrev" style="width:auto">‹</button><div id="dtLabel" class="muted" style="flex:1;text-align:center;font-weight:800"></div><button class="btn sm sec" id="dtNext" style="width:auto">›</button></div>'
      +'<div id="dtGrid"></div>'
      +'<div id="dtEditPanel" style="display:none;border-top:1px dashed #E7D8BE;margin-top:10px;padding-top:10px"></div>'
      +'<div style="display:flex;gap:10px;margin-top:10px;flex-wrap:wrap;font-size:.72rem">'
        +'<span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:'+SHIFT_COLOR.Pagi+';border:1px solid #0002"></span> Pagi</span>'
        +'<span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:'+SHIFT_COLOR.Middle+';border:1px solid #0002"></span> Middle</span>'
        +'<span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:'+SHIFT_COLOR.Malam+';border:1px solid #0002"></span> Malam</span>'
        +'<span><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:'+SHIFT_COLOR.Libur+';border:1px solid #0002"></span> Libur (klik buat isi jadwal baru)</span>'
      +'</div>'
      +'<button class="btn sec" id="dtClose" style="margin-top:14px">Tutup</button>'
      +'</div>';
    document.body.appendChild(bk);
    bk.onclick=function(e){ if(e.target===bk) bk.remove(); };
    bk.querySelector('#dtClose').onclick=function(){ bk.remove(); };
    var _byDateCache={};
    function showEditPanel(dateStr){
      var panel=bk.querySelector('#dtEditPanel');
      var existing=_byDateCache[dateStr]; // {jamMulai, jamSelesai} kalau ada
      panel.innerHTML = '<div style="font-weight:800;margin-bottom:6px">'+dateStr+'</div>'
        + '<div style="display:flex;gap:8px"><div style="flex:1"><label>Jam Masuk</label><input type="time" id="dtJm" value="'+(existing?esc(existing.jamMulai):'')+'"></div><div style="flex:1"><label>Jam Selesai</label><input type="time" id="dtJs" value="'+(existing?esc(existing.jamSelesai):'')+'"></div></div>'
        + '<div style="display:flex;gap:8px;margin-top:8px"><button class="btn sm" id="dtSave" style="flex:1">💾 '+(existing?'Simpan Perubahan':'Simpan Jadwal Baru')+'</button>'
        + (existing? '<button class="btn sm red" id="dtDel" style="flex:1">🗑 Hapus</button>' : '')
        + '</div><div id="dtEditMsg"></div>';
      panel.style.display='block';
      bk.querySelector('#dtSave').onclick=async function(){
        if(busy) return; var jm=bk.querySelector('#dtJm').value, js=bk.querySelector('#dtJs').value;
        var msgEl=bk.querySelector('#dtEditMsg');
        if(!jm||!js){ msgEl.innerHTML='<div class="res bad">Isi jam masuk & selesai dulu.</div>'; return; }
        busy=true; this.disabled=true;
        try{ await window.OmaOpa.saveJadwal(t.uid, dateStr, jm, js); panel.style.display='none'; renderGrid(); loadTim(false); loadRingkasan(); }
        catch(e){ msgEl.innerHTML='<div class="res bad">'+esc((e&&e.message)||'Gagal')+'</div>'; }
        this.disabled=false; busy=false;
      };
      if(existing){
        bk.querySelector('#dtDel').onclick=async function(){
          if(busy) return; if(!confirm('Hapus jadwal tanggal '+dateStr+'?')) return;
          busy=true; this.disabled=true;
          try{ await window.OmaOpa.deleteJadwal(t.uid, dateStr); panel.style.display='none'; renderGrid(); loadTim(false); loadRingkasan(); }
          catch(e){ alert((e&&e.message)||'Gagal'); }
          this.disabled=false; busy=false;
        };
      }
    }
    async function renderGrid(){
      var firstDay=new Date(state.year, state.month, 1), lastDay=new Date(state.year, state.month+1, 0);
      var fromStr=firstDay.toISOString().slice(0,10), toStr=lastDay.toISOString().slice(0,10);
      bk.querySelector('#dtLabel').textContent=BULAN_ID[state.month]+' '+state.year;
      bk.querySelector('#dtGrid').innerHTML='<div class="muted">Memuat…</div>';
      bk.querySelector('#dtEditPanel').style.display='none';
      var entries=[]; try{ entries=await window.OmaOpa.listJadwalForKaryawan(t.uid, fromStr, toStr); }catch(e){}
      _byDateCache={}; entries.forEach(function(j){ _byDateCache[j.tanggal]={jamMulai:j.jamMulai, jamSelesai:j.jamSelesai}; });
      var startWeekday=firstDay.getDay(); // 0=minggu
      var cells=[];
      for(var i=0;i<startWeekday;i++) cells.push('<div></div>');
      for(var d=1; d<=lastDay.getDate(); d++){
        var dateStr=new Date(state.year, state.month, d).toISOString().slice(0,10);
        var jm=_byDateCache[dateStr] ? _byDateCache[dateStr].jamMulai : null; var sh=jm ? classifyShift(jm) : 'Libur';
        cells.push('<div data-daycell="'+dateStr+'" title="'+dateStr+(jm?(' - '+jm):' - Libur')+'" style="cursor:pointer;aspect-ratio:1;border-radius:6px;background:'+SHIFT_COLOR[sh]+';border:1px solid #0002;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:800;color:'+(sh==='Libur'||sh==='Middle'?'#613925':'#fff')+'">'+d+'</div>');
      }
      bk.querySelector('#dtGrid').innerHTML = '<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:4px;font-size:.66rem;text-align:center;font-weight:800;color:#9a7a5e">'
        + ['Min','Sen','Sel','Rab','Kam','Jum','Sab'].map(function(h){return '<div>'+h+'</div>';}).join('')
        + '</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">'+cells.join('')+'</div>';
      bk.querySelectorAll('[data-daycell]').forEach(function(el){ el.onclick=function(){ showEditPanel(el.getAttribute('data-daycell')); }; });
    }
    bk.querySelector('#dtPrev').onclick=function(){ state.month--; if(state.month<0){state.month=11;state.year--;} renderGrid(); };
    bk.querySelector('#dtNext').onclick=function(){ state.month++; if(state.month>11){state.month=0;state.year++;} renderGrid(); };
    renderGrid();
  }


  async function loadLemburApproval(){
    var box=document.getElementById('lemburApprovalList'); if(!box) return; box.innerHTML='<div class="muted">Memuat…</div>';
    var pending=[]; try{ pending=await window.OmaOpa.listLemburToApprove(); }catch(e){}
    if(!pending.length){ box.innerHTML='<div class="muted">Gak ada lembur yang perlu di-approve.</div>'; return; }
    box.innerHTML = pending.map(function(l){
      return '<div class="row" style="flex-wrap:wrap"><div class="grow" style="min-width:150px"><div class="nm">'+esc(l.namaKaryawan)+'</div>'
        + '<div class="sub">'+esc(l.tanggal)+' · Keluar '+esc(l.jamKeluarAktual)+' (jadwal s/d '+esc(l.jamSelesaiJadwal)+') · +'+l.durasiLemburMenit+' menit</div></div>'
        + '<div style="display:flex;gap:5px;flex-wrap:wrap;width:100%;margin-top:7px"><button class="btn sm sec" data-lemburacc="'+esc(l.id)+'">✓ Setujui</button><button class="btn sm red" data-lemburrej="'+esc(l.id)+'">✕ Tolak</button></div>'
        + '</div>';
    }).join('');
    box.querySelectorAll('[data-lemburacc]').forEach(function(b){ b.onclick=async function(){ if(busy) return; busy=true; b.disabled=true; try{ await window.OmaOpa.approveLembur(b.getAttribute('data-lemburacc'),''); loadLemburApproval(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-lemburrej]').forEach(function(b){ b.onclick=async function(){ if(busy) return; var catatan=prompt('Alasan tolak (opsional):')||''; busy=true; b.disabled=true; try{ await window.OmaOpa.rejectLembur(b.getAttribute('data-lemburrej'),catatan); loadLemburApproval(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
  }

  async function loadCutiApproval(){
    var box=document.getElementById('cutiApprovalList'); if(!box) return; box.innerHTML='<div class="muted">Memuat…</div>';
    var pending=[]; try{ pending=await window.OmaOpa.listCutiToApprove(); }catch(e){}
    if(!pending.length){ box.innerHTML='<div class="muted">Gak ada pengajuan cuti yang perlu di-approve.</div>'; return; }
    box.innerHTML = pending.map(function(c){
      return '<div class="row" style="flex-wrap:wrap"><div class="grow" style="min-width:150px"><div class="nm">'+esc(c.namaKaryawan)+'</div>'
        + '<div class="sub">'+esc(c.jenisCuti||'-')+' · '+esc(c.tanggalMulai||'-')+' s/d '+esc(c.tanggalSelesai||'-')+(c.alasan?(' · "'+esc(c.alasan)+'"'):'')+'</div></div>'
        + '<div style="display:flex;gap:5px;flex-wrap:wrap;width:100%;margin-top:7px"><button class="btn sm sec" data-cutiacc="'+esc(c.id)+'">✓ Setujui</button><button class="btn sm red" data-cutirej="'+esc(c.id)+'">✕ Tolak</button></div>'
        + '</div>';
    }).join('');
    box.querySelectorAll('[data-cutiacc]').forEach(function(b){ b.onclick=async function(){ if(busy) return; busy=true; b.disabled=true; try{ await window.OmaOpa.approveCuti(b.getAttribute('data-cutiacc'),''); loadCutiApproval(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-cutirej]').forEach(function(b){ b.onclick=async function(){ if(busy) return; var catatan=prompt('Alasan tolak (opsional):')||''; busy=true; b.disabled=true; try{ await window.OmaOpa.rejectCuti(b.getAttribute('data-cutirej'),catatan); loadCutiApproval(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
  }

  function renderLogin(){
    panel.innerHTML = '<div class="card"><div class="nm">Masuk sebagai Karyawan</div>'
      + '<div class="muted" style="margin-bottom:8px">Pakai akun karyawan yang sama seperti di halaman Absensi/Profil.</div>'
      + '<label>Nomor HP</label><input id="lPhone" type="tel" inputmode="numeric" placeholder="08xxxxxxxxxx" autocomplete="off">'
      + '<label>PIN (6 angka)</label><input id="lPin" data-pin type="password" inputmode="numeric" maxlength="6" placeholder="••••••">'
      + '<button class="btn" id="lBtn">Masuk</button><div id="lMsg"></div></div>';
    document.getElementById('lBtn').onclick = async function(){
      if(busy) return; busy=true; var b=this; b.disabled=true; b.textContent='Memproses…';
      var msg=document.getElementById('lMsg'); msg.innerHTML='';
      try{
        await window.OmaOpa.loginKaryawan(document.getElementById('lPhone').value, document.getElementById('lPin').value);
        refresh();
      }catch(e){
        msg.innerHTML='<div class="res bad">'+esc((e&&e.message)||'Nomor HP atau PIN salah.')+'</div>';
        b.disabled=false; b.textContent='Masuk';
      }
      busy=false;
    };
  }

  window.addEventListener('omaopa:ready', refresh);
  window.addEventListener('omaopa:change', refresh);
  setTimeout(refresh, 800);
})();
</script>
</body>
</html>
