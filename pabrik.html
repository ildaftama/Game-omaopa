<!DOCTYPE html>
<html lang="id">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Tim Pabrik — Oma Opa Cakery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --kuning:#FACC1A; --kuning-d:#E0B100; --coklat:#613925; --cream:#FFF8EC; }
  *{box-sizing:border-box}
  body{ margin:0; font-family:'Nunito',system-ui,sans-serif; color:var(--coklat);
    background:radial-gradient(circle at 12% 8%, #FFE7B8 0%, transparent 42%), var(--cream);
    min-height:100vh; padding:18px 14px 40px; }
  .wrap{ max-width:460px; margin:0 auto; }
  .head{ display:flex; align-items:center; gap:10px; margin-bottom:14px; }
  .head h1{ font-family:'Fredoka'; font-size:1.2rem; margin:0; color:var(--coklat); }
  .head .badge{ font-size:.66rem; font-weight:900; background:var(--kuning); color:#5A3A05; padding:2px 9px; border-radius:999px; }
  .card{ background:#fff; border:2px solid #EFE2C4; border-radius:18px; padding:16px; margin-bottom:14px; }
  .card .nm{ font-weight:800; color:var(--coklat); margin-bottom:4px; }
  .muted{ color:#9a7a5e; font-weight:700; font-size:.85rem; }
  label{ font-size:.78rem; font-weight:800; color:#8a6a3a; display:block; margin:10px 0 5px; }
  label:first-child{ margin-top:0; }
  input, select{ width:100%; border:2px solid #E7D8BE; border-radius:12px; padding:13px; font-size:1rem; font-family:inherit; font-weight:700; color:var(--coklat); background:#fff; }
  input:focus, select:focus{ outline:none; border-color:var(--kuning); }
  input[data-pin]{ font-family:monospace; letter-spacing:2px; font-weight:800; }
  .btn{ width:100%; border:none; background:var(--kuning); color:#5A3A05; font-weight:900; font-size:1rem; border-radius:13px; padding:13px; cursor:pointer; box-shadow:0 3px 0 var(--kuning-d); font-family:inherit; margin-top:14px; }
  .btn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--kuning-d); }
  .btn[disabled]{ opacity:.55; }
  .btn.sec{ background:#fff; color:var(--coklat); border:2px solid #E7D8BE; box-shadow:none; }
  .btn.sm{ width:auto; padding:9px 12px; font-size:.85rem; margin-top:8px; }
  .btn.red{ background:#C0392B; color:#fff; box-shadow:0 3px 0 #922B21; }
  .row{ display:flex; align-items:center; gap:9px; padding:9px 0; border-top:1px solid #F2E4C6; }
  .row:first-child{ border-top:none; }
  .grow{ flex:1; min-width:0; }
  .nm{ font-weight:900; } .sub{ font-size:.78rem; color:#9a7a5e; font-weight:700; }
  .res{ border-radius:14px; padding:14px; margin-top:14px; }
  .ok{ background:#E7F6E7; border:2px solid #B7E0B7; }
  .warn{ background:#FFF3D6; border:2px solid #F2D98A; }
  .bad{ background:#FDECEC; border:2px solid #F3C2C2; color:#C0392B; }
  a.link{ color:#C98A1B; font-weight:800; text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><h1>Tim Pabrik</h1><span class="badge" id="roleBadge">…</span></div>
  <div id="panel"><div class="card"><div class="muted">Menyiapkan…</div></div></div>
  <div style="text-align:center;margin-top:6px;display:flex;gap:10px;justify-content:center;align-items:center"><a class="link" href="karyawan.html">‹ Profil Saya</a><span class="muted">·</span><a class="link" href="index.html">Beranda</a></div>
</div>

<script type="module" src="core-omaopa.js?v=140"></script>
<script>
(function(){
  var panel=document.getElementById('panel'), busy=false;
  function esc(s){ return String(s==null?'':s).replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

  var DIVISI_HALAMAN = 'Pabrik';
  async function refresh(){
    if(!window.OmaOpa){ panel.innerHTML='<div class="card"><div class="muted">Menyiapkan…</div></div>'; return; }
    var u=window.OmaOpa.getUser();
    if(!u){ renderLogin(); return; }
    panel.innerHTML='<div class="card"><div class="muted">Memeriksa akses…</div></div>';
    var scope=null; try{ scope=await window.OmaOpa.getMyOrgScope(); }catch(e){}
    if(!scope || scope.strukturalLevel==='staff'){
      panel.innerHTML='<div class="card"><div class="res warn">👁️ Halaman ini khusus SPV/Manajer/GM. Akun kamu belum punya wewenang ini — hubungi HRD kalau ini keliru.</div>'
        + '<button class="btn sec" id="outBtn">Keluar</button></div>';
      document.getElementById('outBtn').onclick=async function(){ try{ await window.OmaOpa.signOut(); }catch(e){} refresh(); };
      return;
    }
    if(scope.strukturalLevel!=='gm' && scope.divisi!==DIVISI_HALAMAN){
      panel.innerHTML='<div class="card"><div class="res warn">👁️ Halaman ini khusus divisi '+DIVISI_HALAMAN+'. Akun kamu ada di divisi '+esc(scope.divisi||'lain')+' — hubungi HRD buat halaman tim divisimu.</div>'
        + '<button class="btn sec" id="outBtn">Keluar</button></div>';
      document.getElementById('outBtn').onclick=async function(){ try{ await window.OmaOpa.signOut(); }catch(e){} refresh(); };
      return;
    }
    var rbg=document.getElementById('roleBadge'); if(rbg) rbg.textContent=scope.strukturalLevel.toUpperCase();
    renderApp(scope);
  }

  function renderApp(scope){
    panel.innerHTML =
      '<div class="card"><div class="nm">🗓️ Buat Jadwal</div><div class="muted" style="font-size:.78rem;margin-bottom:8px">Pilih siapa aja, rentang tanggal, isi jam masuk sekali — langsung ke-apply ke semua yang dipilih.</div>'
      +'<div id="jdTeamBox" class="muted">Memuat tim…</div>'
      +'<label>Dari Tanggal</label><input type="date" id="jdFrom">'
      +'<label>Sampai Tanggal</label><input type="date" id="jdTo">'
      +'<label>Jam Masuk</label><input type="time" id="jdJamMulai">'
      +'<div id="jdShiftLabel" class="muted" style="margin-top:4px"></div>'
      +'<label>Jam Pulang <span style="font-weight:400">(otomatis +8 jam, bisa diedit)</span></label><input type="time" id="jdJamSelesai">'
      +'<button class="btn" id="jdSaveBulk" style="margin-top:10px">💾 Simpan Jadwal buat yang Dipilih</button>'
      +'<div id="jdBulkMsg"></div></div>'
      +'<div class="card"><div class="row" style="border:none;padding:0 0 8px"><div class="grow nm">📊 Ringkasan Jadwal</div></div>'
      +'<div style="display:flex;gap:6px;margin-bottom:10px"><button class="btn sm sec" id="ringkasWeek" style="flex:1">Minggu Ini</button><button class="btn sm sec" id="ringkasMonth" style="flex:1">Bulan Ini</button></div>'
      +'<div style="display:flex;gap:6px;align-items:center;margin-bottom:10px"><button class="btn sm sec" id="ringkasPrev" style="width:auto">‹ Sebelumnya</button><div id="ringkasPeriodLabel" class="muted" style="flex:1;text-align:center;font-weight:800"></div><button class="btn sm sec" id="ringkasNext" style="width:auto">Berikutnya ›</button></div>'
      +'<div id="ringkasTotal" style="display:flex;gap:8px;margin-bottom:10px"></div>'
      +'<div id="ringkasTable" class="muted">Memuat…</div></div>'
      +'<div class="card"><div class="nm">📋 Jadwal Sudah Dibuat</div><div id="timList" class="muted">Memuat…</div></div>'
      +'<div class="card"><div class="nm">⏰ Approval Lembur</div><div id="lemburApprovalList" class="muted">Memuat…</div></div>'
      +'<div class="card"><div class="nm">🌴 Approval Cuti</div><div id="cutiApprovalList" class="muted">Memuat…</div></div>'
      +'<button class="btn sec" id="outBtn">Keluar</button>';
    document.getElementById('outBtn').onclick=async function(){ try{ await window.OmaOpa.signOut(); }catch(e){} refresh(); };
    initJadwalForm();
    initRingkasan();
    loadTim();
    loadLemburApproval();
    loadCutiApproval();
  }

  // shift Pabrik: Pagi mulai ~06-08, Middle mulai ~13-15, Malam mulai ~19-21.
  // klasifikasi dipakai buat label otomatis & deteksi transisi shift.
  function classifyShift(jamMulai){
    if(!jamMulai) return '';
    var h = parseInt(jamMulai.split(':')[0], 10);
    if(isNaN(h)) return '';
    if(h>=0 && h<12) return 'Pagi';
    if(h>=12 && h<18) return 'Middle';
    return 'Malam';
  }
  function addHoursToTime(jamStr, hrs){
    var p = jamStr.split(':').map(Number);
    var total = p[0]*60 + p[1] + hrs*60;
    total = ((total % (24*60)) + 24*60) % (24*60);
    var h = Math.floor(total/60), m = total%60;
    return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  }
  function dateRangeList(fromStr, toStr){
    var out=[]; var d=new Date(fromStr+'T00:00:00'); var end=new Date(toStr+'T00:00:00');
    if(isNaN(d)||isNaN(end)||end<d) return out;
    while(d<=end){ out.push(d.toISOString().slice(0,10)); d.setDate(d.getDate()+1); }
    return out;
  }
  var HARI_ID=['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
  var BULAN_ID=['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

  var _ringkasMode='week', _ringkasOffset=0;
  function ringkasRange(){
    var now=new Date();
    if(_ringkasMode==='week'){
      var day=now.getDay(); var mondayOffset=(day===0?-6:1-day);
      var monday=new Date(now); monday.setDate(now.getDate()+mondayOffset+(_ringkasOffset*7));
      var sunday=new Date(monday); sunday.setDate(monday.getDate()+6);
      return { from:monday.toISOString().slice(0,10), to:sunday.toISOString().slice(0,10), label:'Minggu '+monday.getDate()+' '+BULAN_ID[monday.getMonth()]+' – '+sunday.getDate()+' '+BULAN_ID[sunday.getMonth()] };
    } else {
      var target=new Date(now.getFullYear(), now.getMonth()+_ringkasOffset, 1);
      var firstDay=new Date(target.getFullYear(), target.getMonth(), 1);
      var lastDay=new Date(target.getFullYear(), target.getMonth()+1, 0);
      return { from:firstDay.toISOString().slice(0,10), to:lastDay.toISOString().slice(0,10), label:BULAN_ID[target.getMonth()]+' '+target.getFullYear() };
    }
  }
  function initRingkasan(){
    document.getElementById('ringkasWeek').onclick=function(){ _ringkasMode='week'; _ringkasOffset=0; loadRingkasan(); };
    document.getElementById('ringkasMonth').onclick=function(){ _ringkasMode='month'; _ringkasOffset=0; loadRingkasan(); };
    document.getElementById('ringkasPrev').onclick=function(){ _ringkasOffset--; loadRingkasan(); };
    document.getElementById('ringkasNext').onclick=function(){ _ringkasOffset++; loadRingkasan(); };
    loadRingkasan();
  }
  async function loadRingkasan(){
    var totBox=document.getElementById('ringkasTotal'), tblBox=document.getElementById('ringkasTable'), lblBox=document.getElementById('ringkasPeriodLabel');
    if(!totBox||!tblBox) return;
    document.getElementById('ringkasWeek').style.borderColor = _ringkasMode==='week' ? 'var(--kuning)' : '#E7D8BE';
    document.getElementById('ringkasMonth').style.borderColor = _ringkasMode==='month' ? 'var(--kuning)' : '#E7D8BE';
    var r=ringkasRange(); lblBox.textContent=r.label;
    tblBox.innerHTML='<div class="muted">Memuat…</div>';
    var raw=[]; try{ raw=await window.OmaOpa.listJadwalSummary(r.from, r.to); }catch(e){}
    var byDate={};
    raw.forEach(function(j){
      var sh=classifyShift(j.jamMulai); if(!sh) return;
      if(!byDate[j.tanggal]) byDate[j.tanggal]={Pagi:0,Middle:0,Malam:0};
      byDate[j.tanggal][sh]++;
    });
    var totalP=0, totalM=0, totalMl=0;
    Object.keys(byDate).forEach(function(t){ totalP+=byDate[t].Pagi; totalM+=byDate[t].Middle; totalMl+=byDate[t].Malam; });
    totBox.innerHTML = [
      {lbl:'🌅 Pagi', n:totalP, c:'#FF8C5A'},
      {lbl:'☀️ Middle', n:totalM, c:'#FFC21A'},
      {lbl:'🌙 Malam', n:totalMl, c:'#2E3A6E'}
    ].map(function(s){ return '<div style="flex:1;background:'+s.c+';border-radius:10px;padding:10px 6px;text-align:center;color:#fff"><div style="font-size:1.3rem;font-weight:900">'+s.n+'</div><div style="font-size:.68rem;font-weight:800">'+s.lbl+'</div></div>'; }).join('');
    var dates = dateRangeList(r.from, r.to);
    var maxCount = 1; dates.forEach(function(t){ var c=byDate[t]; if(c) maxCount=Math.max(maxCount, c.Pagi, c.Middle, c.Malam); });
    tblBox.innerHTML = dates.map(function(t){
      var c = byDate[t] || {Pagi:0,Middle:0,Malam:0};
      var dObj=new Date(t+'T00:00:00');
      function bar(n, color){ var w = n? Math.max(14, Math.round((n/maxCount)*100)) : 0; return '<div style="display:flex;align-items:center;gap:5px;margin:2px 0"><div style="width:'+w+'%;min-width:'+(n?'14px':'0')+';background:'+color+';border-radius:5px;height:14px"></div><span style="font-size:.72rem;font-weight:800">'+(n||'')+'</span></div>'; }
      return '<div style="border-top:1px solid #F2E8D5;padding:7px 0"><div style="font-size:.78rem;font-weight:800;margin-bottom:3px">'+HARI_ID[dObj.getDay()]+', '+dObj.getDate()+' '+BULAN_ID[dObj.getMonth()]+'</div>'
        + bar(c.Pagi,'#FF8C5A') + bar(c.Middle,'#FFC21A') + bar(c.Malam,'#2E3A6E')
        + '</div>';
    }).join('');
  }

  var _jdTeamCache = [];
  async function initJadwalForm(){
    var box=document.getElementById('jdTeamBox'); if(!box) return; box.innerHTML='<div class="muted">Memuat tim…</div>';
    _jdTeamCache=[]; try{ _jdTeamCache=await window.OmaOpa.listTeamKaryawan(); }catch(e){}
    if(!_jdTeamCache.length){ box.innerHTML='<div class="muted">Belum ada anggota tim.</div>'; }
    else{
      box.innerHTML = '<div style="max-height:220px;overflow:auto;border:2px solid #E7D8BE;border-radius:10px;padding:8px">'
        + '<label style="display:flex;align-items:center;gap:8px;margin:0 0 6px"><input type="checkbox" id="jdSelAll" style="width:auto"> <b>Pilih semua</b></label>'
        + _jdTeamCache.map(function(t){
            return '<label style="display:flex;align-items:center;gap:8px;margin:4px 0;font-weight:700"><input type="checkbox" class="jdMember" value="'+esc(t.uid)+'" style="width:auto"> '+esc(t.namaLengkap)+' <span class="muted" style="font-size:.72rem">('+esc(t.strukturalLevel==='spv'?'SPV':'Staff')+')</span></label>';
          }).join('')
        + '</div>';
      document.getElementById('jdSelAll').onchange=function(){ var chk=this.checked; box.querySelectorAll('.jdMember').forEach(function(c){ c.checked=chk; }); };
    }
    var jmInput=document.getElementById('jdJamMulai'), jsInput=document.getElementById('jdJamSelesai'), lbl=document.getElementById('jdShiftLabel');
    jmInput.onchange=function(){
      var sh=classifyShift(jmInput.value);
      lbl.textContent = sh ? ('Terdeteksi shift: '+sh) : '';
      if(jmInput.value) jsInput.value = addHoursToTime(jmInput.value, 8);
    };
    document.getElementById('jdSaveBulk').onclick=doBulkSaveJadwal;
  }

  async function doBulkSaveJadwal(){
    if(busy) return;
    var msg=document.getElementById('jdBulkMsg'); msg.innerHTML='';
    var uids=Array.prototype.slice.call(document.querySelectorAll('.jdMember:checked')).map(function(c){ return c.value; });
    var from=document.getElementById('jdFrom').value, to=document.getElementById('jdTo').value;
    var jm=document.getElementById('jdJamMulai').value, js=document.getElementById('jdJamSelesai').value;
    if(!uids.length){ msg.innerHTML='<div class="res bad">Pilih minimal 1 orang dulu.</div>'; return; }
    if(!from||!to){ msg.innerHTML='<div class="res bad">Isi rentang tanggal dulu.</div>'; return; }
    if(!jm||!js){ msg.innerHTML='<div class="res bad">Isi jam masuk & jam pulang dulu.</div>'; return; }
    var dates = dateRangeList(from, to);
    if(!dates.length){ msg.innerHTML='<div class="res bad">Rentang tanggal gak valid (sampai harus setelah dari).</div>'; return; }

    busy=true; document.getElementById('jdSaveBulk').disabled=true; document.getElementById('jdSaveBulk').textContent='Memeriksa…';
    var newShift = classifyShift(jm);
    var warnNames=[];
    for(var i=0;i<uids.length;i++){
      var t=_jdTeamCache.find(function(x){return x.uid===uids[i];});
      try{
        var prior = await window.OmaOpa.getPriorDayJadwal(uids[i], from);
        if(prior && prior.jamMulai){
          var priorShift = classifyShift(prior.jamMulai);
          if(priorShift && priorShift!==newShift) warnNames.push((t?t.namaLengkap:uids[i])+' ('+priorShift+' → '+newShift+')');
        }
      }catch(e){}
    }
    if(warnNames.length){
      var ok=confirm('⚠️ '+warnNames.length+' orang keliatan ganti shift TANPA hari libur di antaranya:\n\n'+warnNames.join('\n')+'\n\nLanjut simpan jadwal ini? (Kalau ini kasus khusus/emang disengaja, klik OK)');
      if(!ok){ busy=false; document.getElementById('jdSaveBulk').disabled=false; document.getElementById('jdSaveBulk').textContent='💾 Simpan Jadwal buat yang Dipilih'; return; }
    }

    document.getElementById('jdSaveBulk').textContent='Menyimpan…';
    var okCount=0, failCount=0;
    for(var u=0;u<uids.length;u++){
      for(var d=0;d<dates.length;d++){
        try{ await window.OmaOpa.saveJadwal(uids[u], dates[d], jm, js); okCount++; }
        catch(e){ failCount++; }
      }
    }
    msg.innerHTML='<div class="res ok">✓ '+okCount+' jadwal tersimpan'+(failCount?(' ('+failCount+' gagal)'):'')+'.</div>';
    document.getElementById('jdSaveBulk').disabled=false; document.getElementById('jdSaveBulk').textContent='💾 Simpan Jadwal buat yang Dipilih';
    busy=false;
    loadTim();
    loadRingkasan();
  }

  async function loadTim(){
    var box=document.getElementById('timList'); if(!box) return; box.innerHTML='<div class="muted">Memuat…</div>';
    var team=_jdTeamCache.length ? _jdTeamCache : (function(){ return []; })();
    if(!team.length){ try{ team=await window.OmaOpa.listTeamKaryawan(); }catch(e){} }
    if(!team.length){ box.innerHTML='<div class="muted">Belum ada anggota tim.</div>'; return; }
    var today=new Date().toISOString().slice(0,10);
    var rows=[];
    for(var i=0;i<team.length;i++){
      var t=team[i]; var upcoming=[];
      try{ upcoming=await window.OmaOpa.listJadwalForKaryawan(t.uid, today, null); }catch(e){}
      if(upcoming.length){
        rows.push('<div style="border-top:1px dashed #E7D8BE;padding-top:8px;margin-top:8px"><b style="font-size:.85rem">'+esc(t.namaLengkap)+'</b>'
          + upcoming.slice(0,5).map(function(j){ return '<div class="info-row" style="padding:3px 0"><span>'+esc(j.tanggal)+' ('+esc(classifyShift(j.jamMulai))+')</span><b>'+esc(j.jamMulai)+'–'+esc(j.jamSelesai)+'</b></div>'; }).join('')
          + '</div>');
      }
    }
    box.innerHTML = rows.length ? rows.join('') : '<div class="muted">Belum ada jadwal yang dibuat.</div>';
  }

  async function loadLemburApproval(){
    var box=document.getElementById('lemburApprovalList'); if(!box) return; box.innerHTML='<div class="muted">Memuat…</div>';
    var pending=[]; try{ pending=await window.OmaOpa.listLemburToApprove(); }catch(e){}
    if(!pending.length){ box.innerHTML='<div class="muted">Gak ada lembur yang perlu di-approve.</div>'; return; }
    box.innerHTML = pending.map(function(l){
      return '<div class="row" style="flex-wrap:wrap"><div class="grow" style="min-width:150px"><div class="nm">'+esc(l.namaKaryawan)+'</div>'
        + '<div class="sub">'+esc(l.tanggal)+' · Keluar '+esc(l.jamKeluarAktual)+' (jadwal s/d '+esc(l.jamSelesaiJadwal)+') · +'+l.durasiLemburMenit+' menit</div></div>'
        + '<div style="display:flex;gap:5px;flex-wrap:wrap;width:100%;margin-top:7px"><button class="btn sm sec" data-lemburacc="'+esc(l.id)+'">✓ Setujui</button><button class="btn sm red" data-lemburrej="'+esc(l.id)+'">✕ Tolak</button></div>'
        + '</div>';
    }).join('');
    box.querySelectorAll('[data-lemburacc]').forEach(function(b){ b.onclick=async function(){ if(busy) return; busy=true; b.disabled=true; try{ await window.OmaOpa.approveLembur(b.getAttribute('data-lemburacc'),''); loadLemburApproval(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-lemburrej]').forEach(function(b){ b.onclick=async function(){ if(busy) return; var catatan=prompt('Alasan tolak (opsional):')||''; busy=true; b.disabled=true; try{ await window.OmaOpa.rejectLembur(b.getAttribute('data-lemburrej'),catatan); loadLemburApproval(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
  }

  async function loadCutiApproval(){
    var box=document.getElementById('cutiApprovalList'); if(!box) return; box.innerHTML='<div class="muted">Memuat…</div>';
    var pending=[]; try{ pending=await window.OmaOpa.listCutiToApprove(); }catch(e){}
    if(!pending.length){ box.innerHTML='<div class="muted">Gak ada pengajuan cuti yang perlu di-approve.</div>'; return; }
    box.innerHTML = pending.map(function(c){
      return '<div class="row" style="flex-wrap:wrap"><div class="grow" style="min-width:150px"><div class="nm">'+esc(c.namaKaryawan)+'</div>'
        + '<div class="sub">'+esc(c.jenisCuti||'-')+' · '+esc(c.tanggalMulai||'-')+' s/d '+esc(c.tanggalSelesai||'-')+(c.alasan?(' · "'+esc(c.alasan)+'"'):'')+'</div></div>'
        + '<div style="display:flex;gap:5px;flex-wrap:wrap;width:100%;margin-top:7px"><button class="btn sm sec" data-cutiacc="'+esc(c.id)+'">✓ Setujui</button><button class="btn sm red" data-cutirej="'+esc(c.id)+'">✕ Tolak</button></div>'
        + '</div>';
    }).join('');
    box.querySelectorAll('[data-cutiacc]').forEach(function(b){ b.onclick=async function(){ if(busy) return; busy=true; b.disabled=true; try{ await window.OmaOpa.approveCuti(b.getAttribute('data-cutiacc'),''); loadCutiApproval(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-cutirej]').forEach(function(b){ b.onclick=async function(){ if(busy) return; var catatan=prompt('Alasan tolak (opsional):')||''; busy=true; b.disabled=true; try{ await window.OmaOpa.rejectCuti(b.getAttribute('data-cutirej'),catatan); loadCutiApproval(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
  }

  function renderLogin(){
    panel.innerHTML = '<div class="card"><div class="nm">Masuk sebagai Karyawan</div>'
      + '<div class="muted" style="margin-bottom:8px">Pakai akun karyawan yang sama seperti di halaman Absensi/Profil.</div>'
      + '<label>Nomor HP</label><input id="lPhone" type="tel" inputmode="numeric" placeholder="08xxxxxxxxxx" autocomplete="off">'
      + '<label>PIN (6 angka)</label><input id="lPin" data-pin type="password" inputmode="numeric" maxlength="6" placeholder="••••••">'
      + '<button class="btn" id="lBtn">Masuk</button><div id="lMsg"></div></div>';
    document.getElementById('lBtn').onclick = async function(){
      if(busy) return; busy=true; var b=this; b.disabled=true; b.textContent='Memproses…';
      var msg=document.getElementById('lMsg'); msg.innerHTML='';
      try{
        await window.OmaOpa.loginKaryawan(document.getElementById('lPhone').value, document.getElementById('lPin').value);
        refresh();
      }catch(e){
        msg.innerHTML='<div class="res bad">'+esc((e&&e.message)||'Nomor HP atau PIN salah.')+'</div>';
        b.disabled=false; b.textContent='Masuk';
      }
      busy=false;
    };
  }

  window.addEventListener('omaopa:ready', refresh);
  window.addEventListener('omaopa:change', refresh);
  setTimeout(refresh, 800);
})();
</script>
</body>
</html>
