<!DOCTYPE html>
<html lang="id">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>HRD — Oma Opa Cakery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --kuning:#FFC21A; --kuning-hi:#FFD64A; --kuning-d:#E5A100; --coklat:#5A3017; --cream:#FFF6E6; --cream2:#FFE9C2; --pop:#FF6A3D; --merah:#E2425A; }
  *{box-sizing:border-box}
  body{ margin:0; font-family:'Nunito',system-ui,sans-serif; color:var(--coklat);
    background:radial-gradient(circle at 12% 8%, #FFE7B8 0%, transparent 42%), var(--cream); min-height:100vh; padding:16px 12px 60px; }
  label{ font-size:.74rem; font-weight:800; color:#8a6a3a; display:block; margin:9px 0 4px; }
  input,select{ width:100%; border:2px solid #E7D8BE; border-radius:10px; padding:10px; font-size:.92rem; font-family:inherit; font-weight:700; color:var(--coklat); background:#fff; }
  input:focus,select:focus{ outline:none; border-color:var(--kuning); }
  .wrap{ max-width:560px; margin:0 auto; }
  .head{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .head h1{ font-family:'Fredoka'; font-size:1.2rem; margin:0; }
  .badge{ font-size:.66rem; font-weight:900; background:var(--coklat); color:#fff; padding:2px 9px; border-radius:999px; }
  .card{ background:#fff; border:2px solid #EFE2C4; border-radius:16px; padding:14px; margin-bottom:12px; }
  .muted{ color:#9a7a5e; font-weight:700; font-size:.85rem; }
  .btn{ width:100%; border:none; background:var(--kuning); color:#5A3A05; font-weight:900; font-size:.95rem; border-radius:11px; padding:11px; cursor:pointer; box-shadow:0 3px 0 var(--kuning-d); font-family:inherit; margin-top:9px; }
  .btn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--kuning-d); }
  .btn[disabled]{ opacity:.55; }
  .btn.sec{ background:#fff; color:var(--coklat); border:2px solid #E7D8BE; box-shadow:none; }
  .btn.red{ background:#C0392B; color:#fff; box-shadow:0 3px 0 #922B21; }
  .btn.sm{ width:auto; padding:6px 11px; font-size:.78rem; margin:0; }
  .res{ border-radius:12px; padding:12px; margin-top:11px; }
  .ok{ background:#E7F6E7; border:2px solid #B7E0B7; } .bad{ background:#FDECEC; border:2px solid #F3C2C2; color:#C0392B; } .warn{ background:#FFF3D6; border:2px solid #F2D98A; }
  .row{ display:flex; align-items:center; gap:9px; padding:9px 0; border-top:1px solid #F2E8D5; }
  .row:first-child{ border-top:none; }
  .grow{ flex:1; min-width:0; }
  .nm{ font-weight:900; } .sub{ font-size:.74rem; color:#9a7a5e; font-weight:700; }
  .tag{ font-size:.64rem; font-weight:900; border-radius:999px; padding:2px 8px; }
  .tag.on{ background:#2E7D32; color:#fff; } .tag.off{ background:#bdae98; color:#fff; } .tag.adm{ background:var(--kuning); color:#5A3A05; }
  a.link{ color:#C98A1B; font-weight:800; text-decoration:none; }

  @media (min-width:900px){
    .wrap{ max-width:1240px; }
    #app{ display:grid; grid-template-columns:repeat(auto-fill,minmax(380px,1fr)); gap:14px; align-items:start; }
    #app > .card{ margin-bottom:0; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><h1>HRD</h1><span class="badge" id="roleBadge">…</span></div>
  <div id="gate" class="card"><div class="muted">Menyiapkan…</div></div>
  <div id="app" style="display:none"></div>
  <div style="text-align:center;margin-top:6px;display:flex;gap:10px;justify-content:center;align-items:center"><a class="link" href="admin.html">‹ Ke Admin</a><span class="muted">·</span><a class="link" href="index.html">Beranda</a><span class="muted">·</span><a class="link" href="javascript:void(0)" id="logoutLink">Keluar</a></div>
</div>

<script type="module" src="core-omaopa.js?v=147"></script>
<script>
(function(){
  var O=null, busy=false;
  var gate=document.getElementById('gate'), app=document.getElementById('app');
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function csvCell(s){ s=String(s==null?'':s); return '"'+s.replace(/"/g,'""')+'"'; }
  function downloadCSV(lines, fname){
    var blob=new Blob(["\ufeff"+lines.join("\r\n")], {type:'text/csv;charset=utf-8;'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=fname; document.body.appendChild(a); a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); },500);
  }
  function buildOutletOpts(){ var by={}; (window.OMA_OUTLETS||[]).forEach(function(o){ var a=o.area||'Lainnya'; (by[a]=by[a]||[]).push((o.name||'').replace(/^Oma Opa Cakery\s*/i,'')); }); var h='<option value="">— pilih outlet —</option>'; Object.keys(by).sort().forEach(function(a){ h+='<optgroup label="'+esc(a)+'">'+by[a].sort().map(function(n){return '<option>'+esc(n)+'</option>';}).join('')+'</optgroup>'; }); return h; }
  function hitungDurasi(mulai, selesai){
    if(!mulai || !selesai) return '';
    var a=new Date(mulai), b=new Date(selesai); if(isNaN(a)||isNaN(b)||b<a) return '';
    var bulan=(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth());
    var thn=Math.floor(bulan/12), sisaBulan=bulan%12;
    var parts=[]; if(thn>0) parts.push(thn+' tahun'); if(sisaBulan>0) parts.push(sisaBulan+' bulan');
    return parts.length?parts.join(' '):'kurang dari 1 bulan';
  }

  async function boot(){
    O=window.OmaOpa; if(!O){ gate.innerHTML='<div class="muted">Menyiapkan…</div>'; return; }
    var u=O.getUser();
    if(!u){ gate.innerHTML='<div class="muted">Halaman khusus HRD/Master. Silakan masuk dulu.</div><button class="btn" id="lg">Masuk</button>';
      document.getElementById('lg').onclick=function(){ O.openLogin(); }; app.style.display='none'; return; }
    var canHRD=false; try{ canHRD=await O.isHRD(); }catch(e){}
    if(!canHRD){ gate.innerHTML='<div style="font-weight:900;color:#C0392B">Akun ini bukan HRD/Master.</div>'
        +'<div class="muted" style="margin-top:8px">Minta Master menandai akun ini dengan <b>hrd: true</b> di tab Staff (admin.html).</div>'
        +'<button class="btn sec" id="out">Keluar / ganti akun</button>';
      document.getElementById('out').onclick=async function(){ try{ await O.signOut(); }catch(e){} }; app.style.display='none'; return; }
    var rbg=document.getElementById('roleBadge'); if(rbg) rbg.textContent='AKTIF';
    gate.style.display='none'; app.style.display=''; render();
  }

  var _orgCache = {divisi:[], subDivisi:{}, posisi:{}};

  function render(){
    app.innerHTML='<div class="card"><div class="nm">⚠️ Kontrak Mau Habis (H-45)</div><div class="muted" style="font-size:.76rem;margin:4px 0 9px">Muncul otomatis tiap halaman ini dibuka.</div>'
      +'<div id="kontrakExpList" class="muted">Memuat…</div></div>'
      +'<div class="card"><div class="nm">🏢 Struktur Organisasi</div><div class="muted" style="font-size:.76rem;margin:4px 0 9px">Divisi → Sub-Divisi → Posisi. Tambah/hapus sesuka hati, langsung kepake di form daftar karyawan & edit di sini.</div>'
      +'<div id="orgTree" class="muted">Memuat…</div>'
      +'<div style="display:flex;gap:6px;margin-top:10px"><input id="divNew" placeholder="Nama divisi baru" style="flex:1"><button class="btn sm" id="divAdd">＋ Tambah Divisi</button></div><div id="divMsg"></div></div>'
      +'<div class="card"><div class="nm">🎓 Daftar Grade</div><div class="muted" style="font-size:.76rem;margin:4px 0 9px">Buat karyawan level Staff (misal Training/Junior/Senior). Tambah/hapus sesuka hati.</div>'
      +'<div id="gradeList" class="muted">Memuat…</div>'
      +'<div style="display:flex;gap:6px;margin-top:8px"><input id="gradeNew" placeholder="Nama grade baru" style="flex:1"><button class="btn sm" id="gradeAdd">＋ Tambah</button></div><div id="gradeMsg"></div></div>'
      +'<div class="card"><div class="nm">🏖️ Jenis Cuti</div><div class="muted" style="font-size:.76rem;margin:4px 0 9px">Dipilih karyawan pas ngajuin cuti. Tambah/hapus sesuka hati.</div>'
      +'<div id="jcList" class="muted">Memuat…</div>'
      +'<div style="display:flex;gap:6px;margin-top:8px"><input id="jcNew" placeholder="Nama jenis cuti baru" style="flex:1"><button class="btn sm" id="jcAdd">＋ Tambah</button></div><div id="jcMsg"></div></div>'
      +'<div class="card"><div class="nm">✉️ Template Email</div><div class="muted" style="font-size:.76rem;margin:4px 0 9px">Isi {nama}/{jenisCuti}/{tanggalMulai}/{tanggalSelesai}/{catatan}/{grade} otomatis kesubstitusi. Kosongkan subjek buat nonaktifin email jenis itu (tetap ada notif Kotak Pesan).</div>'
      +'<div id="etList">Memuat…</div></div>'
      +'<div class="card"><div class="row" style="border:none;padding:0 0 8px"><div class="grow nm">🏖️ Pengajuan Cuti</div><button class="btn sm sec" id="cutiReload">↻</button></div>'
      +'<select id="cutiFilter" style="margin-bottom:8px"><option value="pending">⏳ Menunggu approval</option><option value="approved">✓ Disetujui</option><option value="ditolak">✕ Ditolak</option><option value="">— semua —</option></select>'
      +'<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px"><input type="date" id="cutiFrom" style="flex:1;min-width:0"><span>—</span><input type="date" id="cutiTo" style="flex:1;min-width:0"></div>'
      +'<div id="cutiList" class="muted">Memuat…</div><button class="btn sec" id="cutiMore" style="display:none">Muat 10 lagi</button></div>'
      +'<div class="card"><div class="nm">🧪 Data Dummy (Testing)</div><div class="muted" style="font-size:.76rem;margin:4px 0 9px">Buat 33 karyawan contoh di divisi Pabrik: 19 Baker + 9 Packing (Produksi), 1 SPV Produksi, 2 staff + 1 SPV Logistik, 1 Manajer. Hapus lagi kalau udah kelar testing.</div>'
      +'<div style="display:flex;gap:8px"><button class="btn sec" id="dummyGen" style="flex:1">＋ Generate Dummy</button><button class="btn red" id="dummyDel" style="flex:1">🗑 Hapus Semua Dummy</button></div><div id="dummyMsg"></div></div>'
      +'<div class="card"><div class="nm">📝 Format Laporan WFA</div><div class="muted" style="font-size:.76rem;margin:4px 0 9px">Kolom yang wajib diisi karyawan di file laporan (jadi header kolom XLS). Tambah/hapus sesuka hati.</div>'
      +'<div id="wfaFmtList" class="muted">Memuat…</div>'
      +'<div style="display:flex;gap:6px;margin-top:8px"><input id="wfaFmtNew" placeholder="Nama kolom baru" style="flex:1"><button class="btn sm" id="wfaFmtAdd">＋ Tambah</button></div><div id="wfaFmtMsg"></div></div>'
      +'<div class="card"><div class="row" style="border:none;padding:0 0 8px"><div class="grow nm">📝 Laporan WFA Masuk</div><button class="btn sm sec" id="wfaLapReload">↻</button></div>'
      +'<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px"><input type="date" id="wfaFrom" style="flex:1;min-width:0"><span>—</span><input type="date" id="wfaTo" style="flex:1;min-width:0"></div>'
      +'<div id="wfaLapList" class="muted">Memuat…</div><button class="btn sec" id="wfaMore" style="display:none">Muat 10 lagi</button></div>'
      +'<div class="card"><div class="row" style="border:none;padding:0 0 8px"><div class="grow nm">⏰ Data Lembur</div><button class="btn sm sec" id="lemburReload">↻</button></div>'
      +'<div class="muted" style="font-size:.74rem;margin:0 0 8px">HRD cuma terima data — yang approve/tolak SPV/Manajer/GM terkait lewat halaman Profil Karyawan mereka.</div>'
      +'<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px"><input type="date" id="lemburFrom" style="flex:1;min-width:0"><span>—</span><input type="date" id="lemburTo" style="flex:1;min-width:0"></div>'
      +'<div id="lemburHRList" class="muted">Memuat…</div><button class="btn sec" id="lemburMore" style="display:none">Muat 10 lagi</button></div>'
      +'<div class="card"><div class="row" style="border:none;padding:0 0 8px"><div class="grow nm">🗂️ Daftar Karyawan (Lengkap)</div><button class="btn sm sec" id="hrExport">⬇ CSV</button><button class="btn sm sec" id="hrReload">↻</button></div>'
      +'<select id="hrStatusFilter" style="margin-bottom:8px"><option value="pending">⏳ Menunggu approval</option><option value="approved" selected>✓ Disetujui</option><option value="ditolak">✕ Ditolak</option><option value="">— semua status —</option></select>'
      +'<select id="hrDivFilter" style="margin-bottom:8px"><option value="">— semua divisi —</option></select>'
      +'<div style="display:flex;gap:6px;align-items:center;margin-bottom:8px"><input type="date" id="hrFrom" style="flex:1;min-width:0" title="Tanggal daftar dari"><span>—</span><input type="date" id="hrTo" style="flex:1;min-width:0" title="Tanggal daftar sampai"></div>'
      +'<div id="hrList" class="muted">Memuat…</div><button class="btn sec" id="hrMore" style="display:none">Muat 10 lagi</button></div>'
      +'<div class="card"><div class="nm">⬇️ Export Riwayat Absensi (CSV)</div><div class="muted" style="font-size:.76rem;margin:5px 0 9px">Kosongkan kedua tanggal buat export semua riwayat.</div>'
      +'<div style="display:flex;gap:6px;align-items:center"><input type="date" id="atExFrom" style="flex:1;min-width:0"><span>—</span><input type="date" id="atExTo" style="flex:1;min-width:0"></div>'
      +'<button class="btn sec" id="atExportBtn" style="margin-top:10px">⬇ Export CSV</button><div id="atExportMsg"></div></div>';

    loadKontrakExpiring();
    loadOrgStructure();
    document.getElementById('dummyGen').onclick=async function(){
      if(busy) return; busy=true; this.disabled=true; this.textContent='Membuat…';
      var msg=document.getElementById('dummyMsg'); msg.innerHTML='';
      try{ var n=await O.generateDummyKaryawan(); msg.innerHTML='<div class="res ok">✓ '+n+' karyawan dummy dibuat. Cek di Daftar Karyawan (filter Divisi = Pabrik).</div>'; }
      catch(e){ msg.innerHTML='<div class="res bad">'+esc((e&&e.message)||'Gagal')+'</div>'; }
      this.disabled=false; this.textContent='＋ Generate Dummy'; busy=false;
    };
    document.getElementById('dummyDel').onclick=async function(){
      if(busy) return; if(!confirm('Hapus SEMUA data dummy? Ini gak bisa dibatalin.')) return;
      busy=true; this.disabled=true; this.textContent='Menghapus…';
      var msg=document.getElementById('dummyMsg'); msg.innerHTML='';
      try{ var n=await O.deleteAllDummyKaryawan(); msg.innerHTML='<div class="res ok">✓ '+n+' data dummy dihapus.</div>'; loadHRList(false); }
      catch(e){ msg.innerHTML='<div class="res bad">'+esc((e&&e.message)||'Gagal')+'</div>'; }
      this.disabled=false; this.textContent='🗑 Hapus Semua Dummy'; busy=false;
    };
    loadGradeList();
    loadJenisCutiList();
    loadEmailTemplates();
    loadWfaFormat();
    document.getElementById('wfaLapReload').onclick=function(){ loadWfaLaporanList(false); };
    document.getElementById('wfaFrom').onchange=function(){ loadWfaLaporanList(false); };
    document.getElementById('wfaTo').onchange=function(){ loadWfaLaporanList(false); };
    document.getElementById('wfaMore').onclick=function(){ loadWfaLaporanList(true); };
    loadWfaLaporanList(false);
    document.getElementById('lemburReload').onclick=function(){ loadLemburHRList(false); };
    document.getElementById('lemburFrom').onchange=function(){ loadLemburHRList(false); };
    document.getElementById('lemburTo').onchange=function(){ loadLemburHRList(false); };
    document.getElementById('lemburMore').onclick=function(){ loadLemburHRList(true); };
    loadLemburHRList(false);
    document.getElementById('cutiReload').onclick=function(){ loadCutiList(false); };
    document.getElementById('cutiFilter').onchange=function(){ loadCutiList(false); };
    document.getElementById('cutiFrom').onchange=function(){ loadCutiList(false); };
    document.getElementById('cutiTo').onchange=function(){ loadCutiList(false); };
    document.getElementById('cutiMore').onclick=function(){ loadCutiList(true); };
    loadCutiList(false);
    document.getElementById('hrReload').onclick=function(){ loadHRList(false); };
    document.getElementById('hrStatusFilter').onchange=function(){ loadHRList(false); };
    document.getElementById('hrDivFilter').onchange=function(){ loadHRList(false); };
    document.getElementById('hrFrom').onchange=function(){ loadHRList(false); };
    document.getElementById('hrTo').onchange=function(){ loadHRList(false); };
    document.getElementById('hrMore').onclick=function(){ loadHRList(true); };
    document.getElementById('hrExport').onclick=async function(){
      if(busy) return; busy=true; this.disabled=true; this.textContent='…';
      try{
        var arr=await O.fetchAllPages(O.listKaryawanHR, {});
        var lines=[['Nomor Pegawai','Nama','No HP','Email','Posisi (Lengkap)','Divisi','Sub-Divisi','Posisi','Grade','Lokasi','Shift','Jenis Kontrak','Mulai Kontrak','Selesai Kontrak','Approval','Aktif'].map(csvCell).join(',')];
        arr.forEach(function(k){ lines.push([k.nomorPegawai||'',k.namaLengkap||'',k.phone||'',k.email||'',k.orgLabel||'',k.divisi||'',k.subDivisi||'',k.posisi||'',k.grade||'',k.outlet||'',k.shift||'',k.kontrakJenis||'',k.kontrakMulai||'',k.kontrakSelesai||'',k.approvalStatus||'',k.active!==false?'Ya':'Tidak'].map(csvCell).join(',')); });
        downloadCSV(lines, 'karyawan-lengkap.csv');
      }catch(e){ alert((e&&e.message)||'Gagal export'); }
      this.disabled=false; this.textContent='⬇ CSV'; busy=false;
    };
    var atBtn=document.getElementById('atExportBtn'); if(atBtn) atBtn.onclick=async function(){
      if(busy) return; busy=true; this.disabled=true; this.textContent='Menyiapkan…';
      var msg=document.getElementById('atExportMsg'); msg.innerHTML='';
      try{
        var all=await O.listAttendance();
        var f=document.getElementById('atExFrom').value, t=document.getElementById('atExTo').value;
        var fromMs = f? new Date(f+'T00:00:00').getTime() : 0;
        var toMs = t? new Date(t+'T23:59:59').getTime() : Infinity;
        var rows=all.filter(function(a){ return a.ts>=fromMs && a.ts<=toMs; });
        var lines=[['Nama Karyawan','Lokasi','Tipe','Jarak (m)','Cek Wajah','Waktu'].map(csvCell).join(',')];
        rows.forEach(function(a){ lines.push([a.namaKaryawan||'(tidak ditemukan)',a.outlet||'',a.type==='masuk'?'Masuk':'Keluar',a.jarak!=null?Math.round(a.jarak):'',a.faceCheckFailed?'GAGAL DICEK - perlu direview':'OK',a.ts?new Date(a.ts).toLocaleString('id-ID'):''].map(csvCell).join(',')); });
        downloadCSV(lines, 'absensi-'+(f||'awal')+'_'+(t||'sekarang')+'.csv');
        var gagalCount=rows.filter(function(a){return a.faceCheckFailed;}).length;
        msg.innerHTML='<div class="res ok">✓ '+rows.length+' catatan absen di-export.'+(gagalCount?(' <b>'+gagalCount+' di antaranya perlu direview</b> (cek wajah gagal jalan).'):'')+'</div>';
      }catch(e){ msg.innerHTML='<div class="res bad">Gagal: '+esc((e&&e.message)||'')+'</div>'; }
      this.disabled=false; this.textContent='⬇ Export CSV'; busy=false;
    };
    loadHRList();
  }

  async function loadKontrakExpiring(){
    var box=document.getElementById('kontrakExpList'); if(!box) return; box.innerHTML='<div class="muted">Memuat…</div>';
    var arr=[]; try{ arr=await O.listKontrakExpiringSoon(); }catch(e){}
    if(!arr.length){ box.innerHTML='<div class="muted">Gak ada kontrak yang mau habis dalam 45 hari ke depan.</div>'; return; }
    box.innerHTML = arr.map(function(k){
      return '<div class="row" style="flex-wrap:wrap"><div class="grow" style="min-width:150px"><div class="nm">'+esc(k.namaKaryawan)+'</div>'
        +'<div class="sub">Kontrak '+esc(k.kontrakJenis||'-')+' habis '+esc(k.kontrakSelesai)+' · Divisi '+esc(k.divisi||'-')+'</div></div>'
        +'<button class="btn sm sec" data-kirimmanajer="'+esc(k.uid)+'" data-divisi="'+esc(k.divisi)+'" data-nama="'+esc(k.namaKaryawan)+'" data-selesai="'+esc(k.kontrakSelesai)+'" style="width:auto">✉ Kirim ke Manajer</button>'
        +'</div>';
    }).join('');
    box.querySelectorAll('[data-kirimmanajer]').forEach(function(b){ b.onclick=async function(){
      if(busy) return; busy=true; b.disabled=true; b.textContent='Mengirim…';
      try{
        var email=await O.getManajerEmailForDivisi(b.getAttribute('data-divisi'));
        if(!email){ alert('Belum ketemu email Manajer buat divisi ini (pastikan Manajer-nya udah isi email di profilnya).'); }
        else{
          await O.sendEmailNotif(email, 'Kontrak Karyawan Akan Berakhir', 'Kontrak kerja '+b.getAttribute('data-nama')+' akan berakhir pada '+b.getAttribute('data-selesai')+'. Mohon ditindaklanjuti.');
          alert('Notif terkirim ke '+email);
        }
      }catch(e){ alert((e&&e.message)||'Gagal kirim'); }
      b.disabled=false; b.textContent='✉ Kirim ke Manajer'; busy=false;
    }; });
  }

  async function loadOrgStructure(){
    var box=document.getElementById('orgTree'); if(!box) return; box.innerHTML='<div class="muted">Memuat…</div>';
    try{ _orgCache = await O.getOrgStructure(); }catch(e){ _orgCache={divisi:[],subDivisi:{},posisi:{}}; }
    renderOrgTree();
    var addBtn=document.getElementById('divAdd'); if(addBtn) addBtn.onclick=async function(){
      if(busy) return; var inp=document.getElementById('divNew'); var v=(inp.value||'').trim(); var msg=document.getElementById('divMsg');
      if(!v){ msg.innerHTML='<div class="res bad">Isi nama divisi dulu.</div>'; return; }
      if(_orgCache.divisi.indexOf(v)>=0){ msg.innerHTML='<div class="res bad">Divisi itu udah ada.</div>'; return; }
      busy=true; this.disabled=true;

        +'<div class="sub">'+subInfo+' · '+esc(k.outlet||'-')+(k.shift?' · '+esc(k.shift):'')+(k.kontrakJenis?' · Kontrak: '+esc(k.kontrakJenis):'')+' · '+esc(k.phone||'')+(k.email?(' · ✉️ '+esc(k.email)):'')+'</div></div>'
        +'<div style="display:flex;gap:5px;flex-wrap:wrap;width:100%;margin-top:7px">'
        + '<button class="btn sm sec" data-edithr="'+esc(k.id)+'">⚙️ '+(k.approvalStatus==='approved'?'Edit':'Isi & Setujui')+'</button>'
        + (k.approvalStatus!=='approved' ? ('<button class="btn sm sec" data-appr="'+esc(k.id)+'">✓ Setujui langsung</button>') : '')
        + (k.approvalStatus==='pending' ? ('<button class="btn sm red" data-rej="'+esc(k.id)+'">✕ Tolak</button>') : '')
        + (k.approvalStatus==='approved' ? ('<button class="btn sm sec" data-togglehr="'+esc(k.id)+'" data-on="'+(k.active!==false?'1':'0')+'">'+(k.active!==false?'Nonaktifkan':'Aktifkan')+'</button><button class="btn sm sec" data-privy="'+esc(k.id)+'">📄 Kontrak siap Privy</button>') : '')
        +'</div></div>';
    }).join('');
    box.querySelectorAll('[data-edithr]').forEach(function(b){ b.onclick=function(){ var k=_hrAccum.find(function(x){ return x.id===b.getAttribute('data-edithr'); }); if(k) openKaryawanHREdit(k); }; });
    box.querySelectorAll('[data-appr]').forEach(function(b){ b.onclick=async function(){ if(busy) return; busy=true; b.disabled=true; try{ await O.approveKaryawan(b.getAttribute('data-appr')); loadHRList(false); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-rej]').forEach(function(b){ b.onclick=async function(){ if(busy) return; if(!confirm('Tolak pendaftaran karyawan ini?')) return; busy=true; b.disabled=true; try{ await O.rejectKaryawan(b.getAttribute('data-rej')); loadHRList(false); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-privy]').forEach(function(b){ b.onclick=async function(){ if(busy) return; var k=_hrAccum.find(function(x){ return x.id===b.getAttribute('data-privy'); }); if(!k) return;
      if(!confirm('Kirim notif "Kontrak siap di Privy" ke '+k.namaLengkap+'?')) return;
      busy=true; b.disabled=true;
      try{
        await O.sendKaryawanNotif(k.id, 'Kontrak Siap di Privy', 'Kontrak kerja kamu udah tersedia di Privy, silakan cek & tanda-tangan ya.');
        await O.sendEventEmail(k.id, 'kontrak_privy', { nama:k.namaLengkap });
        alert('Notif terkirim.');
      }
      catch(e){ alert((e&&e.message)||'Gagal'); }
      b.disabled=false; busy=false; }; });
    box.querySelectorAll('[data-togglehr]').forEach(function(b){ b.onclick=async function(){ if(busy) return; busy=true; b.disabled=true; try{ await O.updateKaryawanProfile(b.getAttribute('data-togglehr'), {active:b.getAttribute('data-on')!=='1'}); loadHRList(false); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
  }

  async function openKaryawanHREdit(k){
    var bk=document.createElement('div');
    bk.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px';
    var gradeCache=[]; try{ gradeCache=await O.listGrade(); }catch(e){}
    var isPending = k.approvalStatus!=='approved';
    var refDivisi = k.divisi || k.claimDivisi || '';
    var refSub = k.subDivisi || k.claimSubDivisi || '';
    var refPosisi = k.posisi || k.claimPosisi || '';
    var refLevel = k.strukturalLevel || k.claimStrukturalLevel || 'staff';
    bk.innerHTML='<div style="background:#fff;border-radius:16px;padding:18px;max-width:360px;width:100%;max-height:90vh;overflow:auto">'
      +'<div style="font-weight:800;color:var(--coklat);margin-bottom:10px">⚙️ '+(isPending?'Isi & Setujui':'Edit')+' Karyawan</div>'
      +(isPending?('<div class="res warn" style="margin-bottom:10px;font-size:.8rem">Ini masih pendaftaran mandiri, statusnya PENDING. Cek dulu klaim posisinya di bawah (udah keisi otomatis dari klaim dia), betulin kalau ada yang salah, baru Simpan & Setujui.</div>'):'')
      +'<label>Nama lengkap</label><input id="keNm" value="'+esc(k.namaLengkap||'')+'">'
      +'<label>Nomor Pegawai</label><input id="keNoPeg" value="'+esc(k.nomorPegawai||'')+'" placeholder="cth: EMP-2026-001">'
      +'<label>Divisi</label><select id="keDivisi"></select>'
      +'<div id="keSubWrap" style="display:none"><label>Sub-Divisi</label><select id="keSubDivisi"></select></div>'
      +'<div id="kePosWrap" style="display:none"><label>Posisi</label><select id="kePosisi"></select></div>'
      +'<div id="keGradeWrap" style="display:none"><label>Grade (opsional)</label><select id="keGrade"></select></div>'
      +'<label>Lokasi absen</label><select id="keOut">'+buildOutletOpts()+'</select>'
      +'<div style="border-top:1px dashed #E7D8BE;margin:14px 0 4px"></div>'
      +'<label>Jenis Kontrak</label><select id="keKontrakJenis"><option value="">— pilih jenis —</option><option>Training</option><option>Kontrak</option><option>Tetap</option></select>'
      +'<label>Tanggal Mulai</label><input type="date" id="keKontrakMulai" value="'+esc(k.kontrakMulai||'')+'">'
      +'<label>Tanggal Berakhir</label><input type="date" id="keKontrakSelesai" value="'+esc(k.kontrakSelesai||'')+'">'
      +'<div id="keDurasi" class="muted" style="font-size:.78rem;margin-top:4px">'+(hitungDurasi(k.kontrakMulai,k.kontrakSelesai)?('Durasi: '+hitungDurasi(k.kontrakMulai,k.kontrakSelesai)):'')+'</div>'
      +'<div style="display:flex;gap:8px;margin-top:12px"><button class="btn" id="keSave" style="flex:1">💾 '+(isPending?'Simpan & Setujui':'Simpan')+'</button><button class="btn sec" id="keCancel" style="flex:1">Batal</button></div>'
      +(isPending?('<button class="btn sm red" id="keRej" style="width:100%;margin-top:8px">✕ Tolak Pendaftaran</button>'):'')
      +'</div>';
    document.body.appendChild(bk);
    var outSel=bk.querySelector('#keOut'); if(k.outlet) outSel.value=k.outlet;
    var kjSel=bk.querySelector('#keKontrakJenis'); if(k.kontrakJenis) kjSel.value=k.kontrakJenis;
    var kmI=bk.querySelector('#keKontrakMulai'), ksI=bk.querySelector('#keKontrakSelesai'), durEl=bk.querySelector('#keDurasi');
    function refreshDurasi(){ var d=hitungDurasi(kmI.value,ksI.value); durEl.textContent=d?('Durasi: '+d):''; }
    kmI.onchange=refreshDurasi; ksI.onchange=refreshDurasi;

    var dSel=bk.querySelector('#keDivisi'), subWrap=bk.querySelector('#keSubWrap'), subSel=bk.querySelector('#keSubDivisi'),
        posWrap=bk.querySelector('#kePosWrap'), posSel=bk.querySelector('#kePosisi'), gradeWrap=bk.querySelector('#keGradeWrap'), gradeSel=bk.querySelector('#keGrade');
    dSel.innerHTML='<option value="">— pilih divisi —</option>'+_orgCache.divisi.map(function(d){ return '<option>'+esc(d)+'</option>'; }).join('')+'<option value="__GM__">General Manager</option>';
    function fillSub(divisiVal, preselectSub){
      if(!divisiVal || divisiVal==='__GM__'){ subWrap.style.display='none'; posWrap.style.display='none'; gradeWrap.style.display='none'; return; }
      var subs=_orgCache.subDivisi[divisiVal]||[];
      subSel.innerHTML='<option value="">— pilih sub-divisi —</option>'+subs.map(function(s){ return '<option>'+esc(s)+'</option>'; }).join('')+'<option value="__MANAJER__">Manajer (semua Sub-Divisi)</option>';
      if(preselectSub) subSel.value=preselectSub;
      subWrap.style.display='block';
      fillPos(divisiVal, subSel.value, refLevel==='spv'?refPosisi:'');
    }
    function fillPos(divisiVal, subVal, preselectPos){
      if(!subVal || subVal==='__MANAJER__'){ posWrap.style.display='none'; gradeWrap.style.display='none'; return; }
      var pk=divisiVal+'::'+subVal;
      var poss=_orgCache.posisi[pk]||[];
      posSel.innerHTML='<option value="">— pilih posisi —</option>'+poss.map(function(p){ return '<option>'+esc(p)+'</option>'; }).join('')+'<option value="__SPV__">SPV</option>';
      if(preselectPos) posSel.value=preselectPos;
      posWrap.style.display='block';
      fillGrade(posSel.value, refLevel==='staff'?k.grade:'');
    }
    function fillGrade(posVal, preselectGrade){
      if(!posVal || posVal==='__SPV__'){ gradeWrap.style.display='none'; return; }
      gradeSel.innerHTML='<option value="">— pilih grade (opsional) —</option>'+gradeCache.map(function(g){ return '<option>'+esc(g)+'</option>'; }).join('');
      if(preselectGrade) gradeSel.value=preselectGrade;
      gradeWrap.style.display='block';
    }
    dSel.onchange=function(){ fillSub(dSel.value, ''); };
    subSel.onchange=function(){ fillPos(dSel.value, subSel.value, ''); };
    posSel.onchange=function(){ fillGrade(posSel.value, ''); };
    if(refLevel==='gm'){ dSel.value='__GM__'; }
    else if(refDivisi){ dSel.value=refDivisi; fillSub(refDivisi, refLevel==='manajer'?'__MANAJER__':refSub); }

    bk.querySelector('#keCancel').onclick=function(){ bk.remove(); };
    bk.onclick=function(e){ if(e.target===bk) bk.remove(); };
    if(isPending){ bk.querySelector('#keRej').onclick=async function(){ if(busy) return; if(!confirm('Tolak pendaftaran karyawan ini?')) return; busy=true; this.disabled=true; try{ await O.rejectKaryawan(k.id); bk.remove(); loadHRList(); }catch(e){ alert((e&&e.message)||'Gagal'); this.disabled=false; } busy=false; }; }
    bk.querySelector('#keSave').onclick=async function(){ if(busy) return;
      var nm=(bk.querySelector('#keNm').value||'').trim(); if(!nm){ alert('Nama wajib diisi.'); return; }
      var dV=dSel.value;
      var orgPatch;
      if(dV==='__GM__') orgPatch={ strukturalLevel:'gm', divisi:'', subDivisi:'', posisi:'', grade:'' };
      else if(subSel.value==='__MANAJER__') orgPatch={ strukturalLevel:'manajer', divisi:dV, subDivisi:'', posisi:'', grade:'' };
      else if(posSel.value==='__SPV__') orgPatch={ strukturalLevel:'spv', divisi:dV, subDivisi:subSel.value, posisi:'', grade:'' };
      else orgPatch={ strukturalLevel:'staff', divisi:dV, subDivisi:subSel.value, posisi:posSel.value, grade:gradeSel.value };
      var basicPatch={ namaLengkap:nm, nomorPegawai:(bk.querySelector('#keNoPeg').value||'').trim(), outlet:outSel.value };
      var hrPatch=Object.assign({ kontrakJenis:kjSel.value, kontrakMulai:kmI.value, kontrakSelesai:ksI.value }, orgPatch);
      var gradeBerubah = !isPending && orgPatch.strukturalLevel==='staff' && (orgPatch.grade||'')!==(k.grade||'');
      busy=true; this.disabled=true; this.textContent='Menyimpan…';
      try{
        await O.updateKaryawanProfile(k.id, basicPatch);
        await O.updateKaryawanHR(k.id, hrPatch);
        if(isPending) await O.approveKaryawan(k.id);
        if(gradeBerubah){ try{ await O.sendKaryawanNotif(k.id, 'Grade Diperbarui', 'Grade posisi kamu diperbarui jadi: '+(orgPatch.grade||'(kosong)')+'.'); await O.sendEventEmail(k.id, 'grade_changed', { nama:k.namaLengkap, grade:orgPatch.grade||'(kosong)' }); }catch(e){} }
        bk.remove(); loadHRList();
      }
      catch(e){ alert((e&&e.message)||'Gagal'); this.disabled=false; this.textContent='💾 Simpan'; }
      busy=false; };
  }

  var _logoutLink=document.getElementById('logoutLink'); if(_logoutLink) _logoutLink.onclick=async function(){ try{ if(window.OmaOpa) await window.OmaOpa.signOut(); }catch(e){} location.reload(); };
  window.addEventListener('omaopa:ready', boot);
  window.addEventListener('omaopa:change', boot);
  setTimeout(boot, 900);
})();
</script>
</body>
