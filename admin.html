<!DOCTYPE html>
<html lang="id">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Admin — Oma Opa Cakery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --kuning:#FFC21A; --kuning-hi:#FFD64A; --kuning-d:#E5A100; --coklat:#5A3017; --cream:#FFF6E6; --cream2:#FFE9C2; --pop:#FF6A3D; --merah:#E2425A; }
  *{box-sizing:border-box}
  body{ margin:0; font-family:'Nunito',system-ui,sans-serif; color:var(--coklat);
    background:radial-gradient(circle at 12% 8%, #FFE7B8 0%, transparent 42%), var(--cream); min-height:100vh; padding:16px 12px 60px; }
  .wrap{ max-width:560px; margin:0 auto; }
  .head{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .head h1{ font-family:'Fredoka'; font-size:1.2rem; margin:0; }
  .badge{ font-size:.66rem; font-weight:900; background:var(--coklat); color:#fff; padding:2px 9px; border-radius:999px; }
  .card{ background:#fff; border:2px solid #EFE2C4; border-radius:16px; padding:14px; margin-bottom:12px; }
  .muted{ color:#9a7a5e; font-weight:700; font-size:.85rem; }
  label{ font-size:.74rem; font-weight:800; color:#8a6a3a; display:block; margin:9px 0 4px; }
  input,select{ width:100%; border:2px solid #E7D8BE; border-radius:10px; padding:10px; font-size:.92rem; font-family:inherit; font-weight:700; color:var(--coklat); background:#fff; }
  input:focus,select:focus{ outline:none; border-color:var(--kuning); }
  .btn{ width:100%; border:none; background:var(--kuning); color:#5A3A05; font-weight:900; font-size:.95rem; border-radius:11px; padding:11px; cursor:pointer; box-shadow:0 3px 0 var(--kuning-d); font-family:inherit; margin-top:9px; }
  .btn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--kuning-d); }
  .btn[disabled]{ opacity:.55; }
  .btn.sec{ background:#fff; color:var(--coklat); border:2px solid #E7D8BE; box-shadow:none; }
  .btn.green{ background:#2E7D32; color:#fff; box-shadow:0 3px 0 #1B5E20; }
  .btn.red{ background:#C0392B; color:#fff; box-shadow:0 3px 0 #922B21; }
  .btn.sm{ width:auto; padding:6px 11px; font-size:.78rem; margin:0; }
  .tabs{ display:flex; gap:5px; margin-bottom:12px; flex-wrap:wrap; }
  .tabs button{ flex:1; min-width:84px; border:2px solid #EFE2C4; background:#fff; color:var(--coklat); font-weight:900; font-size:.78rem; border-radius:11px; padding:9px 4px; cursor:pointer; font-family:inherit; }
  .tabs button.on{ background:var(--coklat); color:#fff; border-color:var(--coklat); }
  .res{ border-radius:12px; padding:12px; margin-top:11px; }
  .ok{ background:#E7F6E7; border:2px solid #B7E0B7; } .bad{ background:#FDECEC; border:2px solid #F3C2C2; color:#C0392B; } .warn{ background:#FFF3D6; border:2px solid #F2D98A; }
  .row{ display:flex; align-items:center; gap:9px; padding:9px 0; border-top:1px solid #F2E8D5; }
  .row:first-child{ border-top:none; }
  .grow{ flex:1; min-width:0; }
  .nm{ font-weight:900; } .sub{ font-size:.74rem; color:#9a7a5e; font-weight:700; }
  .tag{ font-size:.64rem; font-weight:900; border-radius:999px; padding:2px 8px; }
  .tag.on{ background:#2E7D32; color:#fff; } .tag.off{ background:#bdae98; color:#fff; } .tag.adm{ background:var(--kuning); color:#5A3A05; }
  .pts{ font-weight:900; color:#C98A1B; }
  .uid{ font-family:monospace; font-size:.76rem; background:#F1E4CC; border-radius:8px; padding:6px 9px; word-break:break-all; margin-top:6px; }
  a.link{ color:#C98A1B; font-weight:800; text-decoration:none; }
  .area-h{ font-size:.68rem;font-weight:900;color:#fff;background:var(--coklat);border-radius:8px;padding:5px 10px;margin:11px 0 2px;text-transform:uppercase;letter-spacing:.5px;}
  .hint{ font-size:.72rem;color:#a98e6e;font-weight:600;margin-top:5px; }
  /* KPI */
  .kpis{ display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .kpi{ background:#fff; border:2px solid #EFE2C4; border-radius:14px; padding:11px 13px; }
  .kpi .v{ font-family:'Fredoka'; font-size:1.4rem; font-weight:700; color:var(--coklat); line-height:1.1; }
  .kpi .l{ font-size:.7rem; font-weight:800; color:#9a7a5e; margin-top:2px; }
  /* charts */
  .chart{ margin-top:12px; } .chart-h{ font-weight:900; font-size:.86rem; margin-bottom:6px; }
  .chart-b{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .legend{ flex:1; min-width:150px; } .lg{ font-size:.78rem; font-weight:700; color:#5b4636; margin:3px 0; }
  .lg .dot{ display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:6px; vertical-align:middle; }
  table.mt{ width:100%; border-collapse:collapse; font-size:.8rem; }
  table.mt th{ text-align:left; font-size:.66rem; text-transform:uppercase; color:#a9743c; padding:6px 6px; border-bottom:2px solid #EFE2C4; }
  table.mt td{ padding:8px 6px; border-bottom:1px solid #F2E8D5; font-weight:700; }
  table.mt tr{ cursor:pointer; } table.mt tr:hover td{ background:#FFF6E6; }
  .bar{ margin:9px 0; } .bar .bl{ display:flex; justify-content:space-between; gap:8px; font-size:.78rem; font-weight:800; color:#5b4636; margin-bottom:3px; }
  .bar .bt{ height:13px; background:#EFE6D2; border-radius:999px; overflow:hidden; }
  .bar .bf{ height:100%; background:linear-gradient(90deg,#FFC21A,#E0915B); border-radius:999px; }
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;gap:7px;margin-bottom:12px">
    <span style="flex:1;text-align:center;padding:9px 4px;border-radius:11px;font-weight:800;font-size:.82rem;border:2px solid #E5A100;background:#FFC21A;color:#5A3017">🛠️ Admin</span>
    <a href="rekap.html" style="flex:1;text-align:center;text-decoration:none;padding:9px 4px;border-radius:11px;font-weight:800;font-size:.82rem;border:2px solid #E5A100;background:#FFF6E6;color:#5A3017">📊 Rekap</a>
    <a href="staff.html" style="flex:1;text-align:center;text-decoration:none;padding:9px 4px;border-radius:11px;font-weight:800;font-size:.82rem;border:2px solid #E5A100;background:#FFF6E6;color:#5A3017">🧾 Kasir</a>
  </div>
  <div class="head"><h1>Admin Oma Opa</h1><span class="badge" id="roleBadge">ADMIN</span></div>
  <div id="gate" class="card"><div class="muted">Menyiapkan…</div></div>
  <div id="app" style="display:none">
    <div class="tabs">
      <button data-tab="home" class="on">📊 Ringkasan</button>
      <button data-tab="member">👤 Member</button>
      <button data-tab="outlet">🏪 Outlet</button>
      <button data-tab="staff">🧑‍🍳 Staff</button>
      <button data-tab="reward">🎁 Reward</button>
      <button data-tab="promo">📣 Promo</button>
      <button data-tab="analitik">📈 Analitik</button>
      <button data-tab="pesanan">🧾 Pesanan</button>
      <button data-tab="pengaturan">⚙️ Pengaturan</button>
    </div>
    <div id="tab"></div>
  </div>
  <div style="text-align:center"><a class="link" href="index.html">‹ Ke beranda</a></div>
</div>

<script src="outlets-data.js?v=62"></script>
<script src="menu-data.js?v=62"></script>
<script type="module" src="core-omaopa.js?v=106"></script>
<script>
(function(){
  var O=null, gate=document.getElementById('gate'), app=document.getElementById('app'), tabEl=document.getElementById('tab');
  var tab='home', busy=false, segFilter=null, canEdit=false, masterEdit=false, sPage=0;
  var MEMBERS=null, TXN=null; // cache
  var memStack=[null], memPage=0; // paginasi member (cursor)
  var curOf='baru', curOrders=[], OUTLETS_CACHE=[];
  var PAL=['#FFC21A','#E0915B','#7CC9B5','#C98A4B','#88B0E0','#F4A6B0','#9a8b78','#B7D77A','#caa6e0'];
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function rp(n){ try{ return 'Rp'+Number(n||0).toLocaleString('id-ID'); }catch(e){ return 'Rp'+n; } }
  function num(n){ try{ return Number(n||0).toLocaleString('id-ID'); }catch(e){ return ''+n; } }

  async function boot(){
    O=window.OmaOpa; if(!O){ gate.innerHTML='<div class="muted">Menyiapkan…</div>'; return; }
    var u=O.getUser();
    if(!u){ gate.innerHTML='<div class="muted">Halaman khusus admin. Silakan masuk dulu.</div><button class="btn" id="lg">Masuk</button>';
      document.getElementById('lg').onclick=function(){ O.openLogin(); }; app.style.display='none'; return; }
    gate.innerHTML='<div class="muted">Memeriksa akses admin…</div>';
    var adm=false; try{ adm=await O.isAdmin(); }catch(e){}
    if(!adm){ gate.innerHTML='<div style="font-weight:900;color:#C0392B">Akun ini bukan admin.</div>'
        +'<div class="muted" style="margin-top:8px">Minta admin menandai akun (UID) ini dengan <b>admin: true</b> di koleksi <b>staff</b>:</div>'
        +'<div class="uid">'+esc(u.uid)+'</div><button class="btn sec" id="out">Keluar / ganti akun</button>';
      document.getElementById('out').onclick=async function(){ try{ await O.signOut(); }catch(e){} }; app.style.display='none'; return; }
    try{ canEdit=await O.isSuper(); }catch(e){ canEdit=false; }
    try{ masterEdit=await O.isMaster(); }catch(e){ masterEdit=false; }
    var rbg=document.getElementById('roleBadge'); if(rbg){ rbg.textContent=canEdit?'ADMIN UTAMA':'LIHAT-SAJA'; rbg.style.background=canEdit?'#5A3017':'#9a8b78'; }
    gate.style.display='none'; app.style.display=''; render();
  }
  document.querySelectorAll('.tabs button').forEach(function(b){ b.onclick=function(){
    tab=b.getAttribute('data-tab'); document.querySelectorAll('.tabs button').forEach(function(x){ x.classList.remove('on'); }); b.classList.add('on'); render();
  }; });
  function render(){ ({home:renderHome, member:renderMember, outlet:renderOutlet, staff:renderStaff, reward:renderReward, promo:renderPromo, analitik:renderAnalitik, pesanan:renderPesanan, pengaturan:renderPengaturan}[tab]||renderHome)(); }
  function setActiveTab(name){ tab=name; document.querySelectorAll('.tabs button').forEach(function(x){ x.classList.toggle('on', x.getAttribute('data-tab')===name); }); }
  function applySegment(field,val){ segFilter={field:field, value:val}; setActiveTab('member'); render(); }

  var STAFF_UIDS=null; async function getStaffUids(){ if(STAFF_UIDS) return STAFF_UIDS; STAFF_UIDS={}; try{ (await O.listStaff()).forEach(function(x){ if(x.uid) STAFF_UIDS[x.uid]=1; }); }catch(e){} return STAFF_UIDS; }
  async function getMembers(force){ if(MEMBERS&&!force) return MEMBERS; try{ var all=await O.listMembers('',2000); var st=await getStaffUids(); MEMBERS=all.filter(function(m){ return !st[m.uid]; }); }catch(e){ MEMBERS=[]; } return MEMBERS; }
  async function getTxn(force){ if(TXN&&!force) return TXN; try{ TXN=await O.listTransactions(''); }catch(e){ TXN=[]; } return TXN; }
  function barH(title, rows){
    var max=Math.max.apply(null, rows.map(function(r){return r.value;}).concat([1]));
    var body=rows.map(function(r,i){ var pct=Math.round(r.value/max*100);
      return '<div style="margin:7px 0"><div style="display:flex;justify-content:space-between;gap:8px;font-size:.78rem;font-weight:800;color:#5b4636"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.label)+'</span><span style="flex:0 0 auto">'+esc(r.sub!=null?r.sub:r.value)+'</span></div>'
        +'<div style="height:10px;background:#EFE6D2;border-radius:999px;overflow:hidden;margin-top:2px"><span style="display:block;height:100%;width:'+pct+'%;background:'+PAL[i%PAL.length]+';border-radius:999px"></span></div></div>'; }).join('');
    return '<div class="chart"><div class="chart-h">'+esc(title)+'</div>'+(rows.length?body:'<div class="muted">Belum ada data.</div>')+'</div>';
  }
  function lineChart(title, pts, labels){
    var W=320,H=120,pad=10; var max=Math.max.apply(null,pts.concat([1])); var n=pts.length; var step=n>1?(W-2*pad)/(n-1):0;
    var co=pts.map(function(v,i){ return [pad+i*step, H-pad-(v/max)*(H-2*pad)]; });
    var poly=co.map(function(c){return c[0].toFixed(1)+','+c[1].toFixed(1);}).join(' ');
    var dots=co.map(function(c){return '<circle cx="'+c[0].toFixed(1)+'" cy="'+c[1].toFixed(1)+'" r="2.4" fill="#C98A1B"/>';}).join('');
    var svg='<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="128" preserveAspectRatio="none"><polyline points="'+poly+'" fill="none" stroke="#E0915B" stroke-width="2.5" stroke-linejoin="round"/>'+dots+'</svg>';
    var lab=labels?('<div style="display:flex;justify-content:space-between;font-size:.62rem;color:#9a7a5e;font-weight:700"><span>'+esc(labels[0])+'</span><span>'+esc(labels[labels.length-1])+'</span></div>'):'';
    return '<div class="chart"><div class="chart-h">'+esc(title)+'</div>'+svg+lab+'</div>';
  }

  function donut(title, data, field){
    var ent=Object.keys(data).map(function(k){return {k:k,v:data[k]};}).filter(function(e){return e.v>0;}).sort(function(a,b){return b.v-a.v;});
    var total=ent.reduce(function(s,e){return s+e.v;},0)||1; var r=52,C=2*Math.PI*r,off=0;
    var circ=ent.map(function(e,i){ var len=e.v/total*C; var s='<circle cx="70" cy="70" r="'+r+'" fill="none" stroke="'+PAL[i%PAL.length]+'" stroke-width="22" stroke-dasharray="'+len+' '+(C-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 70 70)"/>'; off+=len; return s; }).join('');
    var svg='<svg viewBox="0 0 140 140" width="132" height="132">'+circ+'<text x="70" y="67" text-anchor="middle" font-size="15" font-weight="900" fill="#5A3017">'+total+'</text><text x="70" y="83" text-anchor="middle" font-size="9" fill="#9a7a5e">total</text></svg>';
    var leg=ent.map(function(e,i){ return '<div class="lg" data-segf="'+esc(field||'')+'" data-segv="'+esc(e.k)+'" style="cursor:pointer"><span class="dot" style="background:'+PAL[i%PAL.length]+'"></span>'+esc(e.k)+' <b>'+e.v+'</b> ('+Math.round(e.v/total*100)+'%) ›</div>'; }).join('');
    return '<div class="chart"><div class="chart-h">'+esc(title)+'</div><div class="chart-b"><div>'+svg+'</div><div class="legend">'+leg+'</div></div></div>';
  }
  function tally(arr, key){ var m={}; arr.forEach(function(x){ var v=(x[key]||'').toString().trim()||'Tidak diisi'; m[v]=(m[v]||0)+1; }); return m; }

  /* ---------- RINGKASAN ---------- */
  async function renderHome(){
    tabEl.innerHTML='<div class="card"><div class="muted">Memuat ringkasan…</div></div>';
    var mem=await getMembers(), txn=[], vou=[];
    txn=await getTxn();
    try{ vou=await O.listUsedVouchers(''); }catch(e){}
    var promoNotif=''; try{ var _pr=await O.getPromo(); if(_pr && _pr.active && _pr.start && _pr.end){ promoNotif='<div class="card" style="background:#EAF7EE;border-color:#BEE6C9"><div style="font-weight:800;color:#1E7A46;font-size:.88rem">🟢 Promo bonus pendaftaran sedang aktif</div><div style="font-size:.82rem;color:#5A3017;margin-top:2px">Daftar '+_pr.start+' s/d '+_pr.end+' → +'+_pr.bonus+' poin. <a href="#" id="homePromoLink" style="color:#1E7A46;font-weight:700">Kelola di Promo →</a></div></div>'; } }catch(e){}
    var now=new Date(), mKey=now.getFullYear()+'-'+(now.getMonth()+1);
    var inMonth=function(ts){ var d=new Date(ts); return (d.getFullYear()+'-'+(d.getMonth()+1))===mKey; };
    var poin=mem.reduce(function(s,m){return s+(m.points||0);},0);
    var txnM=txn.filter(function(t){return inMonth(t.ts);}), omzetM=txnM.reduce(function(s,t){return s+(t.nominal||0);},0);
    var spendBy={}; txn.forEach(function(t){ if(t.uid) spendBy[t.uid]=(spendBy[t.uid]||0)+(t.nominal||0); });
    var tierCnt={}; mem.forEach(function(m){ var tr=O.tierOf(spendBy[m.uid]||0); tierCnt[tr.name]=(tierCnt[tr.name]||0)+1; });
    var html=promoNotif+'<div class="kpis">'
      +'<div class="kpi"><div class="v">'+num(mem.length)+'</div><div class="l">Total member</div></div>'
      +'<div class="kpi"><div class="v">'+num(poin)+'</div><div class="l">Poin beredar</div></div>'
      +'<div class="kpi"><div class="v">'+num(txnM.length)+'</div><div class="l">Transaksi bln ini</div></div>'
      +'<div class="kpi"><div class="v" style="font-size:1.15rem">'+rp(omzetM)+'</div><div class="l">Omzet bln ini</div></div>'
      +'<div class="kpi"><div class="v">'+num(vou.length)+'</div><div class="l">Voucher dipakai</div></div>'
      +'<div class="kpi"><div class="v">'+num(txn.length)+'</div><div class="l">Total transaksi</div></div>'
      +'</div>';
    html+='<div class="card"><div class="muted" style="margin-bottom:2px;font-size:.74rem">Ketuk legenda untuk lihat membernya 👇</div>'+donut('Umur member', tally(mem,'age'),'age')+donut('Jenis kelamin', tally(mem,'gender'),'gender')+donut('Pekerjaan', tally(mem,'occupation'),'occupation')+donut('Tier member', tierCnt,'')+'</div>';
    html+='<div class="card"><div class="nm">Rekap detail</div><div class="muted" style="margin:5px 0 10px">Transaksi & voucher semua outlet, filter + export CSV.</div><a class="btn" style="display:block;text-align:center;text-decoration:none" href="rekap.html?v=62">Buka Halaman Rekap →</a></div>';
    tabEl.innerHTML=html;
    var _hpl=document.getElementById('homePromoLink'); if(_hpl) _hpl.onclick=function(e){ e.preventDefault(); setActiveTab('promo'); render(); };
    tabEl.querySelectorAll('.lg[data-segf]').forEach(function(el){ el.onclick=function(){ var f=el.getAttribute('data-segf'); if(f) applySegment(f, el.getAttribute('data-segv')); }; });
  }
  async function renderPromo(){
    if(!canEdit){ tabEl.innerHTML='<div class="card"><div class="res warn">👁️ Khusus Admin Utama.</div></div>'; return; }
    tabEl.innerHTML='<div class="card"><div class="nm">📣 Banner carousel (maks 3)</div><div class="muted" style="font-size:.76rem;margin:4px 0 2px">Banner promo di beranda. (Desain banner-nya kamu buat sendiri, tinggal upload.)</div><div id="bnWrap" class="muted" style="margin-top:6px">Memuat…</div></div>'
      +'<div class="card" id="promoBonusCard"><div class="nm">🎁 Bonus poin pendaftaran</div><div id="pbWrap" class="muted" style="margin-top:6px">Memuat…</div></div>';
    loadBanner(); loadPromoBonus();
  }
  async function renderPengaturan(){
    if(!canEdit){ tabEl.innerHTML='<div class="card"><div class="res warn">👁️ Khusus Admin Utama.</div></div>'; return; }
    tabEl.innerHTML='<div class="card"><div class="nm">💬 Pesan otomatis WhatsApp</div><div id="msgWrap" class="muted" style="margin-top:6px">Memuat…</div></div>'
      +'<div class="card"><div class="nm">📜 Rekap Audit (riwayat tindakan)</div><div class="muted" style="font-size:.76rem;margin:4px 0 9px">Catatan semua tindakan penting admin/master: adjust poin, hapus data, ubah promo/banner/pesan, ubah peran staff, dll — lengkap siapa & kapan.</div><div id="auWrap" class="muted">Memuat…</div></div>'
      +(masterEdit?('<div class="card" style="border-color:#F3C2C2"><div class="nm" style="color:#C0392B">⚠️ Zona berbahaya</div>'
        +'<div class="muted" style="font-size:.76rem;margin:5px 0 9px">Reset <b>SEMUA</b> poin member ke 0 (termasuk poin game & check-in). Berguna untuk mulai dari bersih setelah masa uji coba. <b>Tidak bisa dibatalkan.</b></div>'
        +'<label style="display:flex;align-items:center;gap:8px;margin-bottom:9px;font-size:.84rem;font-weight:700;color:#8a6a3a"><input type="checkbox" id="rsScores" style="width:auto"> Reset juga skor game & streak check-in</label>'
        +'<button class="btn red" id="rsBtn">Reset semua poin ke 0</button><div id="rsMsg"></div>'
        +'<div style="border-top:1px dashed #E7C9C9;margin:14px 0 10px"></div>'
        +'<div class="muted" style="font-size:.76rem;margin-bottom:9px">Hapus <b>SEMUA transaksi kasir</b> (termasuk penyesuaian poin admin). Membersihkan grafik omzet & tren dari data uji coba. <b>Tidak bisa dibatalkan.</b></div>'
        +'<button class="btn red" id="txBtn">Hapus semua transaksi kasir</button><div id="txMsg"></div>'
        +'<div style="border-top:1px dashed #E7C9C9;margin:14px 0 10px"></div>'
        +'<div class="muted" style="font-size:.76rem;margin-bottom:9px">Hapus <b>SEMUA voucher yang sudah terpakai</b> (membersihkan riwayat penukaran). Voucher yang masih aktif tidak terhapus. <b>Tidak bisa dibatalkan.</b></div>'
        +'<button class="btn red" id="vcBtn">Hapus semua voucher terpakai</button><div id="vcMsg"></div></div>'
        +'<div class="card"><div class="nm">🗑️ Hapus transaksi detail (pilih sendiri)</div><div class="muted" style="font-size:.76rem;margin:4px 0 9px">Cari & pilih transaksi tertentu untuk dihapus — tidak perlu hapus semua sekaligus.</div>'

    var _sn=document.getElementById('sNext'); if(_sn) _sn.onclick=function(){ sPage++; loadStaff(); };
    if(!canEdit) return;
    box.querySelectorAll('[data-edit]').forEach(function(b){ b.onclick=function(){ var uid=b.getAttribute('data-edit'); var cur=b.getAttribute('data-out')||''; var bk=document.createElement('div'); bk.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px'; bk.innerHTML='<div style="background:#fff;border-radius:16px;padding:18px;max-width:340px;width:100%"><div style="font-weight:800;color:var(--coklat);margin-bottom:10px">Pilih outlet staff</div><select id="soEdit">'+buildOutletOpts()+'</select><div style="display:flex;gap:8px;margin-top:12px"><button class="btn" id="soSave" style="flex:1">Simpan</button><button class="btn sec" id="soCancel" style="flex:1">Batal</button></div></div>'; document.body.appendChild(bk); var sel=bk.querySelector('#soEdit'); if(cur) sel.value=cur; bk.querySelector('#soCancel').onclick=function(){ bk.remove(); }; bk.querySelector('#soSave').onclick=async function(){ var v=sel.value; if(!v){ alert('Pilih outlet dulu.'); return; } busy=true; this.disabled=true; try{ await O.updateStaff(uid,{outlet:v}); bk.remove(); loadStaff(); }catch(e){ alert((e&&e.message)||'Gagal'); this.disabled=false; } busy=false; }; }; });
    box.querySelectorAll('[data-adm]').forEach(function(b){ b.onclick=async function(){ busy=true; b.disabled=true; try{ await O.updateStaff(b.getAttribute('data-adm'),{admin:b.getAttribute('data-on')!=='1'}); loadStaff(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-sup]').forEach(function(b){ b.onclick=async function(){ var mk=b.getAttribute('data-on')!=='1'; busy=true; b.disabled=true; try{ await O.updateStaff(b.getAttribute('data-sup'), mk?{super:true,admin:true}:{super:false}); loadStaff(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-mst]').forEach(function(b){ b.onclick=async function(){ var mk=b.getAttribute('data-on')!=='1'; if(mk && !confirm('Jadikan MASTER? Master bisa hapus data & akses penuh.')) return; busy=true; b.disabled=true; try{ await O.updateStaff(b.getAttribute('data-mst'), mk?{master:true,super:true,admin:true}:{master:false}); loadStaff(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-rem]').forEach(function(b){ b.onclick=async function(){ if(!confirm('Hapus akses staff ini?')) return; busy=true; b.disabled=true; try{ await O.removeStaff(b.getAttribute('data-rem')); loadStaff(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
  }

  /* ---------- REWARD ---------- */
  async function renderReward(){
    tabEl.innerHTML='<div class="card"><div class="nm">🎟️ Riwayat voucher terpakai</div>'
      +'<div class="muted" style="font-size:.76rem;margin:5px 0 9px">Rekap voucher yang sudah ditukar/dipakai, dikelompokkan per reward.</div>'
      +'<button class="btn sec" id="vhBtn">Tampilkan riwayat</button><div id="vhOut" style="margin-top:8px"></div></div>'
      +(canEdit ? ('<div class="card"><div class="nm">Tambah reward baru</div>'
      +'<label>Judul</label><input id="rT" placeholder="cth: Gratis Kopi">'
      +'<label>Catatan (opsional)</label><input id="rN" placeholder="cth: min. belanja 50rb">'
      +'<div style="display:flex;gap:8px"><div style="flex:1"><label>Harga poin</label><input id="rC" inputmode="numeric" placeholder="cth: 150"></div><div style="flex:1"><label>Stok (limit)</label><input id="rL" inputmode="numeric" placeholder="cth: 100"></div></div>'
      +'<label>Jenis voucher (buat dipakai di transaksi CS)</label><select id="rDT"><option value="none">Tidak ada</option><option value="percent">Diskon persen (%)</option><option value="freeitem">Item gratis</option></select>'
      +'<div style="display:flex;gap:8px"><div style="flex:1"><label>Nilai % (kalau persen)</label><input id="rDV" inputmode="numeric" placeholder="cth: 15"></div><div style="flex:1"><label>Maks potongan Rp (opsional)</label><input id="rDM" inputmode="numeric" placeholder="cth: 50000"></div></div>'
      +'<label>Item gratis (kalau item)</label><select id="rFI"><option value="">— pilih —</option>'+(window.OMA_MENU||[]).map(function(m){return '<option value="'+esc(m.id)+'">'+esc((m.cat?m.cat+' — ':'')+m.name)+'</option>';}).join('')+'</select>'
      +'<button class="btn" id="rAdd">＋ Tambah reward</button><div id="rMsg"></div></div>') : '<div class="res warn">👁️ Mode lihat-saja — hanya Admin Utama yang bisa mengelola reward.</div>')
      +'<div class="card"><div class="row" style="border:none;padding:0 0 8px"><div class="grow nm">Daftar reward</div><button class="btn sm sec" id="rReload">↻</button></div><div id="rList"><div class="muted">Memuat…</div></div></div>';
    if(canEdit){ document.getElementById('rAdd').onclick=async function(){ if(busy)return; var _eid=this.dataset.editId||null; busy=true; var msg=document.getElementById('rMsg'); msg.innerHTML='<div class="muted" style="margin-top:8px">Menyimpan…</div>';
      try{ var _dt=document.getElementById('rDT').value; var _pl={ title:document.getElementById('rT').value, note:document.getElementById('rN').value, cost:document.getElementById('rC').value, limit:document.getElementById('rL').value, active:true, discType:_dt };
        if(_dt==='percent'){ _pl.discValue=document.getElementById('rDV').value; _pl.discMax=document.getElementById('rDM').value; }
        if(_dt==='freeitem'){ var _fid=document.getElementById('rFI').value; var _mi=(window.OMA_MENU||[]).find(function(m){return m.id===_fid;}); _pl.freeItemId=_fid; _pl.freeItemName=_mi?((_mi.cat?_mi.cat+' — ':'')+_mi.name):''; _pl.freeItemPrice=_mi?_mi.price:0; }
        await O.saveReward(_eid,_pl);
        msg.innerHTML='<div class="res ok">✓ '+(_eid?'Reward diperbarui.':'Reward ditambahkan.')+'</div>'; resetRewardForm(); loadRewards();
      }catch(e){ msg.innerHTML='<div class="res bad">Gagal: '+esc((e&&e.message)||'')+'</div>'; } busy=false; }; }
    var vh=document.getElementById('vhBtn'); if(vh) vh.onclick=loadVoucherHistory;
    document.getElementById('rReload').onclick=loadRewards; loadRewards();
  }
  async function loadVoucherHistory(){
    var box=document.getElementById('vhOut'); if(!box) return; box.innerHTML='<div class="muted">Memuat…</div>';
    var arr=[]; try{ arr=await O.listUsedVouchers(''); }catch(e){}
    if(!arr.length){ box.innerHTML='<div class="muted">Belum ada voucher terpakai.</div>'; return; }
    var g={}; arr.forEach(function(v){ var t=v.title||'(tanpa nama)'; (g[t]=g[t]||[]).push(v); });
    var keys=Object.keys(g).sort(function(a,b){ return g[b].length-g[a].length; });
    var html='<div class="muted" style="margin-bottom:4px">Total <b>'+arr.length+'</b> voucher terpakai · '+keys.length+' jenis reward</div>';
    keys.forEach(function(t){ var items=g[t];
      html+='<div style="margin:11px 0 3px;font-weight:900;color:#5A3017">🎁 '+esc(t)+' <span class="pts">'+items.length+'x</span></div>';
      html+=items.slice(0,40).map(function(v){ var when=v.ts?new Date(v.ts).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'';
        return '<div class="row" style="padding:5px 0"><div class="grow"><div class="sub" style="font-weight:700;color:#5b4636">'+esc(v.name||'-')+' · '+esc(v.code)+'</div><div class="sub">'+esc(v.outlet||'-')+' · '+esc(when)+'</div></div></div>'; }).join('');
      if(items.length>40) html+='<div class="hint">Tampil 40 dari '+items.length+'.</div>';
    });
    box.innerHTML=html;
  }
  async function loadRewards(){
    var box=document.getElementById('rList'); if(!box) return; box.innerHTML='<div class="muted">Memuat…</div>';
    var arr=[]; try{ arr=await O.listRewardsAdmin(); }catch(e){}
    if(!arr.length){ box.innerHTML='<div class="muted">Belum ada reward.</div>'; return; }
    box.innerHTML=arr.map(function(r){ var rem=(r.limit!=null)?('sisa '+Math.max(0,r.limit-r.claimed)+'/'+r.limit):'tanpa limit';
      return '<div class="row"><div class="grow"><div class="nm">'+esc(r.title)+(r.active?'':' <span class="tag off">OFF</span>')+(r.custom?' <span class="tag adm">custom</span>':'')+'</div>'
        +'<div class="sub"><span class="pts">'+r.cost+' poin</span> · '+rem+(r.discType==='percent'?(' · <b>−'+r.discValue+'%'+(r.discMax?(' maks '+rp(r.discMax)):'')+'</b>'):'')+(r.discType==='freeitem'?(' · <b>gratis '+esc(r.freeItemName||'item')+'</b>'):'')+(r.note?(' · '+esc(r.note)):'')+'</div></div>'
        +(canEdit ? ('<button class="btn sm sec" data-redit=\''+esc(JSON.stringify({id:r.id,title:r.title,note:r.note,cost:r.cost,limit:r.limit,discType:r.discType,discValue:r.discValue,discMax:r.discMax,freeItemId:r.freeItemId,freeItemName:r.freeItemName,freeItemPrice:r.freeItemPrice}))+'\'>Edit</button>'
          +'<button class="btn sm sec" data-ract="'+esc(r.id)+'" data-on="'+(r.active?'1':'0')+'">'+(r.active?'Off':'On')+'</button>'
          +'<button class="btn sm red" data-rdel="'+esc(r.id)+'">Hapus</button>') : '')+'</div>'; }).join('');
    if(!canEdit) return;
    box.querySelectorAll('[data-ract]').forEach(function(b){ b.onclick=async function(){ busy=true; b.disabled=true; try{ await O.setRewardActive(b.getAttribute('data-ract'), b.getAttribute('data-on')!=='1'); loadRewards(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-rdel]').forEach(function(b){ b.onclick=async function(){ if(!confirm('Hapus reward ini?')) return; busy=true; b.disabled=true; try{ await O.deleteReward(b.getAttribute('data-rdel')); loadRewards(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-redit]').forEach(function(b){ b.onclick=function(){ var r=JSON.parse(b.getAttribute('data-redit')); editReward(r); }; });
  }
  function resetRewardForm(){
    ['rT','rN','rC','rL','rDV','rDM'].forEach(function(i){ var e=document.getElementById(i); if(e) e.value=''; });
    var dt=document.getElementById('rDT'); if(dt) dt.value='none';
    var fi=document.getElementById('rFI'); if(fi) fi.value='';
    var add=document.getElementById('rAdd'); if(add){ add.textContent='＋ Tambah reward'; delete add.dataset.editId; }
    var msg=document.getElementById('rMsg'); if(msg) msg.innerHTML='';
  }
  function editReward(r){
    var g=function(id,v){ var e=document.getElementById(id); if(e) e.value=(v==null?'':v); };
    g('rT',r.title); g('rN',r.note||''); g('rC',r.cost); g('rL',r.limit==null?'':r.limit);
    g('rDT', r.discType||'none'); g('rDV', (r.discType==='percent'?(r.discValue||''):'')); g('rDM', (r.discType==='percent'?(r.discMax||''):''));
    var fi=document.getElementById('rFI'); if(fi) fi.value=(r.discType==='freeitem'?(r.freeItemId||''):'');
    var add=document.getElementById('rAdd'); if(add){ add.textContent='💾 Simpan perubahan'; add.dataset.editId=r.id; }
    var msg=document.getElementById('rMsg'); if(msg) msg.innerHTML='<div class="muted" style="margin-top:6px">Mengedit <b>'+esc(r.title)+'</b> — ubah di form atas (item gratis tinggal pilih dari menu, harga ikut menu), lalu Simpan. <a href="#" id="rCancel">Batal</a></div>';
    var cc=document.getElementById('rCancel'); if(cc) cc.onclick=function(e){ e.preventDefault(); resetRewardForm(); };
    try{ document.getElementById('rT').scrollIntoView({block:'center'}); }catch(e){}
  }

  window.addEventListener('omaopa:ready', boot);
  window.addEventListener('omaopa:change', function(){ if(app.style.display==='none') boot(); });
  setTimeout(boot, 800);
})();
</script>
