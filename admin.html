<!DOCTYPE html>
<html lang="id">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Admin — Oma Opa Cakery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --kuning:#FACC1A; --kuning-d:#E0B100; --coklat:#613925; --cream:#FFF8EC; }
  *{box-sizing:border-box}
  body{ margin:0; font-family:'Nunito',system-ui,sans-serif; color:var(--coklat);
    background:radial-gradient(circle at 12% 8%, #FFE7B8 0%, transparent 42%), var(--cream); min-height:100vh; padding:16px 12px 60px; }
  .wrap{ max-width:560px; margin:0 auto; }
  .head{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .head h1{ font-family:'Fredoka'; font-size:1.2rem; margin:0; }
  .badge{ font-size:.66rem; font-weight:900; background:var(--coklat); color:#fff; padding:2px 9px; border-radius:999px; }
  .card{ background:#fff; border:2px solid #EFE2C4; border-radius:16px; padding:14px; margin-bottom:12px; }
  .muted{ color:#9a7a5e; font-weight:700; font-size:.85rem; }
  label{ font-size:.74rem; font-weight:800; color:#8a6a3a; display:block; margin:9px 0 4px; }
  input,select{ width:100%; border:2px solid #E7D8BE; border-radius:10px; padding:10px; font-size:.92rem; font-family:inherit; font-weight:700; color:var(--coklat); background:#fff; }
  input:focus,select:focus{ outline:none; border-color:var(--kuning); }
  .btn{ width:100%; border:none; background:var(--kuning); color:#5A3A05; font-weight:900; font-size:.95rem; border-radius:11px; padding:11px; cursor:pointer; box-shadow:0 3px 0 var(--kuning-d); font-family:inherit; margin-top:9px; }
  .btn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--kuning-d); }
  .btn[disabled]{ opacity:.55; }
  .btn.sec{ background:#fff; color:var(--coklat); border:2px solid #E7D8BE; box-shadow:none; }
  .btn.green{ background:#2E7D32; color:#fff; box-shadow:0 3px 0 #1B5E20; }
  .btn.red{ background:#C0392B; color:#fff; box-shadow:0 3px 0 #922B21; }
  .btn.sm{ width:auto; padding:6px 11px; font-size:.78rem; margin:0; }
  .tabs{ display:flex; gap:5px; margin-bottom:12px; flex-wrap:wrap; }
  .tabs button{ flex:1; min-width:84px; border:2px solid #EFE2C4; background:#fff; color:var(--coklat); font-weight:900; font-size:.78rem; border-radius:11px; padding:9px 4px; cursor:pointer; font-family:inherit; }
  .tabs button.on{ background:var(--coklat); color:#fff; border-color:var(--coklat); }
  .res{ border-radius:12px; padding:12px; margin-top:11px; }
  .ok{ background:#E7F6E7; border:2px solid #B7E0B7; } .bad{ background:#FDECEC; border:2px solid #F3C2C2; color:#C0392B; } .warn{ background:#FFF3D6; border:2px solid #F2D98A; }
  .row{ display:flex; align-items:center; gap:9px; padding:9px 0; border-top:1px solid #F2E8D5; }
  .row:first-child{ border-top:none; }
  .grow{ flex:1; min-width:0; }
  .nm{ font-weight:900; } .sub{ font-size:.74rem; color:#9a7a5e; font-weight:700; }
  .tag{ font-size:.64rem; font-weight:900; border-radius:999px; padding:2px 8px; }
  .tag.on{ background:#2E7D32; color:#fff; } .tag.off{ background:#bdae98; color:#fff; } .tag.adm{ background:var(--kuning); color:#5A3A05; }
  .pts{ font-weight:900; color:#C98A1B; }
  .uid{ font-family:monospace; font-size:.76rem; background:#F1E4CC; border-radius:8px; padding:6px 9px; word-break:break-all; margin-top:6px; }
  a.link{ color:#C98A1B; font-weight:800; text-decoration:none; }
  .area-h{ font-size:.68rem;font-weight:900;color:#fff;background:var(--coklat);border-radius:8px;padding:5px 10px;margin:11px 0 2px;text-transform:uppercase;letter-spacing:.5px;}
  .hint{ font-size:.72rem;color:#a98e6e;font-weight:600;margin-top:5px; }
  /* KPI */
  .kpis{ display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .kpi{ background:#fff; border:2px solid #EFE2C4; border-radius:14px; padding:11px 13px; }
  .kpi .v{ font-family:'Fredoka'; font-size:1.4rem; font-weight:700; color:var(--coklat); line-height:1.1; }
  .kpi .l{ font-size:.7rem; font-weight:800; color:#9a7a5e; margin-top:2px; }
  /* charts */
  .chart{ margin-top:12px; } .chart-h{ font-weight:900; font-size:.86rem; margin-bottom:6px; }
  .chart-b{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .legend{ flex:1; min-width:150px; } .lg{ font-size:.78rem; font-weight:700; color:#5b4636; margin:3px 0; }
  .lg .dot{ display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:6px; vertical-align:middle; }
  table.mt{ width:100%; border-collapse:collapse; font-size:.8rem; }
  table.mt th{ text-align:left; font-size:.66rem; text-transform:uppercase; color:#a9743c; padding:6px 6px; border-bottom:2px solid #EFE2C4; }
  table.mt td{ padding:8px 6px; border-bottom:1px solid #F2E8D5; font-weight:700; }
  table.mt tr{ cursor:pointer; } table.mt tr:hover td{ background:#FFF8EC; }
  .bar{ margin:9px 0; } .bar .bl{ display:flex; justify-content:space-between; gap:8px; font-size:.78rem; font-weight:800; color:#5b4636; margin-bottom:3px; }
  .bar .bt{ height:13px; background:#EFE6D2; border-radius:999px; overflow:hidden; }
  .bar .bf{ height:100%; background:linear-gradient(90deg,#FACC1A,#E0915B); border-radius:999px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><h1>Admin Oma Opa</h1><span class="badge" id="roleBadge">ADMIN</span></div>
  <div id="gate" class="card"><div class="muted">Menyiapkan…</div></div>
  <div id="app" style="display:none">
    <div class="tabs">
      <button data-tab="home" class="on">📊 Ringkasan</button>
      <button data-tab="member">👤 Member</button>
      <button data-tab="outlet">🏪 Outlet</button>
      <button data-tab="staff">🧑‍🍳 Staff</button>
      <button data-tab="reward">🎁 Reward</button>
      <button data-tab="analitik">📈 Analitik</button>
      <button data-tab="pesanan">🧾 Pesanan</button>
    </div>
    <div id="tab"></div>
  </div>
  <div style="text-align:center"><a class="link" href="index.html">‹ Ke beranda</a></div>
</div>

<script src="outlets-data.js?v=62"></script>
<script type="module" src="core-omaopa.js?v=62"></script>
<script>
(function(){
  var O=null, gate=document.getElementById('gate'), app=document.getElementById('app'), tabEl=document.getElementById('tab');
  var tab='home', busy=false, segFilter=null, canEdit=false;
  var MEMBERS=null, TXN=null; // cache
  var curOf='baru', curOrders=[];
  var PAL=['#FACC1A','#E0915B','#7CC9B5','#C98A4B','#88B0E0','#F4A6B0','#9a8b78','#B7D77A','#caa6e0'];
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function rp(n){ try{ return 'Rp'+Number(n||0).toLocaleString('id-ID'); }catch(e){ return 'Rp'+n; } }
  function num(n){ try{ return Number(n||0).toLocaleString('id-ID'); }catch(e){ return ''+n; } }

  async function boot(){
    O=window.OmaOpa; if(!O){ gate.innerHTML='<div class="muted">Menyiapkan…</div>'; return; }
    var u=O.getUser();
    if(!u){ gate.innerHTML='<div class="muted">Halaman khusus admin. Silakan masuk dulu.</div><button class="btn" id="lg">Masuk</button>';
      document.getElementById('lg').onclick=function(){ O.openLogin(); }; app.style.display='none'; return; }
    gate.innerHTML='<div class="muted">Memeriksa akses admin…</div>';
    var adm=false; try{ adm=await O.isAdmin(); }catch(e){}
    if(!adm){ gate.innerHTML='<div style="font-weight:900;color:#C0392B">Akun ini bukan admin.</div>'
        +'<div class="muted" style="margin-top:8px">Minta admin menandai akun (UID) ini dengan <b>admin: true</b> di koleksi <b>staff</b>:</div>'
        +'<div class="uid">'+esc(u.uid)+'</div><button class="btn sec" id="out">Keluar / ganti akun</button>';
      document.getElementById('out').onclick=async function(){ try{ await O.signOut(); }catch(e){} }; app.style.display='none'; return; }
    try{ canEdit=await O.isSuper(); }catch(e){ canEdit=false; }
    var rbg=document.getElementById('roleBadge'); if(rbg){ rbg.textContent=canEdit?'ADMIN UTAMA':'LIHAT-SAJA'; rbg.style.background=canEdit?'#613925':'#9a8b78'; }
    gate.style.display='none'; app.style.display=''; render();
  }
  document.querySelectorAll('.tabs button').forEach(function(b){ b.onclick=function(){
    tab=b.getAttribute('data-tab'); document.querySelectorAll('.tabs button').forEach(function(x){ x.classList.remove('on'); }); b.classList.add('on'); render();
  }; });
  function render(){ ({home:renderHome, member:renderMember, outlet:renderOutlet, staff:renderStaff, reward:renderReward, analitik:renderAnalitik, pesanan:renderPesanan}[tab]||renderHome)(); }
  function setActiveTab(name){ tab=name; document.querySelectorAll('.tabs button').forEach(function(x){ x.classList.toggle('on', x.getAttribute('data-tab')===name); }); }
  function applySegment(field,val){ segFilter={field:field, value:val}; setActiveTab('member'); render(); }

  async function getMembers(force){ if(MEMBERS&&!force) return MEMBERS; try{ MEMBERS=await O.listMembers('',2000); }catch(e){ MEMBERS=[]; } return MEMBERS; }
  async function getTxn(force){ if(TXN&&!force) return TXN; try{ TXN=await O.listTransactions(''); }catch(e){ TXN=[]; } return TXN; }
  function barH(title, rows){
    var max=Math.max.apply(null, rows.map(function(r){return r.value;}).concat([1]));
    var body=rows.map(function(r,i){ var pct=Math.round(r.value/max*100);
      return '<div style="margin:7px 0"><div style="display:flex;justify-content:space-between;gap:8px;font-size:.78rem;font-weight:800;color:#5b4636"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.label)+'</span><span style="flex:0 0 auto">'+esc(r.sub!=null?r.sub:r.value)+'</span></div>'
        +'<div style="height:10px;background:#EFE6D2;border-radius:999px;overflow:hidden;margin-top:2px"><span style="display:block;height:100%;width:'+pct+'%;background:'+PAL[i%PAL.length]+';border-radius:999px"></span></div></div>'; }).join('');
    return '<div class="chart"><div class="chart-h">'+esc(title)+'</div>'+(rows.length?body:'<div class="muted">Belum ada data.</div>')+'</div>';
  }
  function lineChart(title, pts, labels){
    var W=320,H=120,pad=10; var max=Math.max.apply(null,pts.concat([1])); var n=pts.length; var step=n>1?(W-2*pad)/(n-1):0;
    var co=pts.map(function(v,i){ return [pad+i*step, H-pad-(v/max)*(H-2*pad)]; });
    var poly=co.map(function(c){return c[0].toFixed(1)+','+c[1].toFixed(1);}).join(' ');
    var dots=co.map(function(c){return '<circle cx="'+c[0].toFixed(1)+'" cy="'+c[1].toFixed(1)+'" r="2.4" fill="#C98A1B"/>';}).join('');
    var svg='<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="128" preserveAspectRatio="none"><polyline points="'+poly+'" fill="none" stroke="#E0915B" stroke-width="2.5" stroke-linejoin="round"/>'+dots+'</svg>';
    var lab=labels?('<div style="display:flex;justify-content:space-between;font-size:.62rem;color:#9a7a5e;font-weight:700"><span>'+esc(labels[0])+'</span><span>'+esc(labels[labels.length-1])+'</span></div>'):'';
    return '<div class="chart"><div class="chart-h">'+esc(title)+'</div>'+svg+lab+'</div>';
  }

  function donut(title, data, field){
    var ent=Object.keys(data).map(function(k){return {k:k,v:data[k]};}).filter(function(e){return e.v>0;}).sort(function(a,b){return b.v-a.v;});
    var total=ent.reduce(function(s,e){return s+e.v;},0)||1; var r=52,C=2*Math.PI*r,off=0;
    var circ=ent.map(function(e,i){ var len=e.v/total*C; var s='<circle cx="70" cy="70" r="'+r+'" fill="none" stroke="'+PAL[i%PAL.length]+'" stroke-width="22" stroke-dasharray="'+len+' '+(C-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 70 70)"/>'; off+=len; return s; }).join('');
    var svg='<svg viewBox="0 0 140 140" width="132" height="132">'+circ+'<text x="70" y="67" text-anchor="middle" font-size="15" font-weight="900" fill="#613925">'+total+'</text><text x="70" y="83" text-anchor="middle" font-size="9" fill="#9a7a5e">total</text></svg>';
    var leg=ent.map(function(e,i){ return '<div class="lg" data-segf="'+esc(field||'')+'" data-segv="'+esc(e.k)+'" style="cursor:pointer"><span class="dot" style="background:'+PAL[i%PAL.length]+'"></span>'+esc(e.k)+' <b>'+e.v+'</b> ('+Math.round(e.v/total*100)+'%) ›</div>'; }).join('');
    return '<div class="chart"><div class="chart-h">'+esc(title)+'</div><div class="chart-b"><div>'+svg+'</div><div class="legend">'+leg+'</div></div></div>';
  }
  function tally(arr, key){ var m={}; arr.forEach(function(x){ var v=(x[key]||'').toString().trim()||'Tidak diisi'; m[v]=(m[v]||0)+1; }); return m; }

  /* ---------- RINGKASAN ---------- */
  async function renderHome(){
    tabEl.innerHTML='<div class="card"><div class="muted">Memuat ringkasan…</div></div>';
    var mem=await getMembers(), txn=[], vou=[];
    txn=await getTxn();
    try{ vou=await O.listUsedVouchers(''); }catch(e){}
    var now=new Date(), mKey=now.getFullYear()+'-'+(now.getMonth()+1);
    var inMonth=function(ts){ var d=new Date(ts); return (d.getFullYear()+'-'+(d.getMonth()+1))===mKey; };
    var poin=mem.reduce(function(s,m){return s+(m.points||0);},0);
    var txnM=txn.filter(function(t){return inMonth(t.ts);}), omzetM=txnM.reduce(function(s,t){return s+(t.nominal||0);},0);
    var spendBy={}; txn.forEach(function(t){ if(t.uid) spendBy[t.uid]=(spendBy[t.uid]||0)+(t.nominal||0); });
    var tierCnt={}; mem.forEach(function(m){ var tr=O.tierOf(spendBy[m.uid]||0); tierCnt[tr.name]=(tierCnt[tr.name]||0)+1; });
    var html='<div class="kpis">'
      +'<div class="kpi"><div class="v">'+num(mem.length)+'</div><div class="l">Total member</div></div>'
      +'<div class="kpi"><div class="v">'+num(poin)+'</div><div class="l">Poin beredar</div></div>'
      +'<div class="kpi"><div class="v">'+num(txnM.length)+'</div><div class="l">Transaksi bln ini</div></div>'
      +'<div class="kpi"><div class="v" style="font-size:1.15rem">'+rp(omzetM)+'</div><div class="l">Omzet bln ini</div></div>'
      +'<div class="kpi"><div class="v">'+num(vou.length)+'</div><div class="l">Voucher dipakai</div></div>'
      +'<div class="kpi"><div class="v">'+num(txn.length)+'</div><div class="l">Total transaksi</div></div>'
      +'</div>';
    html+='<div class="card"><div class="muted" style="margin-bottom:2px;font-size:.74rem">Ketuk legenda untuk lihat membernya 👇</div>'+donut('Umur member', tally(mem,'age'),'age')+donut('Jenis kelamin', tally(mem,'gender'),'gender')+donut('Pekerjaan', tally(mem,'occupation'),'occupation')+donut('Tier member', tierCnt,'')+'</div>';
    if(canEdit) html+='<div class="card"><div class="nm">📣 Banner promo di app</div><div id="bnWrap" class="muted" style="margin-top:6px">Memuat…</div></div>';
    html+='<div class="card"><div class="nm">Rekap detail</div><div class="muted" style="margin:5px 0 10px">Transaksi & voucher semua outlet, filter + export CSV.</div><a class="btn" style="display:block;text-align:center;text-decoration:none" href="rekap.html?v=62">Buka Halaman Rekap →</a></div>';
    tabEl.innerHTML=html;
    tabEl.querySelectorAll('.lg[data-segf]').forEach(function(el){ el.onclick=function(){ var f=el.getAttribute('data-segf'); if(f) applySegment(f, el.getAttribute('data-segv')); }; });
    if(canEdit) loadBanner();
  }
  async function loadBanner(){
    var w=document.getElementById('bnWrap'); if(!w) return; var b={text:'',active:false,image:'',link:''}; try{ b=await O.getAnnouncement(); }catch(e){}
    w.classList.remove('muted');
    var pending=null;
    w.innerHTML='<div class="muted" style="font-size:.76rem;margin-bottom:8px">Upload <b>gambar banner</b> (persegi panjang). Disarankan <b>1080 × 360 px</b> (rasio 3:1), JPG/PNG. Gambar otomatis dikecilkan & dikompres.</div>'
      +'<div id="bnPrev" style="margin-bottom:8px"></div>'
      +'<label>Pilih gambar banner</label><input type="file" id="bnFile" accept="image/*">'
      +'<label style="margin-top:10px">Link saat banner diklik (opsional)</label><input id="bnLink" value="'+esc(b.link||'')+'" placeholder="https://... (mis. WA / IG / promo)">'
      +'<label style="display:flex;align-items:center;gap:8px;margin-top:10px"><input type="checkbox" id="bnAct" style="width:auto" '+(b.active?'checked':'')+'> Tampilkan banner di app</label>'
      +'<div style="display:flex;gap:8px;margin-top:6px"><button class="btn" id="bnSave">Simpan banner</button><button class="btn sec" id="bnDel">Hapus gambar</button></div><div id="bnMsg"></div>';
    function renderPrev(src){ var p=document.getElementById('bnPrev'); if(!p) return; if(!src){ p.innerHTML='<div class="muted" style="font-size:.78rem">Belum ada gambar.</div>'; return; } p.innerHTML='<img src="'+src+'" style="width:100%;border-radius:12px;border:2px solid #EFE2C4;display:block">'; }
    renderPrev(b.image||'');
    document.getElementById('bnFile').onchange=function(){
      var f=this.files&&this.files[0]; if(!f) return; var m=document.getElementById('bnMsg'); m.innerHTML='<div class="muted" style="margin-top:8px">Memproses gambar…</div>';
      var rd=new FileReader();
      rd.onload=function(){ var img=new Image(); img.onload=function(){
        var maxW=1080; var sc=Math.min(1, maxW/img.width); var cw=Math.round(img.width*sc), ch=Math.round(img.height*sc);
        var cv=document.createElement('canvas'); cv.width=cw; cv.height=ch; cv.getContext('2d').drawImage(img,0,0,cw,ch);
        var q=0.82; pending=cv.toDataURL('image/jpeg',q);
        while(pending.length>900000 && q>0.4){ q-=0.12; pending=cv.toDataURL('image/jpeg',q); }
        renderPrev(pending); var kb=Math.round(pending.length*0.75/1024);
        m.innerHTML='<div class="res ok">✓ Gambar siap ('+cw+'×'+ch+', ~'+kb+'KB). Klik "Simpan banner".</div>';
      }; img.onerror=function(){ m.innerHTML='<div class="res bad">Gambar tidak terbaca.</div>'; }; img.src=rd.result; };
      rd.readAsDataURL(f);
    };
    document.getElementById('bnSave').onclick=async function(){ if(busy)return; busy=true; var m=document.getElementById('bnMsg'); m.innerHTML='<div class="muted" style="margin-top:8px">Menyimpan…</div>';
      try{ var opts={ link:document.getElementById('bnLink').value, active:document.getElementById('bnAct').checked }; if(pending) opts.image=pending;
        await O.saveBanner(opts); m.innerHTML='<div class="res ok">✓ Banner disimpan.</div>'; pending=null;
      }catch(e){ m.innerHTML='<div class="res bad">Gagal: '+esc((e&&e.message)||'')+'</div>'; } busy=false; };
    document.getElementById('bnDel').onclick=async function(){ if(busy)return; if(!confirm('Hapus gambar banner?')) return; busy=true; var m=document.getElementById('bnMsg'); m.innerHTML='<div class="muted" style="margin-top:8px">Menghapus…</div>';
      try{ await O.saveBanner({ image:'', active:false }); pending=null; renderPrev(''); var ac=document.getElementById('bnAct'); if(ac) ac.checked=false; m.innerHTML='<div class="res ok">✓ Gambar dihapus.</div>'; }catch(e){ m.innerHTML='<div class="res bad">Gagal: '+esc((e&&e.message)||'')+'</div>'; } busy=false; };
  }

  /* ---------- MEMBER ---------- */
  async function renderMember(){
    var seg=segFilter; var LM={age:'Umur',gender:'Jenis kelamin',occupation:'Pekerjaan'};
    var chip = seg ? '<div class="card"><div class="row" style="border:none;padding:0"><div class="grow"><span class="muted">Filter aktif:</span> <b>'+esc(LM[seg.field]||seg.field)+' = '+esc(seg.value)+'</b></div><button class="btn sm sec" id="segClr">✕ Hapus</button></div></div>' : '';
    tabEl.innerHTML=chip
      +'<div class="card"><div class="nm">Cari / lihat member</div>'
      +'<label>Nama atau No. HP (kosongkan = semua)</label><input id="mq" placeholder="cth: Budi / 0812...">'
      +'<button class="btn" id="mfind">Tampilkan</button><div id="mlist" class="muted" style="margin-top:8px">Memuat…</div></div>'
      +'<div id="mdetail"></div>'
      +'<div class="card"><div class="nm">🎟️ Cari & batalkan voucher (kode)</div>'
      +'<label>Kode voucher</label><input id="vq" placeholder="OO-XXXXXXXX" style="text-transform:uppercase">'
      +'<button class="btn sec" id="vfind">Cek voucher</button><div id="vout"></div></div>'
      +'<div class="card"><div class="nm">😴 Member tidak aktif (win-back)</div>'
      +'<div style="display:flex;gap:6px;margin:9px 0"><button class="btn sm sec" data-inact="30">30 hari</button><button class="btn sm sec" data-inact="60">60 hari</button><button class="btn sm sec" data-inact="90">90 hari</button></div>'
      +'<div id="inact" class="muted">Pilih rentang di atas untuk lihat member yang sudah lama tidak belanja, lalu sapa via WhatsApp.</div></div>'
      +'<div class="card"><div class="nm">🛡️ Audit poin (deteksi tidak wajar)</div>'
      +'<div class="muted" style="font-size:.76rem;margin:5px 0 9px">Membandingkan poin dengan total belanja. Poin dari game & check-in itu wajar, jadi pakai ini untuk <b>menyaring kandidat yang perlu dicek</b> sebelum kasih hadiah besar — bukan vonis.</div>'

    var appr=orders.filter(function(o){return (o.status||'baru')==='approved';});
    var pend=orders.filter(function(o){return (o.status||'baru')==='baru';}).length;
    var totOrder=appr.length, nilai=appr.reduce(function(s,o){return s+(o.total||0);},0);
    var im={}; appr.forEach(function(o){ (o.items||[]).forEach(function(it){ var key=(it.cat?it.cat+' - ':'')+(it.name||it.id||'?'); im[key]=(im[key]||0)+(it.qty||0); }); });
    var best=Object.keys(im).map(function(k){return {label:k,value:im[k],sub:im[k]+' pcs'};}).sort(function(a,b){return b.value-a.value;}).slice(0,8);
    var om={}; txn.forEach(function(t){ var o=t.outlet||'(lainnya)'; om[o]=(om[o]||0)+(t.nominal||0); });

    txn.forEach(function(t){ var dd=new Date(t.ts); dd.setHours(0,0,0,0); var diff=Math.round((today-dd)/86400000); var idx=days-1-diff; if(idx>=0&&idx<days) buckets[idx]++; });

  function openOrderEdit(id){
    var o=null; for(var i=0;i<curOrders.length;i++){ if(curOrders[i].id===id){ o=curOrders[i]; break; } }
    if(!o){ alert('Pesanan tidak ditemukan, muat ulang dulu.'); return; }
    var items=(o.items||[]).map(function(it){ return { id:it.id||'', cat:it.cat||'', name:it.name||'', price:Number(it.price)||0, qty:Number(it.qty)||0 }; });
    var ov=document.getElementById('oEditOv');
    if(!ov){ ov=document.createElement('div'); ov.id='oEditOv';
      ov.style.cssText='position:fixed;inset:0;background:rgba(60,40,20,.55);display:flex;align-items:flex-end;justify-content:center;z-index:99999';
      document.body.appendChild(ov);

        +'<div class="grow"><div style="font-weight:800;font-size:.85rem;color:var(--coklat)">'+esc(it.name||'(item)')+'</div>'
        +'<div class="muted" style="font-size:.7rem">'+esc(it.cat||'')+'</div></div>'
        +'<div style="width:62px"><div class="muted" style="font-size:.62rem">Qty</div><input type="number" inputmode="numeric" min="0" data-iq="'+ix+'" value="'+it.qty+'" style="padding:7px"></div>'
        +'<div style="width:96px"><div class="muted" style="font-size:.62rem">Harga</div><input type="number" inputmode="numeric" min="0" data-ip="'+ix+'" value="'+it.price+'" style="padding:7px"></div>'
        +'</div>';
    }).join('') || '<div class="muted" style="font-size:.78rem">Pesanan ini tanpa rincian item.</div>';
    ov.innerHTML='<div style="background:var(--cream);width:100%;max-width:480px;max-height:92vh;border-radius:18px 18px 0 0;display:flex;flex-direction:column;overflow:hidden">'
      +'<div style="display:flex;align-items:center;gap:8px;padding:14px 16px;border-bottom:2px solid #F0E2C4;background:#fff"><div class="nm" style="flex:1">📝 Edit pesanan</div><button class="btn sm sec" id="oeX" style="width:34px;margin:0">✕</button></div>'
      +'<div style="overflow:auto;padding:13px 15px">'
      +'<label class="muted" style="font-size:.72rem;font-weight:800">Nama</label><input id="oeNama" value="'+esc(o.nama||'')+'">'
      +'<label class="muted" style="font-size:.72rem;font-weight:800;display:block;margin-top:9px">No telepon</label><input id="oeTelp" value="'+esc(o.telp||'')+'">'
      +'<div style="display:flex;gap:8px"><div style="flex:1"><label class="muted" style="font-size:.72rem;font-weight:800;display:block;margin-top:9px">Tanggal</label><input id="oeTgl" type="date" value="'+esc(o.tgl||'')+'"></div>'
      +'<div style="width:120px"><label class="muted" style="font-size:.72rem;font-weight:800;display:block;margin-top:9px">Jam</label><input id="oeJam" value="'+esc(o.jam||'')+'" placeholder="mis. 14:00"></div></div>'
      +'<label class="muted" style="font-size:.72rem;font-weight:800;display:block;margin-top:9px">Outlet</label><input id="oeOut" value="'+esc(o.outlet||'')+'">'
      +'<label class="muted" style="font-size:.72rem;font-weight:800;display:block;margin-top:9px">Catatan</label><input id="oeNote" value="'+esc(o.note||'')+'">'
      +'<div class="nm" style="font-size:.82rem;margin:14px 0 2px">Item & harga</div>'+itemRows
      +'<div class="row" style="border-top:2px solid #EFE2C4;margin-top:8px;padding-top:10px"><div class="grow nm">Total</div><div class="pts" id="oeTot" style="font-size:1.05rem">'+rp(o.total)+'</div></div>'
      +'<label class="muted" style="font-size:.72rem;font-weight:800;display:block;margin-top:4px">Total dihitung dari item. Centang di bawah kalau mau isi manual (mis. ada diskon).</label>'
      +'<div class="row" style="border:none;padding:6px 0"><input type="checkbox" id="oeMan" style="width:auto"><div class="grow">Isi total manual</div><input id="oeTotIn" type="number" inputmode="numeric" value="'+(Number(o.total)||0)+'" disabled style="width:120px"></div>'
      +'</div>'
      +'<div style="padding:11px 15px;border-top:2px solid #F0E2C4;background:#fff;display:flex;gap:8px"><button class="btn sec" id="oeCancel" style="margin:0">Batal</button><button class="btn green" id="oeSave" style="margin:0">💾 Simpan</button></div>'
      +'</div>';
    function calc(){
      var t=0; ov.querySelectorAll('[data-iq]').forEach(function(q){ var ix=+q.getAttribute('data-iq'); var qty=Math.max(0,parseInt(q.value,10)||0); var pr=Math.max(0,parseInt(ov.querySelector('[data-ip="'+ix+'"]').value,10)||0); t+=qty*pr; });
      ov.querySelector('#oeTot').textContent=rp(t);
      var man=ov.querySelector('#oeMan').checked; if(!man) ov.querySelector('#oeTotIn').value=t;
      return t;
    }
    ov.querySelectorAll('[data-iq],[data-ip]').forEach(function(el){ el.addEventListener('input',calc); });
    var man=ov.querySelector('#oeMan'); man.onchange=function(){ ov.querySelector('#oeTotIn').disabled=!man.checked; if(!man.checked) calc(); };
    function shut(){ ov.remove(); }
    ov.querySelector('#oeX').onclick=shut; ov.querySelector('#oeCancel').onclick=shut;
    ov.onclick=function(e){ if(e.target===ov) shut(); };
    calc();
    ov.querySelector('#oeSave').onclick=function(){
      var newItems=items.map(function(it,ix){ var qty=Math.max(0,parseInt(ov.querySelector('[data-iq="'+ix+'"]').value,10)||0); var pr=Math.max(0,parseInt(ov.querySelector('[data-ip="'+ix+'"]').value,10)||0); return { id:it.id, cat:it.cat, name:it.name, price:pr, qty:qty }; });
      var calcTot=newItems.reduce(function(s,it){ return s+it.price*it.qty; },0);
      var useMan=ov.querySelector('#oeMan').checked;
      var total=useMan ? (parseInt(ov.querySelector('#oeTotIn').value,10)||0) : calcTot;
      var count=newItems.reduce(function(s,it){ return s+it.qty; },0);
      var patch={ nama:ov.querySelector('#oeNama').value.trim(), telp:ov.querySelector('#oeTelp').value.trim(),
        tgl:ov.querySelector('#oeTgl').value, jam:ov.querySelector('#oeJam').value.trim(),
        outlet:ov.querySelector('#oeOut').value.trim(), note:ov.querySelector('#oeNote').value.trim(),
        items:newItems, total:total, count:count };
      var sv=ov.querySelector('#oeSave'); sv.disabled=true; sv.textContent='Menyimpan…';
      Promise.resolve().then(function(){ return O.updateOrder(id, patch); }).then(function(){ shut(); loadOrders(curOf); })
        .catch(function(e){ alert((e&&e.message)||'Gagal'); sv.disabled=false; sv.textContent='💾 Simpan'; });
    };
  }

    var PRIO=['Yogya','Solo Raya','Semarang']; areas.sort(function(a,b){ var ia=PRIO.indexOf(a),ib=PRIO.indexOf(b); if(ia<0)ia=99; if(ib<0)ib=99; return ia!==ib?ia-ib:a.localeCompare(b); });

    box.innerHTML=arr.map(function(r){ var rem=(r.limit!=null)?('sisa '+Math.max(0,r.limit-r.claimed)+'/'+r.limit):'tanpa limit';
      return '<div class="row"><div class="grow"><div class="nm">'+esc(r.title)+(r.active?'':' <span class="tag off">OFF</span>')+(r.custom?' <span class="tag adm">custom</span>':'')+'</div>'
        +'<div class="sub"><span class="pts">'+r.cost+' poin</span> · '+rem+(r.note?(' · '+esc(r.note)):'')+'</div></div>'
        +(canEdit ? ('<button class="btn sm sec" data-redit=\''+esc(JSON.stringify({id:r.id,title:r.title,note:r.note,cost:r.cost,limit:r.limit}))+'\'>Edit</button>'
          +'<button class="btn sm sec" data-ract="'+esc(r.id)+'" data-on="'+(r.active?'1':'0')+'">'+(r.active?'Off':'On')+'</button>'
          +(r.custom?'<button class="btn sm red" data-rdel="'+esc(r.id)+'">Hapus</button>':'')) : '')+'</div>'; }).join('');
    if(!canEdit) return;
    box.querySelectorAll('[data-ract]').forEach(function(b){ b.onclick=async function(){ busy=true; b.disabled=true; try{ await O.setRewardActive(b.getAttribute('data-ract'), b.getAttribute('data-on')!=='1'); loadRewards(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-rdel]').forEach(function(b){ b.onclick=async function(){ if(!confirm('Hapus reward ini?')) return; busy=true; b.disabled=true; try{ await O.deleteReward(b.getAttribute('data-rdel')); loadRewards(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-redit]').forEach(function(b){ b.onclick=function(){ var r=JSON.parse(b.getAttribute('data-redit')); editReward(r); }; });
  }
  function editReward(r){
    var t=prompt('Judul:', r.title); if(t==null) return;
    var c=prompt('Harga poin:', r.cost); if(c==null) return;
    var l=prompt('Stok (limit), kosong = tetap:', r.limit==null?'':r.limit);
    var n=prompt('Catatan:', r.note||'');
    busy=true; O.saveReward(r.id,{ title:t, cost:c, limit:l, note:n }).then(function(){ busy=false; loadRewards(); }).catch(function(e){ busy=false; alert((e&&e.message)||'Gagal'); });
  }

  window.addEventListener('omaopa:ready', boot);
  window.addEventListener('omaopa:change', function(){ if(app.style.display==='none') boot(); });
  setTimeout(boot, 800);
})();
</script>
</body>
</html>
