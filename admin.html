<!DOCTYPE html>
<html lang="id">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache"><meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Admin — Oma Opa Cakery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --kuning:#FACC1A; --kuning-d:#E0B100; --coklat:#613925; --cream:#FFF8EC; }
  *{box-sizing:border-box}
  body{ margin:0; font-family:'Nunito',system-ui,sans-serif; color:var(--coklat);
    background:radial-gradient(circle at 12% 8%, #FFE7B8 0%, transparent 42%), var(--cream); min-height:100vh; padding:16px 12px 60px; }
  .wrap{ max-width:560px; margin:0 auto; }
  .head{ display:flex; align-items:center; gap:10px; margin-bottom:12px; }
  .head h1{ font-family:'Fredoka'; font-size:1.2rem; margin:0; }
  .badge{ font-size:.66rem; font-weight:900; background:var(--coklat); color:#fff; padding:2px 9px; border-radius:999px; }
  .card{ background:#fff; border:2px solid #EFE2C4; border-radius:16px; padding:14px; margin-bottom:12px; }
  .muted{ color:#9a7a5e; font-weight:700; font-size:.85rem; }
  label{ font-size:.74rem; font-weight:800; color:#8a6a3a; display:block; margin:9px 0 4px; }
  input,select{ width:100%; border:2px solid #E7D8BE; border-radius:10px; padding:10px; font-size:.92rem; font-family:inherit; font-weight:700; color:var(--coklat); background:#fff; }
  input:focus,select:focus{ outline:none; border-color:var(--kuning); }
  .btn{ width:100%; border:none; background:var(--kuning); color:#5A3A05; font-weight:900; font-size:.95rem; border-radius:11px; padding:11px; cursor:pointer; box-shadow:0 3px 0 var(--kuning-d); font-family:inherit; margin-top:9px; }
  .btn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--kuning-d); }
  .btn[disabled]{ opacity:.55; }
  .btn.sec{ background:#fff; color:var(--coklat); border:2px solid #E7D8BE; box-shadow:none; }
  .btn.green{ background:#2E7D32; color:#fff; box-shadow:0 3px 0 #1B5E20; }
  .btn.red{ background:#C0392B; color:#fff; box-shadow:0 3px 0 #922B21; }
  .btn.sm{ width:auto; padding:6px 11px; font-size:.78rem; margin:0; }
  .tabs{ display:flex; gap:5px; margin-bottom:12px; flex-wrap:wrap; }
  .tabs button{ flex:1; min-width:84px; border:2px solid #EFE2C4; background:#fff; color:var(--coklat); font-weight:900; font-size:.78rem; border-radius:11px; padding:9px 4px; cursor:pointer; font-family:inherit; }
  .tabs button.on{ background:var(--coklat); color:#fff; border-color:var(--coklat); }
  .res{ border-radius:12px; padding:12px; margin-top:11px; }
  .ok{ background:#E7F6E7; border:2px solid #B7E0B7; } .bad{ background:#FDECEC; border:2px solid #F3C2C2; color:#C0392B; } .warn{ background:#FFF3D6; border:2px solid #F2D98A; }
  .row{ display:flex; align-items:center; gap:9px; padding:9px 0; border-top:1px solid #F2E8D5; }
  .row:first-child{ border-top:none; }
  .grow{ flex:1; min-width:0; }
  .nm{ font-weight:900; } .sub{ font-size:.74rem; color:#9a7a5e; font-weight:700; }
  .tag{ font-size:.64rem; font-weight:900; border-radius:999px; padding:2px 8px; }
  .tag.on{ background:#2E7D32; color:#fff; } .tag.off{ background:#bdae98; color:#fff; } .tag.adm{ background:var(--kuning); color:#5A3A05; }
  .pts{ font-weight:900; color:#C98A1B; }
  .uid{ font-family:monospace; font-size:.76rem; background:#F1E4CC; border-radius:8px; padding:6px 9px; word-break:break-all; margin-top:6px; }
  a.link{ color:#C98A1B; font-weight:800; text-decoration:none; }
  .area-h{ font-size:.68rem;font-weight:900;color:#fff;background:var(--coklat);border-radius:8px;padding:5px 10px;margin:11px 0 2px;text-transform:uppercase;letter-spacing:.5px;}
  .hint{ font-size:.72rem;color:#a98e6e;font-weight:600;margin-top:5px; }
  /* KPI */
  .kpis{ display:grid; grid-template-columns:1fr 1fr; gap:9px; }
  .kpi{ background:#fff; border:2px solid #EFE2C4; border-radius:14px; padding:11px 13px; }
  .kpi .v{ font-family:'Fredoka'; font-size:1.4rem; font-weight:700; color:var(--coklat); line-height:1.1; }
  .kpi .l{ font-size:.7rem; font-weight:800; color:#9a7a5e; margin-top:2px; }
  /* charts */
  .chart{ margin-top:12px; } .chart-h{ font-weight:900; font-size:.86rem; margin-bottom:6px; }
  .chart-b{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .legend{ flex:1; min-width:150px; } .lg{ font-size:.78rem; font-weight:700; color:#5b4636; margin:3px 0; }
  .lg .dot{ display:inline-block; width:11px; height:11px; border-radius:3px; margin-right:6px; vertical-align:middle; }
  table.mt{ width:100%; border-collapse:collapse; font-size:.8rem; }
  table.mt th{ text-align:left; font-size:.66rem; text-transform:uppercase; color:#a9743c; padding:6px 6px; border-bottom:2px solid #EFE2C4; }
  table.mt td{ padding:8px 6px; border-bottom:1px solid #F2E8D5; font-weight:700; }
  table.mt tr{ cursor:pointer; } table.mt tr:hover td{ background:#FFF8EC; }
  .bar{ margin:9px 0; } .bar .bl{ display:flex; justify-content:space-between; gap:8px; font-size:.78rem; font-weight:800; color:#5b4636; margin-bottom:3px; }
  .bar .bt{ height:13px; background:#EFE6D2; border-radius:999px; overflow:hidden; }
  .bar .bf{ height:100%; background:linear-gradient(90deg,#FACC1A,#E0915B); border-radius:999px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><h1>Admin Oma Opa</h1><span class="badge">MASTER</span></div>
  <div id="gate" class="card"><div class="muted">Menyiapkan…</div></div>
  <div id="app" style="display:none">
    <div class="tabs">
      <button data-tab="home" class="on">📊 Ringkasan</button>
      <button data-tab="member">👤 Member</button>
      <button data-tab="outlet">🏪 Outlet</button>
      <button data-tab="staff">🧑‍🍳 Staff</button>
      <button data-tab="reward">🎁 Reward</button>
      <button data-tab="analitik">📈 Analitik</button>
    </div>
    <div id="tab"></div>
  </div>
  <div style="text-align:center"><a class="link" href="index.html">‹ Ke beranda</a></div>
</div>

<script src="outlets-data.js?v=49"></script>
<script type="module" src="core-omaopa.js?v=49"></script>
<script>
(function(){
  var O=null, gate=document.getElementById('gate'), app=document.getElementById('app'), tabEl=document.getElementById('tab');
  var tab='home', busy=false, segFilter=null;
  var MEMBERS=null, TXN=null; // cache
  var PAL=['#FACC1A','#E0915B','#7CC9B5','#C98A4B','#88B0E0','#F4A6B0','#9a8b78','#B7D77A','#caa6e0'];
  function esc(s){ return String(s==null?'':s).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];}); }
  function rp(n){ try{ return 'Rp'+Number(n||0).toLocaleString('id-ID'); }catch(e){ return 'Rp'+n; } }
  function num(n){ try{ return Number(n||0).toLocaleString('id-ID'); }catch(e){ return ''+n; } }

  async function boot(){
    O=window.OmaOpa; if(!O){ gate.innerHTML='<div class="muted">Menyiapkan…</div>'; return; }
    var u=O.getUser();
    if(!u){ gate.innerHTML='<div class="muted">Halaman khusus admin. Silakan masuk dulu.</div><button class="btn" id="lg">Masuk</button>';
      document.getElementById('lg').onclick=function(){ O.openLogin(); }; app.style.display='none'; return; }
    gate.innerHTML='<div class="muted">Memeriksa akses admin…</div>';
    var adm=false; try{ adm=await O.isAdmin(); }catch(e){}
    if(!adm){ gate.innerHTML='<div style="font-weight:900;color:#C0392B">Akun ini bukan admin.</div>'
        +'<div class="muted" style="margin-top:8px">Minta admin menandai akun (UID) ini dengan <b>admin: true</b> di koleksi <b>staff</b>:</div>'
        +'<div class="uid">'+esc(u.uid)+'</div><button class="btn sec" id="out">Keluar / ganti akun</button>';
      document.getElementById('out').onclick=async function(){ try{ await O.signOut(); }catch(e){} }; app.style.display='none'; return; }
    gate.style.display='none'; app.style.display=''; render();
  }
  document.querySelectorAll('.tabs button').forEach(function(b){ b.onclick=function(){
    tab=b.getAttribute('data-tab'); document.querySelectorAll('.tabs button').forEach(function(x){ x.classList.remove('on'); }); b.classList.add('on'); render();
  }; });
  function render(){ ({home:renderHome, member:renderMember, outlet:renderOutlet, staff:renderStaff, reward:renderReward, analitik:renderAnalitik}[tab]||renderHome)(); }
  function setActiveTab(name){ tab=name; document.querySelectorAll('.tabs button').forEach(function(x){ x.classList.toggle('on', x.getAttribute('data-tab')===name); }); }
  function applySegment(field,val){ segFilter={field:field, value:val}; setActiveTab('member'); render(); }

  async function getMembers(force){ if(MEMBERS&&!force) return MEMBERS; try{ MEMBERS=await O.listMembers('',2000); }catch(e){ MEMBERS=[]; } return MEMBERS; }
  async function getTxn(force){ if(TXN&&!force) return TXN; try{ TXN=await O.listTransactions(''); }catch(e){ TXN=[]; } return TXN; }
  function barH(title, rows){
    var max=Math.max.apply(null, rows.map(function(r){return r.value;}).concat([1]));
    var body=rows.map(function(r,i){ var pct=Math.round(r.value/max*100);
      return '<div style="margin:7px 0"><div style="display:flex;justify-content:space-between;gap:8px;font-size:.78rem;font-weight:800;color:#5b4636"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(r.label)+'</span><span style="flex:0 0 auto">'+esc(r.sub!=null?r.sub:r.value)+'</span></div>'
        +'<div style="height:10px;background:#EFE6D2;border-radius:999px;overflow:hidden;margin-top:2px"><span style="display:block;height:100%;width:'+pct+'%;background:'+PAL[i%PAL.length]+';border-radius:999px"></span></div></div>'; }).join('');
    return '<div class="chart"><div class="chart-h">'+esc(title)+'</div>'+(rows.length?body:'<div class="muted">Belum ada data.</div>')+'</div>';
  }
  function lineChart(title, pts, labels){
    var W=320,H=120,pad=10; var max=Math.max.apply(null,pts.concat([1])); var n=pts.length; var step=n>1?(W-2*pad)/(n-1):0;
    var co=pts.map(function(v,i){ return [pad+i*step, H-pad-(v/max)*(H-2*pad)]; });
    var poly=co.map(function(c){return c[0].toFixed(1)+','+c[1].toFixed(1);}).join(' ');
    var dots=co.map(function(c){return '<circle cx="'+c[0].toFixed(1)+'" cy="'+c[1].toFixed(1)+'" r="2.4" fill="#C98A1B"/>';}).join('');
    var svg='<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="128" preserveAspectRatio="none"><polyline points="'+poly+'" fill="none" stroke="#E0915B" stroke-width="2.5" stroke-linejoin="round"/>'+dots+'</svg>';
    var lab=labels?('<div style="display:flex;justify-content:space-between;font-size:.62rem;color:#9a7a5e;font-weight:700"><span>'+esc(labels[0])+'</span><span>'+esc(labels[labels.length-1])+'</span></div>'):'';
    return '<div class="chart"><div class="chart-h">'+esc(title)+'</div>'+svg+lab+'</div>';
  }

  function donut(title, data, field){
    var ent=Object.keys(data).map(function(k){return {k:k,v:data[k]};}).filter(function(e){return e.v>0;}).sort(function(a,b){return b.v-a.v;});
    var total=ent.reduce(function(s,e){return s+e.v;},0)||1; var r=52,C=2*Math.PI*r,off=0;
    var circ=ent.map(function(e,i){ var len=e.v/total*C; var s='<circle cx="70" cy="70" r="'+r+'" fill="none" stroke="'+PAL[i%PAL.length]+'" stroke-width="22" stroke-dasharray="'+len+' '+(C-len)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 70 70)"/>'; off+=len; return s; }).join('');
    var svg='<svg viewBox="0 0 140 140" width="132" height="132">'+circ+'<text x="70" y="67" text-anchor="middle" font-size="15" font-weight="900" fill="#613925">'+total+'</text><text x="70" y="83" text-anchor="middle" font-size="9" fill="#9a7a5e">total</text></svg>';
    var leg=ent.map(function(e,i){ return '<div class="lg" data-segf="'+esc(field||'')+'" data-segv="'+esc(e.k)+'" style="cursor:pointer"><span class="dot" style="background:'+PAL[i%PAL.length]+'"></span>'+esc(e.k)+' <b>'+e.v+'</b> ('+Math.round(e.v/total*100)+'%) ›</div>'; }).join('');
    return '<div class="chart"><div class="chart-h">'+esc(title)+'</div><div class="chart-b"><div>'+svg+'</div><div class="legend">'+leg+'</div></div></div>';
  }
  function tally(arr, key){ var m={}; arr.forEach(function(x){ var v=(x[key]||'').toString().trim()||'Tidak diisi'; m[v]=(m[v]||0)+1; }); return m; }

  /* ---------- RINGKASAN ---------- */
  async function renderHome(){
    tabEl.innerHTML='<div class="card"><div class="muted">Memuat ringkasan…</div></div>';
    var mem=await getMembers(), txn=[], vou=[];
    txn=await getTxn();
    try{ vou=await O.listUsedVouchers(''); }catch(e){}
    var now=new Date(), mKey=now.getFullYear()+'-'+(now.getMonth()+1);
    var inMonth=function(ts){ var d=new Date(ts); return (d.getFullYear()+'-'+(d.getMonth()+1))===mKey; };
    var poin=mem.reduce(function(s,m){return s+(m.points||0);},0);
    var txnM=txn.filter(function(t){return inMonth(t.ts);}), omzetM=txnM.reduce(function(s,t){return s+(t.nominal||0);},0);
    var spendBy={}; txn.forEach(function(t){ if(t.uid) spendBy[t.uid]=(spendBy[t.uid]||0)+(t.nominal||0); });
    var tierCnt={}; mem.forEach(function(m){ var tr=O.tierOf(spendBy[m.uid]||0); tierCnt[tr.name]=(tierCnt[tr.name]||0)+1; });
    var html='<div class="kpis">'
      +'<div class="kpi"><div class="v">'+num(mem.length)+'</div><div class="l">Total member</div></div>'
      +'<div class="kpi"><div class="v">'+num(poin)+'</div><div class="l">Poin beredar</div></div>'
      +'<div class="kpi"><div class="v">'+num(txnM.length)+'</div><div class="l">Transaksi bln ini</div></div>'
      +'<div class="kpi"><div class="v" style="font-size:1.15rem">'+rp(omzetM)+'</div><div class="l">Omzet bln ini</div></div>'
      +'<div class="kpi"><div class="v">'+num(vou.length)+'</div><div class="l">Voucher dipakai</div></div>'
      +'<div class="kpi"><div class="v">'+num(txn.length)+'</div><div class="l">Total transaksi</div></div>'
      +'</div>';
    html+='<div class="card"><div class="muted" style="margin-bottom:2px;font-size:.74rem">Ketuk legenda untuk lihat membernya 👇</div>'+donut('Umur member', tally(mem,'age'),'age')+donut('Jenis kelamin', tally(mem,'gender'),'gender')+donut('Pekerjaan', tally(mem,'occupation'),'occupation')+donut('Tier member', tierCnt,'')+'</div>';
    html+='<div class="card"><div class="nm">📣 Banner promo di app</div><div id="bnWrap" class="muted" style="margin-top:6px">Memuat…</div></div>';
    html+='<div class="card"><div class="nm">Rekap detail</div><div class="muted" style="margin:5px 0 10px">Transaksi & voucher semua outlet, filter + export CSV.</div><a class="btn" style="display:block;text-align:center;text-decoration:none" href="rekap.html?v=49">Buka Halaman Rekap →</a></div>';
    tabEl.innerHTML=html;
    tabEl.querySelectorAll('.lg[data-segf]').forEach(function(el){ el.onclick=function(){ var f=el.getAttribute('data-segf'); if(f) applySegment(f, el.getAttribute('data-segv')); }; });
    loadBanner();
  }
  async function loadBanner(){
    var w=document.getElementById('bnWrap'); if(!w) return; var b={text:'',active:false}; try{ b=await O.getAnnouncement(); }catch(e){}
    w.classList.remove('muted');
    w.innerHTML='<label>Teks banner</label><input id="bnTxt" value="'+esc(b.text||'')+'" placeholder="cth: Promo akhir pekan! Diskon 10% semua Ogura">'
      +'<label style="display:flex;align-items:center;gap:8px;margin-top:9px"><input type="checkbox" id="bnAct" style="width:auto" '+(b.active?'checked':'')+'> Tampilkan banner di app</label>'
      +'<button class="btn" id="bnSave">Simpan banner</button><div id="bnMsg"></div>';
    document.getElementById('bnSave').onclick=async function(){ if(busy)return; busy=true; var m=document.getElementById('bnMsg'); m.innerHTML='<div class="muted" style="margin-top:8px">Menyimpan…</div>';
      try{ await O.setAnnouncement(document.getElementById('bnTxt').value, document.getElementById('bnAct').checked); m.innerHTML='<div class="res ok">✓ Banner disimpan.</div>'; }catch(e){ m.innerHTML='<div class="res bad">Gagal: '+esc((e&&e.message)||'')+'</div>'; } busy=false; };
  }

  /* ---------- MEMBER ---------- */
  async function renderMember(){
    var seg=segFilter; var LM={age:'Umur',gender:'Jenis kelamin',occupation:'Pekerjaan'};
    var chip = seg ? '<div class="card"><div class="row" style="border:none;padding:0"><div class="grow"><span class="muted">Filter aktif:</span> <b>'+esc(LM[seg.field]||seg.field)+' = '+esc(seg.value)+'</b></div><button class="btn sm sec" id="segClr">✕ Hapus</button></div></div>' : '';
    tabEl.innerHTML=chip
      +'<div class="card"><div class="nm">Cari / lihat member</div>'
      +'<label>Nama atau No. HP (kosongkan = semua)</label><input id="mq" placeholder="cth: Budi / 0812...">'
      +'<button class="btn" id="mfind">Tampilkan</button><div id="mlist" class="muted" style="margin-top:8px">Memuat…</div></div>'
      +'<div id="mdetail"></div>'
      +'<div class="card"><div class="nm">🎟️ Cari & batalkan voucher (kode)</div>'
      +'<label>Kode voucher</label><input id="vq" placeholder="OO-XXXXXXXX" style="text-transform:uppercase">'
      +'<button class="btn sec" id="vfind">Cek voucher</button><div id="vout"></div></div>'
      +'<div class="card"><div class="nm">😴 Member tidak aktif (win-back)</div>'
      +'<div style="display:flex;gap:6px;margin:9px 0"><button class="btn sm sec" data-inact="30">30 hari</button><button class="btn sm sec" data-inact="60">60 hari</button><button class="btn sm sec" data-inact="90">90 hari</button></div>'
      +'<div id="inact" class="muted">Pilih rentang di atas untuk lihat member yang sudah lama tidak belanja, lalu sapa via WhatsApp.</div></div>';
    tabEl.querySelectorAll('[data-inact]').forEach(function(b){ b.onclick=function(){ loadInactive(parseInt(b.getAttribute('data-inact'),10)); }; });
    document.getElementById('mfind').onclick=function(){ segFilter=null; doFind(document.getElementById('mq').value.trim()); };
    document.getElementById('mq').addEventListener('keydown',function(e){ if(e.key==='Enter'){ segFilter=null; doFind(e.target.value.trim()); } });
    document.getElementById('vfind').onclick=function(){ doVoucher(document.getElementById('vq').value.trim()); };
    if(seg){ var clr=document.getElementById('segClr'); if(clr) clr.onclick=function(){ segFilter=null; render(); }; showSegment(seg); }
    else doFind('');
  }
  function renderTable(box, arr, note){
    if(!arr.length){ box.innerHTML='<div class="res warn">Tidak ada member.</div>'; return; }
    var rows=arr.slice(0,80).map(function(m){ return '<tr data-uid="'+esc(m.uid)+'"><td>'+esc(m.name||'(tanpa nama)')+'<div class="sub">'+esc(m.phone||'-')+'</div></td>'
      +'<td>'+esc(m.age||'-')+'</td><td>'+esc((m.gender||'-').slice(0,1))+'</td><td class="pts">'+m.points+'</td></tr>'; }).join('');
    box.innerHTML='<div class="muted" style="margin-bottom:6px">'+(note||(arr.length+' member'))+(arr.length>80?' (tampil 80 teratas)':'')+'</div>'
      +'<table class="mt"><tr><th>Nama / HP</th><th>Umur</th><th>JK</th><th>Poin</th></tr>'+rows+'</table>';
    box.querySelectorAll('tr[data-uid]').forEach(function(tr){ tr.onclick=function(){ openMember(tr.getAttribute('data-uid')); window.scrollTo({top:0,behavior:'smooth'}); }; });
  }
  async function doFind(q){
    var box=document.getElementById('mlist'); if(!box) return; box.innerHTML='Memuat…';
    var arr=[]; try{ if(/^[0-9+]/.test(q)){ var one=await O.getMemberByPhone(q); arr=one?[one]:[]; } if(!arr.length) arr=await O.listMembers(q,2000); }catch(e){}
    renderTable(box, arr);
  }
  async function showSegment(seg){
    var box=document.getElementById('mlist'); if(!box) return; box.innerHTML='Memuat…';
    var mem=await getMembers(); var LM={age:'Umur',gender:'Jenis kelamin',occupation:'Pekerjaan'};
    var match=mem.filter(function(m){ var v=(m[seg.field]||'').toString().trim()||'Tidak diisi'; return v===seg.value; });
    renderTable(box, match, match.length+' member · '+(LM[seg.field]||seg.field)+' = '+seg.value);
  }
  async function openMember(uid){
    var d=document.getElementById('mdetail'); d.innerHTML='<div class="card muted">Memuat member…</div>';
    var m=null,score=0,vs=[],spend=0; try{ m=await O.getMemberByUid(uid); score=await O.getMemberScore(uid); vs=await O.listVouchersByUid(uid); var tx=await getTxn(); tx.forEach(function(t){ if(t.uid===uid) spend+=(t.nominal||0); }); }catch(e){}
    if(!m){ d.innerHTML='<div class="card"><div class="res bad">Member tidak ditemukan.</div></div>'; return; }
    var tr=O.tierOf(spend);
    var vhtml = vs.length ? vs.map(function(v){ var on=(v.status!=='terpakai');
      return '<div class="row"><div class="grow"><div class="nm" style="font-size:.85rem">'+esc(v.title||'Voucher')+'</div><div class="sub">'+esc(v.code)+' · <span class="'+(on?'':'')+'">'+(on?'Aktif':'Sudah dipakai')+'</span></div></div>'
        +'<button class="btn sm '+(on?'sec':'green')+'" data-vtog="'+esc(v.code)+'" data-on="'+(on?'1':'0')+'">'+(on?'Tandai dipakai':'Aktifkan lagi')+'</button></div>'; }).join('') : '<div class="muted">Belum ada voucher.</div>';
    d.innerHTML='<div class="card"><div class="nm" style="font-size:1.05rem">'+esc(m.name||'Member')+'</div><div class="sub" style="margin:2px 0 5px">'+esc(m.phone||'-')+'</div>'
      +'<div style="margin:0 0 10px"><span style="display:inline-block;background:'+tr.color+';color:#fff;font-weight:900;font-size:.7rem;border-radius:999px;padding:3px 11px">★ '+tr.name+'</span> <span class="sub">total belanja '+rp(spend)+'</span></div>'
      +'<div class="row" style="border:none;padding:0"><div class="grow">Poin saat ini</div><div class="pts" style="font-size:1.1rem">'+m.points+'</div></div>'
      +'<div class="row"><div class="grow">Skor game terbaik</div><div class="pts" style="font-size:1.1rem">'+score+'</div></div>'
      +'<label>Tambah / kurangi poin (boleh minus)</label><input id="adl" inputmode="numeric" placeholder="cth: 10 atau -5">'
      +'<label>Alasan (tampil di rekap)</label><input id="adr" placeholder="cth: kasir lupa input UMS">'
      +'<button class="btn" id="adBtn">Terapkan penyesuaian poin</button>'
      +'<label style="margin-top:14px">Set poin jadi</label><input id="spv" inputmode="numeric" placeholder="angka pasti"><button class="btn sec" id="spBtn">Set poin</button>'
      +'<label style="margin-top:14px">Set skor game jadi</label><input id="ssv" inputmode="numeric" placeholder="angka"><button class="btn sec" id="ssBtn">Set skor</button>'
      +'<div style="margin-top:16px" class="nm">Voucher member ini</div>'+vhtml
      +'<div id="mmsg"></div></div>';
    function run(fn,ok){ if(busy) return; busy=true; var msg=document.getElementById('mmsg'); msg.innerHTML='<div class="muted" style="margin-top:10px">Memproses…</div>';
      Promise.resolve().then(fn).then(function(){ busy=false; msg.innerHTML='<div class="res ok">✓ '+ok+'</div>'; MEMBERS=null; openMember(uid); })
      .catch(function(e){ busy=false; msg.innerHTML='<div class="res bad">Gagal: '+esc((e&&e.message)||'')+'</div>'; }); }
    document.getElementById('adBtn').onclick=function(){ run(function(){ return O.adminAdjustPoints(uid, parseInt(document.getElementById('adl').value||'0',10)||0, document.getElementById('adr').value); },'Poin disesuaikan.'); };
    document.getElementById('spBtn').onclick=function(){ run(function(){ return O.adminSetPoints(uid, parseInt(document.getElementById('spv').value||'0',10)||0, document.getElementById('adr').value||'Set poin admin'); },'Poin di-set.'); };
    document.getElementById('ssBtn').onclick=function(){ run(function(){ return O.adminSetScore(uid, parseInt(document.getElementById('ssv').value||'0',10)||0); },'Skor di-set.'); };
    d.querySelectorAll('[data-vtog]').forEach(function(b){ b.onclick=function(){ run(function(){ return O.adminSetVoucherStatus(b.getAttribute('data-vtog'), b.getAttribute('data-on')!=='1'); },'Status voucher diubah.'); }; });
  }
  async function doVoucher(code){
    var out=document.getElementById('vout'); if(!out) return; code=(code||'').trim().toUpperCase();
    if(!code){ out.innerHTML='<div class="res bad">Masukkan kode.</div>'; return; }
    out.innerHTML='<div class="muted" style="margin-top:8px">Mencari…</div>';
    var v=null; try{ v=await O.findVoucher(code); }catch(e){}
    if(!v){ out.innerHTML='<div class="res bad">Voucher tidak ditemukan.</div>'; return; }
    var on=(v.status!=='terpakai');
    out.innerHTML='<div class="res '+(on?'ok':'warn')+'"><div class="nm">'+esc(v.title||'Voucher')+'</div>'
      +'<div class="sub">Pemilik: '+esc(v.name||'-')+'</div><div class="sub">Status: '+(on?'AKTIF':'SUDAH DIPAKAI')+'</div></div>'
      +'<button class="btn '+(on?'red':'green')+'" id="vtg">'+(on?'Tandai SUDAH DIPAKAI':'Batalkan — aktifkan lagi')+'</button>';
    document.getElementById('vtg').onclick=async function(){ if(busy)return; busy=true; this.disabled=true;
      try{ await O.adminSetVoucherStatus(code, !on); }catch(e){ alert((e&&e.message)||'Gagal'); }
      busy=false; doVoucher(code); };
  }

  /* ---------- WIN-BACK ---------- */
  async function loadInactive(days){
    var box=document.getElementById('inact'); if(!box) return; box.innerHTML='Memuat…';
    var mem=await getMembers(), txn=await getTxn();
    var last={}; txn.forEach(function(t){ if(t.uid){ if(!last[t.uid]||t.ts>last[t.uid]) last[t.uid]=t.ts; } });
    var cut=Date.now()-days*86400000;
    var arr=mem.filter(function(m){ return (last[m.uid]||0)<cut; }).sort(function(a,b){ return (last[a.uid]||0)-(last[b.uid]||0); });
    if(!arr.length){ box.innerHTML='<div class="res ok">Mantap — semua member aktif dalam '+days+' hari 👍</div>'; return; }
    box.innerHTML='<div class="muted" style="margin-bottom:6px">'+arr.length+' member belum belanja '+days+'+ hari (atau belum pernah)</div>'
      + arr.slice(0,60).map(function(m){ var ph=(m.phone||'').replace(/[^0-9]/g,''); if(ph.indexOf('0')===0) ph='62'+ph.slice(1);
        var msg=encodeURIComponent('Halo '+(m.name||'Sahabat Oma Opa')+'! Kangen nih 🥺 Mampir lagi yuk ke Oma Opa Cakery, ada poin & promo nunggu kamu.');
        var lt=last[m.uid]?('terakhir '+new Date(last[m.uid]).toLocaleDateString('id-ID')):'belum pernah belanja';
        return '<div class="row"><div class="grow"><div class="nm" style="font-size:.86rem">'+esc(m.name||'(tanpa nama)')+'</div><div class="sub">'+esc(m.phone||'-')+' · '+lt+'</div></div>'
          +(ph?'<a class="btn sm green" style="text-decoration:none" target="_blank" href="https://wa.me/'+ph+'?text='+msg+'">WA</a>':'')+'</div>'; }).join('')
      + (arr.length>60?'<div class="hint">Tampil 60 dari '+arr.length+'.</div>':'');
  }

  /* ---------- ANALITIK ---------- */
  async function renderAnalitik(){
    tabEl.innerHTML='<div class="card"><div class="muted">Memuat analitik…</div></div>';
    var orders=[],txn=[]; try{ orders=await O.listOrders(1500); }catch(e){} txn=await getTxn();
    var totOrder=orders.length, nilai=orders.reduce(function(s,o){return s+(o.total||0);},0);
    var im={}; orders.forEach(function(o){ (o.items||[]).forEach(function(it){ var key=(it.cat?it.cat+' - ':'')+(it.name||it.id||'?'); im[key]=(im[key]||0)+(it.qty||0); }); });
    var best=Object.keys(im).map(function(k){return {label:k,value:im[k],sub:im[k]+' pcs'};}).sort(function(a,b){return b.value-a.value;}).slice(0,8);
    var om={}; txn.forEach(function(t){ var o=t.outlet||'(lainnya)'; om[o]=(om[o]||0)+(t.nominal||0); });
    var outRows=Object.keys(om).map(function(k){return {label:k.replace(/^Oma Opa Cakery\s*/i,''),value:om[k],sub:rp(om[k])};}).sort(function(a,b){return b.value-a.value;}).slice(0,12);
    var days=14, today=new Date(); today.setHours(0,0,0,0); var buckets=[],labels=[];
    for(var i=days-1;i>=0;i--){ var dd=new Date(today); dd.setDate(dd.getDate()-i); buckets.push(0); labels.push(dd.getDate()+'/'+(dd.getMonth()+1)); }
    txn.forEach(function(t){ var dd=new Date(t.ts); dd.setHours(0,0,0,0); var diff=Math.round((today-dd)/86400000); var idx=days-1-diff; if(idx>=0&&idx<days) buckets[idx]++; });
    var html='<div class="kpis"><div class="kpi"><div class="v">'+num(totOrder)+'</div><div class="l">Order via web</div></div>'
      +'<div class="kpi"><div class="v" style="font-size:1.12rem">'+rp(nilai)+'</div><div class="l">Nilai order web</div></div></div>';
    html+='<div class="card">'+lineChart('Tren transaksi 14 hari', buckets, labels)+'</div>';
    html+='<div class="card">'+barH('Menu terlaris (dari order web)', best)+'</div>';
    html+='<div class="card">'+barH('Omzet per outlet (transaksi kasir)', outRows)+'</div>';
    if(!orders.length){ html+='<div class="muted" style="margin-top:8px">Analitik menu terisi otomatis begitu pelanggan mulai memesan lewat keranjang web.</div>'; }
    tabEl.innerHTML=html;
  }

  /* ---------- OUTLET ---------- */
  async function renderOutlet(){
    tabEl.innerHTML='<div class="card"><div class="nm">Tambah outlet baru</div>'
      +'<label>Nama outlet</label><input id="oNm" placeholder="cth: Oma Opa Cakery Gajah Raya Semarang">'
      +'<label>Area</label><input id="oAr" placeholder="cth: Semarang">'
      +'<label>Link Google Maps (opsional)</label><input id="oMp" placeholder="https://maps.app.goo.gl/...">'
      +'<button class="btn" id="oAdd">＋ Tambah outlet</button><div id="oMsg"></div></div>'
      +'<div class="card"><div class="row" style="border:none;padding:0 0 8px"><div class="grow nm">Daftar outlet</div><button class="btn sm sec" id="oReload">↻</button></div><div id="oList"><div class="muted">Memuat…</div></div></div>';
    document.getElementById('oAdd').onclick=async function(){ if(busy) return; busy=true; var msg=document.getElementById('oMsg'); msg.innerHTML='<div class="muted" style="margin-top:8px">Menyimpan…</div>';
      try{ await O.addOutlet({ name:document.getElementById('oNm').value, area:document.getElementById('oAr').value, maps:document.getElementById('oMp').value });
        msg.innerHTML='<div class="res ok">✓ Outlet ditambahkan.</div>'; document.getElementById('oNm').value=''; document.getElementById('oMp').value=''; loadOutlets();
      }catch(e){ msg.innerHTML='<div class="res bad">Gagal: '+esc((e&&e.message)||'')+'</div>'; } busy=false; };
    document.getElementById('oReload').onclick=loadOutlets; loadOutlets();
  }
  async function loadOutlets(){
    var box=document.getElementById('oList'); if(!box) return; box.innerHTML='<div class="muted">Memuat…</div>';
    var arr=[]; try{ arr=await O.listOutlets(); }catch(e){}
    if(!arr.length){ box.innerHTML='<div class="res warn">Belum ada outlet di database.</div><button class="btn green" id="oSeed">Impor '+((window.OMA_OUTLETS||[]).length)+' outlet dari file</button><div class="hint">Sekali klik untuk memindahkan daftar bawaan ke database.</div>';
      var sb=document.getElementById('oSeed'); if(sb) sb.onclick=async function(){ if(busy)return; busy=true; sb.disabled=true; sb.textContent='Mengimpor…';
        try{ var r=await O.seedOutlets(window.OMA_OUTLETS||[]); box.innerHTML='<div class="res ok">✓ '+r.count+' outlet diimpor.</div>'; loadOutlets(); }catch(e){ box.innerHTML='<div class="res bad">Gagal: '+esc((e&&e.message)||'')+'</div>'; } busy=false; }; return; }
    var areas=[]; arr.forEach(function(o){ if(areas.indexOf(o.area)<0) areas.push(o.area); });
    var PRIO=['Yogya','Solo Raya','Semarang']; areas.sort(function(a,b){ var ia=PRIO.indexOf(a),ib=PRIO.indexOf(b); if(ia<0)ia=99; if(ib<0)ib=99; return ia!==ib?ia-ib:a.localeCompare(b); });
    var html=''; areas.forEach(function(a){ html+='<div class="area-h">'+esc(a)+'</div>';
      arr.filter(function(o){return o.area===a;}).forEach(function(o){ var label=o.name.replace(/^Oma Opa Cakery\s*/i,'');
        html+='<div class="row"><div class="grow"><div class="nm">'+esc(label)+'</div><div class="sub">'+(o.maps?'<a class="link" href="'+esc(o.maps)+'" target="_blank">Maps</a>':'(tanpa maps)')+'</div></div>'
          +'<span class="tag '+(o.active?'on':'off')+'">'+(o.active?'AKTIF':'OFF')+'</span>'
          +'<button class="btn sm sec" data-tog="'+esc(o.id)+'" data-act="'+(o.active?'1':'0')+'">'+(o.active?'Off':'On')+'</button>'
          +'<button class="btn sm red" data-del="'+esc(o.id)+'" data-nm="'+esc(label)+'">Hapus</button></div>'; }); });
    box.innerHTML=html;
    box.querySelectorAll('[data-tog]').forEach(function(b){ b.onclick=async function(){ if(busy)return; busy=true; b.disabled=true; try{ await O.updateOutlet(b.getAttribute('data-tog'),{active:b.getAttribute('data-act')!=='1'}); loadOutlets(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-del]').forEach(function(b){ b.onclick=async function(){ if(busy)return; if(!confirm('Hapus outlet "'+b.getAttribute('data-nm')+'"?')) return; busy=true; b.disabled=true; try{ await O.deleteOutlet(b.getAttribute('data-del')); loadOutlets(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
  }

  /* ---------- STAFF ---------- */
  async function renderStaff(){
    tabEl.innerHTML='<div class="card"><div class="nm">Tambah staff / kasir</div>'
      +'<label>UID akun (dari halaman kasir saat "belum terdaftar")</label><input id="sUid" placeholder="tempel UID di sini">'
      +'<label>Outlet</label><input id="sOut" placeholder="cth: Oma Opa Cakery UMS">'
      +'<label style="display:flex;align-items:center;gap:8px;margin-top:10px"><input type="checkbox" id="sAdm" style="width:auto"> Jadikan admin (akses penuh)</label>'
      +'<button class="btn" id="sAdd">＋ Tambah staff</button><div id="sMsg"></div></div>'
      +'<div class="card"><div class="row" style="border:none;padding:0 0 8px"><div class="grow nm">Daftar staff</div><button class="btn sm sec" id="sReload">↻</button></div><div id="sList"><div class="muted">Memuat…</div></div></div>';
    document.getElementById('sAdd').onclick=async function(){ if(busy)return; busy=true; var msg=document.getElementById('sMsg'); msg.innerHTML='<div class="muted" style="margin-top:8px">Menyimpan…</div>';
      try{ await O.addStaff(document.getElementById('sUid').value, document.getElementById('sOut').value, document.getElementById('sAdm').checked);
        msg.innerHTML='<div class="res ok">✓ Staff ditambahkan.</div>'; document.getElementById('sUid').value=''; document.getElementById('sOut').value=''; document.getElementById('sAdm').checked=false; loadStaff();
      }catch(e){ msg.innerHTML='<div class="res bad">Gagal: '+esc((e&&e.message)||'')+'</div>'; } busy=false; };
    document.getElementById('sReload').onclick=loadStaff; loadStaff();
  }
  async function loadStaff(){
    var box=document.getElementById('sList'); if(!box) return; box.innerHTML='<div class="muted">Memuat…</div>';
    var arr=[]; try{ arr=await O.listStaff(); }catch(e){}
    if(!arr.length){ box.innerHTML='<div class="muted">Belum ada staff.</div>'; return; }
    box.innerHTML=arr.map(function(s){ return '<div class="row"><div class="grow"><div class="nm">'+esc(s.name||'(nama belum ada)')+(s.admin?' <span class="tag adm">ADMIN</span>':'')+'</div>'
      +'<div class="sub">'+esc(s.outlet||'(outlet kosong)')+' · '+esc(s.phone||'')+'</div></div>'
      +'<button class="btn sm sec" data-edit="'+esc(s.uid)+'" data-out="'+esc(s.outlet||'')+'">Outlet</button>'
      +'<button class="btn sm sec" data-adm="'+esc(s.uid)+'" data-on="'+(s.admin?'1':'0')+'">'+(s.admin?'Cabut admin':'Jadikan admin')+'</button>'
      +'<button class="btn sm red" data-rem="'+esc(s.uid)+'">Hapus</button></div>'; }).join('');
    box.querySelectorAll('[data-edit]').forEach(function(b){ b.onclick=async function(){ var v=prompt('Outlet untuk staff ini:', b.getAttribute('data-out')); if(v==null) return; busy=true; try{ await O.updateStaff(b.getAttribute('data-edit'),{outlet:v.trim()}); loadStaff(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-adm]').forEach(function(b){ b.onclick=async function(){ busy=true; b.disabled=true; try{ await O.updateStaff(b.getAttribute('data-adm'),{admin:b.getAttribute('data-on')!=='1'}); loadStaff(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-rem]').forEach(function(b){ b.onclick=async function(){ if(!confirm('Hapus akses staff ini?')) return; busy=true; b.disabled=true; try{ await O.removeStaff(b.getAttribute('data-rem')); loadStaff(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
  }

  /* ---------- REWARD ---------- */
  async function renderReward(){
    tabEl.innerHTML='<div class="card"><div class="nm">Tambah reward baru</div>'
      +'<label>Judul</label><input id="rT" placeholder="cth: Gratis Kopi">'
      +'<label>Catatan (opsional)</label><input id="rN" placeholder="cth: min. belanja 50rb">'
      +'<div style="display:flex;gap:8px"><div style="flex:1"><label>Harga poin</label><input id="rC" inputmode="numeric" placeholder="cth: 150"></div><div style="flex:1"><label>Stok (limit)</label><input id="rL" inputmode="numeric" placeholder="cth: 100"></div></div>'
      +'<button class="btn" id="rAdd">＋ Tambah reward</button><div id="rMsg"></div></div>'
      +'<div class="card"><div class="row" style="border:none;padding:0 0 8px"><div class="grow nm">Daftar reward</div><button class="btn sm sec" id="rReload">↻</button></div><div id="rList"><div class="muted">Memuat…</div></div></div>';
    document.getElementById('rAdd').onclick=async function(){ if(busy)return; busy=true; var msg=document.getElementById('rMsg'); msg.innerHTML='<div class="muted" style="margin-top:8px">Menyimpan…</div>';
      try{ await O.saveReward(null,{ title:document.getElementById('rT').value, note:document.getElementById('rN').value, cost:document.getElementById('rC').value, limit:document.getElementById('rL').value, active:true });
        msg.innerHTML='<div class="res ok">✓ Reward ditambahkan.</div>'; ['rT','rN','rC','rL'].forEach(function(i){document.getElementById(i).value='';}); loadRewards();
      }catch(e){ msg.innerHTML='<div class="res bad">Gagal: '+esc((e&&e.message)||'')+'</div>'; } busy=false; };
    document.getElementById('rReload').onclick=loadRewards; loadRewards();
  }
  async function loadRewards(){
    var box=document.getElementById('rList'); if(!box) return; box.innerHTML='<div class="muted">Memuat…</div>';
    var arr=[]; try{ arr=await O.listRewardsAdmin(); }catch(e){}
    if(!arr.length){ box.innerHTML='<div class="muted">Belum ada reward.</div>'; return; }
    box.innerHTML=arr.map(function(r){ var rem=(r.limit!=null)?('sisa '+Math.max(0,r.limit-r.claimed)+'/'+r.limit):'tanpa limit';
      return '<div class="row"><div class="grow"><div class="nm">'+esc(r.title)+(r.active?'':' <span class="tag off">OFF</span>')+(r.custom?' <span class="tag adm">custom</span>':'')+'</div>'
        +'<div class="sub"><span class="pts">'+r.cost+' poin</span> · '+rem+(r.note?(' · '+esc(r.note)):'')+'</div></div>'
        +'<button class="btn sm sec" data-redit=\''+esc(JSON.stringify({id:r.id,title:r.title,note:r.note,cost:r.cost,limit:r.limit}))+'\'>Edit</button>'
        +'<button class="btn sm sec" data-ract="'+esc(r.id)+'" data-on="'+(r.active?'1':'0')+'">'+(r.active?'Off':'On')+'</button>'
        +(r.custom?'<button class="btn sm red" data-rdel="'+esc(r.id)+'">Hapus</button>':'')+'</div>'; }).join('');
    box.querySelectorAll('[data-ract]').forEach(function(b){ b.onclick=async function(){ busy=true; b.disabled=true; try{ await O.setRewardActive(b.getAttribute('data-ract'), b.getAttribute('data-on')!=='1'); loadRewards(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-rdel]').forEach(function(b){ b.onclick=async function(){ if(!confirm('Hapus reward ini?')) return; busy=true; b.disabled=true; try{ await O.deleteReward(b.getAttribute('data-rdel')); loadRewards(); }catch(e){ alert((e&&e.message)||'Gagal'); } busy=false; }; });
    box.querySelectorAll('[data-redit]').forEach(function(b){ b.onclick=function(){ var r=JSON.parse(b.getAttribute('data-redit')); editReward(r); }; });
  }
  function editReward(r){
    var t=prompt('Judul:', r.title); if(t==null) return;
    var c=prompt('Harga poin:', r.cost); if(c==null) return;
    var l=prompt('Stok (limit), kosong = tetap:', r.limit==null?'':r.limit);
    var n=prompt('Catatan:', r.note||'');
    busy=true; O.saveReward(r.id,{ title:t, cost:c, limit:l, note:n }).then(function(){ busy=false; loadRewards(); }).catch(function(e){ busy=false; alert((e&&e.message)||'Gagal'); });
  }

  window.addEventListener('omaopa:ready', boot);
  window.addEventListener('omaopa:change', function(){ if(app.style.display==='none') boot(); });
  setTimeout(boot, 800);
})();
