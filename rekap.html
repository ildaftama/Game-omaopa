<!DOCTYPE html>
<html lang="id">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rekap — Oma Opa Cakery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{ --kuning:#FFC21A; --kuning-hi:#FFD64A; --kuning-d:#E5A100; --coklat:#5A3017; --cream:#FFF6E6; --cream2:#FFE9C2; --pop:#FF6A3D; --merah:#E2425A; }
  *{box-sizing:border-box}
  body{ margin:0; font-family:'Nunito',system-ui,sans-serif; color:var(--coklat);
    background:radial-gradient(circle at 12% 8%, #FFE7B8 0%, transparent 42%), var(--cream);
    min-height:100vh; padding:18px 14px 50px; }
  .wrap{ max-width:780px; margin:0 auto; }
  .head{ display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .head h1{ font-family:'Fredoka'; font-size:1.2rem; margin:0; color:var(--coklat); }
  .badge{ font-size:.66rem; font-weight:900; background:var(--kuning); color:#5A3A05; padding:2px 9px; border-radius:999px; }
  .badge.adm{ background:#2E7D32; color:#fff; }
  .card{ background:#fff; border:2px solid #EFE2C4; border-radius:18px; padding:16px; margin-bottom:14px; }
  .muted{ color:#9a7a5e; font-weight:700; font-size:.85rem; }
  label{ font-size:.72rem; font-weight:800; color:#8a6a3a; display:block; margin:0 0 4px; }
  input,select{ width:100%; border:2px solid #E7D8BE; border-radius:11px; padding:9px 10px; font-size:.92rem; font-family:inherit; font-weight:700; color:var(--coklat); background:#fff; }
  input:focus,select:focus{ outline:none; border-color:var(--kuning); }
  .filters{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .filters .full{ grid-column:1 / -1; }
  .btn{ border:none; background:var(--kuning); color:#5A3A05; font-weight:900; font-size:.92rem; border-radius:12px; padding:11px 14px; cursor:pointer; box-shadow:0 3px 0 var(--kuning-d); font-family:inherit; }
  .btn:active{ transform:translateY(2px); box-shadow:0 1px 0 var(--kuning-d); }
  .btn.sec{ background:#fff; color:var(--coklat); border:2px solid #E7D8BE; box-shadow:none; }
  .tabs{ display:flex; gap:8px; margin-bottom:12px; }
  .tab{ flex:1; text-align:center; padding:9px; border-radius:11px; font-weight:800; font-size:.85rem; background:#F3EBD9; color:#9a7a5e; cursor:pointer; }
  .tab.on{ background:var(--coklat); color:#fff; }
  .stats{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
  .stat{ background:#FFF7E0; border:2px solid #F1E4CC; border-radius:13px; padding:9px; text-align:center; }
  .stat .v{ font-weight:900; font-size:1.05rem; color:var(--coklat); }
  .stat .k{ font-size:.62rem; font-weight:800; color:#b08e3a; margin-top:1px; }
  .tbl{ width:100%; border-collapse:collapse; font-size:.78rem; }
  .tbl th{ text-align:left; background:#F7EFDD; color:#7A5A12; font-weight:900; padding:7px 8px; position:sticky; top:0; }
  .tbl td{ padding:7px 8px; border-top:1px solid #F1E8D6; }
  .tbl tr:nth-child(even) td{ background:#FCF8EF; }
  .scroll{ max-height:54vh; overflow:auto; border:2px solid #F1E4CC; border-radius:13px; }
  .empty{ text-align:center; color:#b59a7e; font-weight:700; padding:24px 6px; }
  .right{ text-align:right; }
  a.link{ color:#C98A1B; font-weight:800; text-decoration:none; }
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;gap:7px;margin-bottom:12px">
    <a href="admin.html" style="flex:1;text-align:center;text-decoration:none;padding:9px 4px;border-radius:11px;font-weight:800;font-size:.82rem;border:2px solid #E5A100;background:#FFF6E6;color:#5A3017">🛠️ Admin</a>
    <span style="flex:1;text-align:center;padding:9px 4px;border-radius:11px;font-weight:800;font-size:.82rem;border:2px solid #E5A100;background:#FFC21A;color:#5A3017">📊 Rekap</span>
    <a href="staff.html" style="flex:1;text-align:center;text-decoration:none;padding:9px 4px;border-radius:11px;font-weight:800;font-size:.82rem;border:2px solid #E5A100;background:#FFF6E6;color:#5A3017">🧾 Kasir</a>
  </div>
  <div class="head">
    <h1>📊 Rekap Oma Opa</h1><span class="badge" id="roleBadge">…</span>
  </div>
  <div id="panel" class="card"><div class="muted">Menyiapkan…</div></div>
</div>

<script type="module" src="core-omaopa.js?v=112"></script>
<script>
(function(){
  var panel=document.getElementById('panel'), roleBadge=document.getElementById('roleBadge');
  var info=null, tab='txn', allTxn=[], allVou=[], allOrd=[];
  var view={ txn:{mode:'harian',period:''}, vou:{mode:'harian',period:''}, ord:{mode:'harian',period:'',basis:'ambil'} };
  var OUTLET_AREA={};
  var BLN=['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
  function dateMs(s){ var t=new Date(s+'T00:00:00').getTime(); return isNaN(t)?0:t; }
  function ordMs(o){ if(view.ord.basis==='pesan'){ return o.ts || (o.tgl?dateMs(o.tgl):0); } return o.tgl?dateMs(o.tgl):(o.ts||0); }
  function ordPcs(o){ return o.count || (o.items||[]).reduce(function(a,it){return a+(it.qty||0);},0); }
  function HARIfull(d){ return ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'][d.getDay()]; }
  function pkl(ms,mode){ var d=new Date(ms); if(mode==='bulanan') return {k:d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1), label:BLN[d.getMonth()]+' '+d.getFullYear()}; return {k:ymd(d), label:HARIfull(d)+', '+d.getDate()+' '+BLN[d.getMonth()]+' '+d.getFullYear()}; }
  // bangun blok filter (mode + dropdown periode) + ringkasan + tabel detail/ringkas, semua dengan filter MENYATU di atas
  function buildGrouped(opt){
    // opt: rows, msOf, mode, period, stats[], onPeriodMissing handled by caller, detailHead[], detailRow(o), summaryHead, summaryRow(g), extraFilter (html string di atas, mis. basis toggle), perLabel
    var groups={};
    opt.rows.forEach(function(o){ var p=pkl(opt.msOf(o),opt.mode); if(!groups[p.k]) groups[p.k]={k:p.k,label:p.label,list:[]}; groups[p.k].list.push(o); });
    var keys=Object.keys(groups).sort(function(a,b){return a<b?1:-1;});
    var period = (opt.period && keys.indexOf(opt.period)>=0) ? opt.period : '';
    opt.period=period;
    var selStyle='width:100%;padding:10px;border:2px solid #E7D8BE;border-radius:11px;font-weight:700;color:var(--coklat);background:#fff;font-family:inherit;font-size:.9rem';
    var modeBtn='<div style="display:flex;gap:7px;align-items:center"><span class="muted" style="font-size:.72rem;font-weight:800">Tampilan:</span>'
      +'<button class="btn sm'+(opt.mode==='harian'?'':' sec')+'" data-mode="harian" style="width:auto;margin:0">Per hari</button>'
      +'<button class="btn sm'+(opt.mode==='bulanan'?'':' sec')+'" data-mode="bulanan" style="width:auto;margin:0">Per bulan</button></div>';
    var sel='<div style="margin-top:8px"><label class="muted" style="font-size:.72rem;font-weight:800;display:block;margin-bottom:3px">Pilih '+(opt.mode==='bulanan'?'bulan':'tanggal')+':</label>'
      +'<select id="periodSel" style="'+selStyle+'"><option value="">— Semua (ringkasan) —</option>'
      + keys.map(function(k){ var g=groups[k]; return '<option value="'+esc(k)+'"'+(period===k?' selected':'')+'>'+esc(g.label)+'  ·  '+g.list.length+' '+opt.perLabel+(opt.metaOf?(' · '+opt.metaOf(g)):'')+'</option>'; }).join('') + '</select></div>';
    var filterBox='<div style="background:#FFF6E2;border:2px solid #F0E2C4;border-radius:13px;padding:11px 12px;margin-bottom:12px">'+(opt.extraFilter||'')+modeBtn+sel+'</div>';
    var statsHtml='<div class="stats">'+opt.stats.map(function(s){return '<div class="stat"><div class="v">'+s.v+'</div><div class="k">'+s.k+'</div></div>';}).join('')+'</div>';
    var tbl='';
    if(period){
      var g=groups[period];
      var det=g.list.slice().sort(function(a,b){ return opt.msOf(a)-opt.msOf(b); });
      tbl='<div style="display:flex;justify-content:space-between;align-items:baseline;gap:8px;background:var(--coklat);color:#fff;border-radius:10px;padding:9px 12px;font-weight:900;font-size:.84rem;margin-bottom:6px"><span>'+esc(g.label)+'</span><span style="white-space:nowrap">'+g.list.length+' '+opt.perLabel+(opt.metaOf?(' · '+opt.metaOf(g)):'')+'</span></div>'
        +'<div class="scroll"><table class="tbl"><thead><tr>'+opt.detailHead.map(function(h){return '<th'+(h.r?' class="right"':'')+'>'+h.t+'</th>';}).join('')+'</tr></thead><tbody>'
        + det.map(opt.detailRow).join('') + (opt.detailFoot?opt.detailFoot(g):'') + '</tbody></table></div>';
    } else {
      tbl='<div class="muted" style="font-size:.7rem;margin-bottom:6px">Ketuk salah satu baris (atau pilih di dropdown) untuk lihat rinciannya.</div>'
        +'<div class="scroll"><table class="tbl"><thead><tr>'+opt.summaryHead.map(function(h){return '<th'+(h.r?' class="right"':'')+'>'+h.t+'</th>';}).join('')+'</tr></thead><tbody>'
        + keys.map(function(k){ return opt.summaryRow(groups[k]); }).join('') + (opt.summaryFoot?opt.summaryFoot():'') + '</tbody></table></div>';
    }
    return filterBox+statsHtml+tbl;
  }

  function esc(s){ return String(s==null?'':s).replace(/[&<>]/g, function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }
  function rp(n){ try{ return 'Rp'+Number(n||0).toLocaleString('id-ID'); }catch(e){ return 'Rp'+n; } }
  function fmt(ts){ try{ return ts?new Date(ts).toLocaleString('id-ID',{day:'2-digit',month:'short',year:'2-digit',hour:'2-digit',minute:'2-digit'}):'-'; }catch(e){ return '-'; } }
  function ymd(d){ var z=function(n){return (n<10?'0':'')+n;}; return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }

  async function boot(){
    if(!window.OmaOpa){ panel.innerHTML='<div class="muted">Menyiapkan…</div>'; return; }
    var u=window.OmaOpa.getUser();
    if(!u){ roleBadge.textContent='—'; panel.innerHTML='<div class="muted">Khusus staff. Silakan masuk.</div><button class="btn" id="lg" style="margin-top:10px">Masuk</button>'; document.getElementById('lg').onclick=function(){ window.OmaOpa.openLogin(); }; return; }
    panel.innerHTML='<div class="muted">Memeriksa akses…</div>';
    try{ info=await window.OmaOpa.getStaffInfo(); }catch(e){ info=null; }
    if(!info){ roleBadge.textContent='—'; panel.innerHTML='<div class="muted" style="color:#C0392B;font-weight:900">Akun ini bukan staff.</div><div class="uid"></div><button class="btn sec" id="o" style="margin-top:10px">Keluar</button>'; document.getElementById('o').onclick=async function(){ try{ await window.OmaOpa.signOut(); }catch(e){} }; return; }
    info.admin = !!(info.admin || info.super);
    roleBadge.textContent = info.admin ? 'ADMIN' : 'STAFF';
    roleBadge.className = 'badge'+(info.admin?' adm':'');
    renderShell();
    await loadData();
    render();
  }

  function renderShell(){
    var to=new Date(); to.setDate(to.getDate()+30); var from=new Date(); from.setDate(from.getDate()-29);
    panel.innerHTML=
      '<div class="muted" style="margin-bottom:10px">Outlet: <b style="color:#5A3017">'+(info.admin?'Semua (admin)':esc(info.outlet||'-'))+'</b></div>'
      + '<div class="filters">'
      +   '<div><label>Dari tanggal</label><input type="date" id="from" value="'+ymd(from)+'"></div>'
      +   '<div><label>Sampai tanggal</label><input type="date" id="to" value="'+ymd(to)+'"></div>'
      +   (info.admin?'<div class="full"><label>Outlet</label><select id="outSel"><option value="">Semua outlet</option></select></div>':'')
      + '</div>'
      + '<div class="tabs" style="margin-top:12px;flex-wrap:wrap"><div class="tab on" data-t="txn">Transaksi Poin</div><div class="tab" data-t="vou">Voucher Terpakai</div><div class="tab" data-t="ord">Pesanan Web</div></div>'
      + '<div id="body"></div>'
      + '<div style="display:flex;gap:8px;margin-top:12px"><button class="btn" id="reload">↻ Muat ulang</button><button class="btn sec" id="csv">⬇ Export CSV</button></div>';
    document.getElementById('from').addEventListener('change',render);
    document.getElementById('to').addEventListener('change',render);
    var os=document.getElementById('outSel'); if(os) os.addEventListener('change',render);
    panel.querySelectorAll('.tab').forEach(function(t){ t.onclick=function(){ tab=t.dataset.t; panel.querySelectorAll('.tab').forEach(function(x){x.classList.toggle('on',x.dataset.t===tab);}); render(); }; });
    document.getElementById('reload').onclick=async function(){ var b=this; b.disabled=true; b.textContent='Memuat…'; await loadData(); render(); b.disabled=false; b.textContent='↻ Muat ulang'; };
    document.getElementById('csv').onclick=exportCSV;
  }

  async function loadData(){
    var body=document.getElementById('body'); if(body) body.innerHTML='<div class="empty">Memuat data…</div>';
    var oArg = info.admin ? null : (info.outlet||'');
    try{ allTxn = await window.OmaOpa.listTransactions(oArg); }catch(e){ allTxn=[]; }
    try{ allVou = await window.OmaOpa.listUsedVouchers(oArg); }catch(e){ allVou=[]; }
    try{ var ords = await window.OmaOpa.listOrders(2000); allOrd=(ords||[]).filter(function(o){ return (o.status||'baru')==='approved'; }); }catch(e){ allOrd=[]; }
    if(!info.admin){ allOrd=allOrd.filter(function(o){ return (o.outlet||'')===(info.outlet||''); }); }
    if(!Object.keys(OUTLET_AREA).length){ try{ var outs=await window.OmaOpa.listOutlets(); (outs||[]).forEach(function(o){ if(o&&o.name) OUTLET_AREA[o.name]=o.area||''; }); }catch(e){} }
    if(info.admin){
      var os=document.getElementById('outSel'); if(os){
        var set={}; allTxn.forEach(function(r){ if(r.outlet) set[r.outlet]=1; }); allVou.forEach(function(r){ if(r.outlet) set[r.outlet]=1; }); allOrd.forEach(function(r){ if(r.outlet) set[r.outlet]=1; });
        var keys=Object.keys(set).sort(); var cur=os.value;
        var kron=keys.filter(isKronggahan), meta=keys.filter(function(k){return !isKronggahan(k);});
        function opt(k){ return '<option value="'+esc(k)+'">'+esc(k)+'</option>'; }
        os.innerHTML='<option value="">🟡 Semua outlet (All)</option>'
          +'<option value="__metavest">🏢 All Metavest</option>'
          +'<option value="__kronggahan">🏢 All Kronggahan</option>'
          +(meta.length?('<optgroup label="— Metavest —">'+meta.map(opt).join('')+'</optgroup>'):'')
          +(kron.length?('<optgroup label="— Kronggahan —">'+kron.map(opt).join('')+'</optgroup>'):'');
        os.value=cur;
      }
    }
  }

  function curRange(){
    var f=document.getElementById('from').value, t=document.getElementById('to').value;
    var from = f ? new Date(f+'T00:00:00').getTime() : 0;
    var to = t ? new Date(t+'T23:59:59').getTime() : Date.now()+864e5;
    var outlet = info.admin ? (document.getElementById('outSel')?document.getElementById('outSel').value:'') : (info.outlet||'');
    return {from:from,to:to,outlet:outlet};
  }
  var KRON_EXCEPT=['umy','nusa indah','godean','tajem','jakal','uii']; // 5 outlet Yogya yang TETAP Metavest
  function isYogya(name){ return String(OUTLET_AREA[name]||'').toLowerCase().indexOf('yogya')>=0; }
  function is5(name){ name=(name||'').toLowerCase(); return KRON_EXCEPT.some(function(k){return name.indexOf(k)>=0;}); }
  function isKronggahan(name){ return isYogya(name) && !is5(name); } // outlet Yogya selain 5
  function isMetavest(name){ return !isKronggahan(name); }            // semua selain Kronggahan
  function outletOk(rowOutlet, sel){
    if(!sel) return true;
    if(sel==='__metavest') return isMetavest(rowOutlet);
    if(sel==='__kronggahan') return isKronggahan(rowOutlet);
    return rowOutlet===sel;
  }
  function filterRows(rows){
    var r=curRange();
    return rows.filter(function(x){ return x.ts>=r.from && x.ts<=r.to && outletOk(x.outlet, r.outlet); });
  }

  function emptyBox(extra,st){
    var modeBtn='<div style="display:flex;gap:7px;align-items:center"><span class="muted" style="font-size:.72rem;font-weight:800">Tampilan:</span>'
      +'<button class="btn sm'+(st.mode==='harian'?'':' sec')+'" data-mode="harian" style="width:auto;margin:0">Per hari</button>'
      +'<button class="btn sm'+(st.mode==='bulanan'?'':' sec')+'" data-mode="bulanan" style="width:auto;margin:0">Per bulan</button></div>';
    return '<div style="background:#FFF6E2;border:2px solid #F0E2C4;border-radius:13px;padding:11px 12px;margin-bottom:12px">'+(extra||'')+modeBtn+'</div>';
  }
  function render(){
    var body=document.getElementById('body'); if(!body) return;
    if(tab==='txn') renderTxn(body);
    else if(tab==='vou') renderVou(body);
    else renderOrd(body);
  }
  function renderTxn(body){
    var rows=filterRows(allTxn); var st=view.txn;
    var omzet=0, poin=0; rows.forEach(function(x){ omzet+=(x.nominal||0); poin+=(x.points||0); });
    if(!rows.length){ body.innerHTML=emptyBox('',st)+'<div class="empty">Belum ada transaksi pada rentang & outlet ini.</div>'; wireG(body); return; }
    var opt={ rows:rows, msOf:function(x){return x.ts;}, mode:st.mode, period:st.period, perLabel:'transaksi',
      metaOf:function(g){ var o=0; g.list.forEach(function(x){o+=(x.nominal||0);}); return rp(o); },
      stats:[{v:rows.length,k:'TRANSAKSI'},{v:rp(omzet),k:'OMZET'},{v:poin,k:'POIN'}],
      detailHead:[{t:'Waktu'},{t:'Outlet'},{t:'Member'},{t:'Nominal',r:1},{t:'Poin',r:1}].concat(info.super?[{t:''}]:[]),
      detailRow:function(x){ return '<tr><td>'+fmt(x.ts)+'</td><td>'+esc(x.outlet||'-')+'</td><td>'+esc(x.name||(x.uid?x.uid.slice(0,6):'-'))+'</td><td class="right">'+rp(x.nominal)+'</td><td class="right">+'+(x.points||0)+'</td>'+delCell('txn',x.id)+'</tr>'; },
      detailFoot:function(g){ var o=0,p=0; g.list.forEach(function(x){o+=(x.nominal||0);p+=(x.points||0);}); return '<tr style="font-weight:900"><td colspan="3">SUBTOTAL</td><td class="right">'+rp(o)+'</td><td class="right">+'+p+'</td>'+(info.super?'<td></td>':'')+'</tr>'; },
      summaryHead:[{t:(st.mode==='bulanan'?'Bulan':'Tanggal')},{t:'Trx',r:1},{t:'Omzet',r:1},{t:'Poin',r:1}],
      summaryRow:function(g){ var o=0,p=0; g.list.forEach(function(x){o+=(x.nominal||0);p+=(x.points||0);}); return '<tr data-period="'+esc(g.k)+'" style="cursor:pointer"><td>'+esc(g.label)+' ›</td><td class="right">'+g.list.length+'</td><td class="right">'+rp(o)+'</td><td class="right">+'+p+'</td></tr>'; },
      summaryFoot:function(){ return '<tr style="font-weight:900"><td>TOTAL</td><td class="right">'+rows.length+'</td><td class="right">'+rp(omzet)+'</td><td class="right">+'+poin+'</td></tr>'; }
    };
    body.innerHTML=buildGrouped(opt); st.period=opt.period; wireG(body);
  }
  function renderVou(body){
    var rows=filterRows(allVou); var st=view.vou;
    if(!rows.length){ body.innerHTML=emptyBox('',st)+'<div class="empty">Belum ada voucher terpakai pada rentang & outlet ini.</div>'; wireG(body); return; }
    var opt={ rows:rows, msOf:function(x){return x.ts;}, mode:st.mode, period:st.period, perLabel:'voucher',
      stats:[{v:rows.length,k:'VOUCHER TERPAKAI'}],
      detailHead:[{t:'Waktu'},{t:'Outlet'},{t:'Kode'},{t:'Voucher'},{t:'Member'}].concat(info.super?[{t:''}]:[]),
      detailRow:function(x){ return '<tr><td>'+fmt(x.ts)+'</td><td>'+esc(x.outlet||'-')+'</td><td>'+esc(x.code||'-')+'</td><td>'+esc(x.title||'-')+'</td><td>'+esc(x.name||'-')+'</td>'+delCell('vou',x.code)+'</tr>'; },
      summaryHead:[{t:(st.mode==='bulanan'?'Bulan':'Tanggal')},{t:'Voucher',r:1}],
      summaryRow:function(g){ return '<tr data-period="'+esc(g.k)+'" style="cursor:pointer"><td>'+esc(g.label)+' ›</td><td class="right">'+g.list.length+'</td></tr>'; },
      summaryFoot:function(){ return '<tr style="font-weight:900"><td>TOTAL</td><td class="right">'+rows.length+'</td></tr>'; }
    };
    body.innerHTML=buildGrouped(opt); st.period=opt.period; wireG(body);
  }
  function filterOrders(){
    var r=curRange();
    return allOrd.filter(function(o){ var ms=ordMs(o); return ms>=r.from && ms<=r.to && outletOk(o.outlet, r.outlet); });
  }
  function renderOrd(body){
    var rows=filterOrders(); var st=view.ord;
    var omzet=rows.reduce(function(s,o){return s+(o.total||0);},0);
    var pcs=rows.reduce(function(s,o){return s+ordPcs(o);},0);
    var basis='<div style="display:flex;gap:7px;align-items:center;margin-bottom:8px;flex-wrap:wrap"><span class="muted" style="font-size:.72rem;font-weight:800">Hitung per:</span>'
      +'<button class="btn sm'+(st.basis==='ambil'?'':' sec')+'" data-basis="ambil" style="width:auto;margin:0">📅 Tanggal ambil</button>'
      +'<button class="btn sm'+(st.basis==='pesan'?'':' sec')+'" data-basis="pesan" style="width:auto;margin:0">🧾 Tanggal pesan</button></div>';
    var delBtn = info.super ? '<button class="btn" id="ordClear" style="background:#C0392B;color:#fff;box-shadow:0 3px 0 #97271b;margin-top:16px">🗑️ Hapus semua rekap pesanan (bersihkan uji coba)</button>' : '';
    var basisLabel = st.basis==='ambil' ? 'tanggal pengambilan' : 'tanggal order masuk';
    var note='<div class="muted" style="font-size:.7rem;margin:6px 0 0">Dihitung per <b>'+basisLabel+'</b> · hanya pesanan ter-<b>approve</b>.</div>';
    if(!rows.length){ body.innerHTML=emptyBox(basis,st)+'<div class="empty">Belum ada pesanan deal pada rentang & outlet ini.</div>'+delBtn; wireG(body); return; }
    function dShort(s){ if(!s) return '-'; var d=new Date(s+'T00:00:00'); return isNaN(d.getTime())?s:(d.getDate()+' '+BLN[d.getMonth()]); }
    var opt={ rows:rows, msOf:ordMs, mode:st.mode, period:st.period, perLabel:'order', extraFilter:basis,
      metaOf:function(g){ var o=0; g.list.forEach(function(x){o+=(x.total||0);}); return rp(o); },
      stats:[{v:rows.length,k:'ORDER DEAL'},{v:rp(omzet),k:'OMZET'},{v:pcs,k:'TOTAL PCS'}],
      detailHead:[{t:'Tgl pesan'},{t:'Tgl ambil'},{t:'Outlet'},{t:'Nama'},{t:'Item'},{t:'Total',r:1}].concat(info.super?[{t:''}]:[]),
      detailRow:function(o){ var IL=(window.OmaOpa&&window.OmaOpa.itemLabel)||function(it){return (it.cat?it.cat+' – ':'')+(it.name||it.id||'');}; var itlbl=(o.items||[]).map(function(it){return it.qty+'x '+IL(it);}).join(', '); var jam=o.jam?(' '+o.jam):''; return '<tr><td>'+esc(fmt(o.ts))+'</td><td>'+esc(dShort(o.tgl)+jam)+'</td><td>'+esc(o.outlet||'-')+'</td><td>'+esc(o.nama||'-')+'</td><td>'+esc(itlbl||'-')+'</td><td class="right">'+rp(o.total)+'</td>'+delCell('ord',o.id)+'</tr>'; },
      detailFoot:function(g){ var o=0; g.list.forEach(function(x){o+=(x.total||0);}); return '<tr style="font-weight:900"><td colspan="5">SUBTOTAL</td><td class="right">'+rp(o)+'</td>'+(info.super?'<td></td>':'')+'</tr>'; },
      summaryHead:[{t:(st.mode==='bulanan'?'Bulan':'Tanggal')},{t:'Order',r:1},{t:'Pcs',r:1},{t:'Omzet',r:1}],
      summaryRow:function(g){ var o=0,p=0; g.list.forEach(function(x){o+=(x.total||0);p+=ordPcs(x);}); return '<tr data-period="'+esc(g.k)+'" style="cursor:pointer"><td>'+esc(g.label)+' ›</td><td class="right">'+g.list.length+'</td><td class="right">'+p+'</td><td class="right">'+rp(o)+'</td></tr>'; },
      summaryFoot:function(){ return '<tr style="font-weight:900"><td>TOTAL</td><td class="right">'+rows.length+'</td><td class="right">'+pcs+'</td><td class="right">'+rp(omzet)+'</td></tr>'; }
    };
    body.innerHTML=buildGrouped(opt)+note+delBtn; st.period=opt.period; wireG(body);
  }
  function delCell(type, id){ if(!info.super) return ''; return '<td style="text-align:center"><button data-del="'+type+'" data-id="'+esc(String(id||''))+'" title="Hapus baris ini" style="background:#fff;border:1.5px solid #E8B4B4;color:#C0392B;border-radius:8px;padding:3px 8px;font-weight:800;cursor:pointer">🗑</button></td>'; }
  function delOne(type, id){
    var label = type==='ord' ? 'pesanan' : (type==='txn' ? 'transaksi' : 'voucher terpakai');
    var extra = type==='txn' ? '\n\n(Catatan: poin yang sudah diberikan ke member TIDAK otomatis ditarik kembali.)' : '';
    if(!confirm('Hapus 1 '+label+' ini? Permanen & tidak bisa dibatalkan.'+extra)) return;
    var fn = type==='ord' ? window.OmaOpa.deleteOrder : (type==='txn' ? window.OmaOpa.deleteTransaction : window.OmaOpa.deleteVoucherRec);
    Promise.resolve().then(function(){ return fn(id); })
      .then(function(){ return loadData(); })
      .then(function(){ render(); })
      .catch(function(e){ alert((e&&e.message)||'Gagal menghapus.'); });
  }
  function wireG(body){
    body.querySelectorAll('[data-del]').forEach(function(b){ b.onclick=function(ev){ ev.stopPropagation(); delOne(b.getAttribute('data-del'), b.getAttribute('data-id')); }; });
    var st=view[tab];
    body.querySelectorAll('[data-mode]').forEach(function(t){ t.onclick=function(){ st.mode=t.getAttribute('data-mode'); st.period=''; render(); }; });
    var ps=body.querySelector('#periodSel'); if(ps) ps.onchange=function(){ st.period=ps.value; render(); };
    body.querySelectorAll('[data-period]').forEach(function(r){ r.onclick=function(){ st.period=r.getAttribute('data-period'); render(); }; });
    body.querySelectorAll('[data-basis]').forEach(function(t){ t.onclick=function(){ view.ord.basis=t.getAttribute('data-basis'); view.ord.period=''; render(); }; });
    var oc=body.querySelector('#ordClear');
    if(oc) oc.onclick=function(){
      if(!confirm('Hapus SEMUA rekap pesanan web? Tindakan ini permanen dan tidak bisa dibatalkan.')) return;
      if(prompt('Ketik HAPUS untuk konfirmasi:')!=='HAPUS') return;
      oc.disabled=true; oc.textContent='Menghapus…';
      Promise.resolve().then(function(){ return window.OmaOpa.adminClearOrders(); })
        .then(function(r){ alert((r&&r.count||0)+' pesanan dihapus.'); view.ord.period=''; return loadData(); })
        .then(function(){ render(); })
        .catch(function(e){ alert((e&&e.message)||'Gagal'); oc.disabled=false; oc.textContent='🗑️ Hapus semua rekap pesanan (bersihkan uji coba)'; });
    };
  }
  function csvCell(s){ s=String(s==null?'':s); return '"'+s.replace(/"/g,'""')+'"'; }
  function inPeriod(ms, st){ if(!st.period) return true; var p=pkl(ms,st.mode); return p.k===st.period; }
  var MEMBER_PH=null;
  async function exportCSV(){
    var lines=[], fname;
    if(!MEMBER_PH){ MEMBER_PH={}; try{ var _mem=await window.OmaOpa.listMembers('',6000); (_mem||[]).forEach(function(m){ if(m&&m.uid) MEMBER_PH[m.uid]=m.phone||''; }); }catch(e){} }
    if(tab==='txn'){
      var st=view.txn; var rows=filterRows(allTxn).filter(function(x){return inPeriod(x.ts,st);});
      lines.push(['Waktu','Outlet','Member','No HP','UID','Nominal','Poin'].map(csvCell).join(','));
      rows.forEach(function(x){ lines.push([fmt(x.ts),x.outlet,x.name,(x.phone||MEMBER_PH[x.uid]||''),x.uid,x.nominal,x.points].map(csvCell).join(',')); });
      fname='rekap-transaksi'+(st.period?('-'+st.period):'')+'.csv';
    } else if(tab==='vou'){
      var sv=view.vou; var rows2=filterRows(allVou).filter(function(x){return inPeriod(x.ts,sv);});
      lines.push(['Waktu','Outlet','Kode','Voucher','Member','UID'].map(csvCell).join(','));
      rows2.forEach(function(x){ lines.push([fmt(x.ts),x.outlet,x.code,x.title,x.name,x.uid].map(csvCell).join(',')); });
      fname='rekap-voucher'+(sv.period?('-'+sv.period):'')+'.csv';
    } else {
      var so=view.ord; var rows3=filterOrders().filter(function(o){return inPeriod(ordMs(o),so);});
      var sorted=rows3.slice().sort(function(a,b){ return ordMs(a)-ordMs(b); });
      lines.push(['Tgl pesan','Tgl ambil','Jam','Outlet','Nama','Telp','Item','Pcs','Total'].map(csvCell).join(','));
      sorted.forEach(function(o){ var itlbl=(o.items||[]).map(function(it){return it.qty+'x '+(it.name||it.id);}).join('; '); lines.push([fmt(o.ts),o.tgl||'',o.jam||'',o.outlet||'',o.nama||'',o.telp||'',itlbl,ordPcs(o),o.total||0].map(csvCell).join(',')); });
      fname='rekap-pesanan'+(so.period?('-'+so.period):'')+'.csv';
    }
    var blob=new Blob(["\ufeff"+lines.join("\r\n")], {type:'text/csv;charset=utf-8;'});
    var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=fname; document.body.appendChild(a); a.click(); setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); },500);
  }

  window.addEventListener('omaopa:ready', boot);
  window.addEventListener('omaopa:change', function(){ /* re-evaluate auth only if not loaded */ if(!info) boot(); });
  setTimeout(boot, 800);
})();
</script>
</body>
